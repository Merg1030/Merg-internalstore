<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Terminal</title>
    <style>
        :root {
            --primary:#4361ee;--accent:#4cc9f0;--danger:#f72585;
            --warning:#f8961e;--success:#2ecc71;--discount:#9c27b0;
            --bg:#f4f6fb;--surface:#ffffff;--bg-lighter:#f1f3f5;
            --border:#dee2e6;--text:#212529;--text-fade:#6c757d;
            --radius:10px;--radius-lg:16px;
            --shadow:0 2px 12px rgba(67,97,238,0.08);
            --shadow-lg:0 8px 32px rgba(67,97,238,0.13);
        }
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI','Poppins',Tahoma,Geneva,Verdana,sans-serif;}
        html,body{height:100%;background:var(--bg);color:var(--text);}
        body{min-height:100vh;display:flex;}
        .page-wrap{width:100vw;min-height:100vh;display:flex;flex-direction:column;overflow:hidden;}
        /* TOPBAR */
        .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 18px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;min-height:64px;box-shadow:var(--shadow);flex-shrink:0;}
        .topbar-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
        .topbar-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
        .page-title{font-size:1.05rem;font-weight:700;color:var(--primary);white-space:nowrap;}
        .total-pill{background:linear-gradient(135deg,#eef2ff,#e0e7ff);border:1px solid #c7d2fe;color:var(--primary);font-size:.82rem;font-weight:600;padding:5px 14px;border-radius:100px;white-space:nowrap;}
        .total-pill span{font-weight:800;}
        /* BUTTONS */
        .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border:none;border-radius:var(--radius);cursor:pointer;font-size:.84rem;font-weight:600;transition:all .18s;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,.08);text-decoration:none;}
        .btn svg{width:15px;height:15px;flex-shrink:0;}
        .btn-primary{background:linear-gradient(135deg,var(--primary),#3a56d4);color:white;}
        .btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(67,97,238,.3);}
        .btn-success{background:linear-gradient(135deg,var(--success),#27ae60);color:white;}
        .btn-success:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(46,204,113,.3);}
        .btn-warning{background:linear-gradient(135deg,var(--warning),#e07b0a);color:white;}
        .btn-warning:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(248,150,30,.3);}
        .btn-ghost{background:var(--bg-lighter);color:var(--primary);border:1px solid var(--border);}
        .btn-ghost:hover{background:var(--border);}
        .btn-danger{background:linear-gradient(135deg,var(--danger),#c82333);color:white;}
        .btn-danger:hover{opacity:.9;transform:translateY(-1px);}
        .btn-discount{background:linear-gradient(135deg,var(--discount),#7b1fa2);color:white;}
        .btn-discount:hover{opacity:.9;transform:translateY(-1px);}
        .btn:disabled{opacity:.6;cursor:not-allowed;transform:none!important;}
        /* LAYOUT */
        .main-content{flex:1;overflow:hidden;display:flex;}
        .left-panel{width:400px;min-width:300px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
        .left-inner{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;}
        .right-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:16px;gap:12px;}
        /* CARDS */
        .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow);overflow:hidden;}
        .card-hdr{padding:11px 16px;border-bottom:1px solid var(--border);background:var(--bg-lighter);display:flex;align-items:center;justify-content:space-between;}
        .card-hdr h3{font-size:.88rem;font-weight:700;color:var(--primary);display:flex;align-items:center;gap:7px;}
        .card-body{padding:14px 16px;}
        /* FIELDS */
        .fg{display:flex;flex-direction:column;gap:5px;margin-bottom:11px;}
        .fg:last-child{margin-bottom:0;}
        .fg label{font-size:.72rem;font-weight:700;color:var(--text-fade);text-transform:uppercase;letter-spacing:.07em;}
        .fg input,.fg select{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:.9rem;color:var(--text);background:var(--bg);transition:border-color .2s,box-shadow .2s;}
        .fg input:focus,.fg select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(67,97,238,.1);background:white;}
        .frow{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
        select option:disabled{color:var(--danger);}
        /* DATE BAR */
        .date-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
        .date-bar label{font-size:.72rem;font-weight:700;color:var(--text-fade);text-transform:uppercase;letter-spacing:.07em;white-space:nowrap;}
        .date-bar input[type=date]{padding:7px 11px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:.88rem;color:var(--text);background:var(--bg);cursor:pointer;transition:border-color .2s;}
        .date-bar input[type=date]:focus{outline:none;border-color:var(--primary);}
        /* DATE CHIPS */
        .chips-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
        .chips-label{font-size:.72rem;font-weight:700;color:var(--text-fade);text-transform:uppercase;letter-spacing:.07em;white-space:nowrap;}
        .chip{padding:4px 12px;border-radius:100px;font-size:.74rem;font-weight:600;border:1.5px solid var(--border);background:var(--bg-lighter);color:var(--text-fade);cursor:pointer;transition:all .15s;white-space:nowrap;}
        .chip:hover{border-color:var(--primary);color:var(--primary);background:#eef2ff;}
        .chip.active{background:var(--primary);color:white;border-color:var(--primary);box-shadow:0 2px 8px rgba(67,97,238,.2);}
        /* CART TABLE */
        .cart-wrap{overflow-x:auto;}
        .ct{width:100%;border-collapse:collapse;font-size:.82rem;min-width:320px;}
        .ct th{background:var(--bg-lighter);color:var(--text-fade);font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:8px 10px;border-bottom:1px solid var(--border);text-align:left;}
        .ct td{padding:8px 10px;border-bottom:1px solid #f0f2f8;vertical-align:middle;}
        .ct tr:last-child td{border-bottom:none;}
        .ct tr:hover td{background:#f8f9ff;}
        .cart-foot{padding:10px 16px;background:var(--bg-lighter);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
        .cart-total{font-size:.92rem;font-weight:700;color:var(--primary);}
        .cart-total.disc{color:var(--discount);}
        .orig{text-decoration:line-through;color:var(--text-fade);font-size:.75rem;margin-right:3px;}
        .dbadge{background:var(--discount);color:white;padding:1px 6px;border-radius:4px;font-size:.66rem;font-weight:700;margin-left:4px;}
        .cart-acts{display:flex;gap:8px;padding:10px 16px;border-top:1px solid var(--border);}
        .cart-acts .btn{flex:1;justify-content:center;}
        .rm-btn{background:none;border:1px solid var(--danger);color:var(--danger);padding:2px 7px;border-radius:5px;cursor:pointer;font-size:.72rem;font-weight:600;transition:all .15s;box-shadow:none;min-width:unset;width:auto;margin:0;}
        .rm-btn:hover{background:var(--danger);color:white;}
        /* SALES TABLE */
        .tcard{flex:1;display:flex;flex-direction:column;overflow:hidden;}
        .tscroll{flex:1;overflow-y:auto;}
        table.st{width:100%;border-collapse:collapse;min-width:540px;}
        table.st thead th{background:#f8f9ff;color:var(--text-fade);font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;padding:11px 12px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5;text-align:left;}
        table.st tbody td{padding:9px 12px;font-size:.86rem;border-bottom:1px solid #f0f2f8;transition:background .12s;}
        table.st tbody tr:last-child td{border-bottom:none;}
        table.st tbody tr:hover td{background:#f8f9ff;}
        input[type=checkbox]{width:15px;height:15px;accent-color:var(--primary);cursor:pointer;border:0;padding:0;margin:0;background:transparent;}
        .empty-row td{text-align:center;padding:40px 20px;color:var(--text-fade);font-size:.9rem;}
        /* REVERSE BAR */
        .rev-bar{display:none;align-items:center;gap:10px;padding:9px 14px;background:#fff5f8;border:1px solid #f7b8d0;border-radius:var(--radius);}
        .rev-bar.show{display:flex;}
        .rev-bar span{font-size:.82rem;color:var(--danger);font-weight:600;flex:1;}
        /* DISCOUNT PANEL */
        .disc-panel{background:linear-gradient(135deg,#f9f0ff,#f3e5f5);border:1.5px solid #ce93d8;border-radius:var(--radius);padding:14px;display:none;flex-direction:column;gap:9px;}
        .disc-panel.show{display:flex;}
        .disc-panel label{font-size:.72rem;font-weight:700;color:var(--discount);text-transform:uppercase;letter-spacing:.07em;}
        .disc-row{display:flex;gap:8px;align-items:center;}
        .disc-row input{flex:1;padding:9px 12px;border:1.5px solid #ce93d8;border-radius:var(--radius);font-size:.9rem;background:white;}
        .disc-row input:focus{outline:none;border-color:var(--discount);}
        /* CODE CHIP */
        .codechip{font-family:monospace;font-size:.75rem;background:#eef2ff;color:var(--primary);border:1px solid #c7d2fe;border-radius:5px;padding:1px 7px;}
        /* TOAST */
        .toast-wrap{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
        .toast{background:#1e2029;color:white;padding:11px 17px;border-radius:var(--radius);font-size:.85rem;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.3);animation:tIn .25s ease;display:flex;align-items:center;gap:9px;max-width:300px;}
        .toast.success{border-left:3px solid var(--success);}
        .toast.error{border-left:3px solid var(--danger);}
        .toast.fade-out{animation:tOut .3s ease forwards;}
        @keyframes tIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        @keyframes tOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(12px)}}
        /* SPINNER */
        .spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0;}
        @keyframes sp{to{transform:rotate(360deg)}}
        /* RESPONSIVE */
        @media(max-width:900px){.main-content{flex-direction:column;overflow-y:auto;}.left-panel{width:100%;min-width:unset;border-right:none;border-bottom:1px solid var(--border);max-height:none;}.right-panel{min-height:400px;}}
        @media(max-width:600px){.topbar{padding:10px 12px;}.frow{grid-template-columns:1fr;}.cart-acts{flex-direction:column;}}
    </style>

    <script type="module">
        import{initializeApp}from"https://www.gstatic.com/firebasejs/11.5.0/firebase-app.js";
        import{getFirestore,collection,addDoc,deleteDoc,doc,query,where,onSnapshot,serverTimestamp,getDocs,increment,runTransaction}from"https://www.gstatic.com/firebasejs/11.5.0/firebase-firestore.js";

        const firebaseConfig={apiKey:"AIzaSyB-lm7Y3r1F6VvY8PKvY8glLabZDbJsHM1k",authDomain:"trismartstores.firebaseapp.com",projectId:"trismartstores",storageBucket:"trismartstores.appspot.com",messagingSenderId:"416692703333",appId:"1:416692703333:web:d4b60292621435c748f68c",measurementId:"G-NJPQ7L3QWJ"};
        const app=initializeApp(firebaseConfig);
        const db=getFirestore(app);

        const branchId=localStorage.getItem('branchId');
        if(!branchId){alert('Branch not set.');window.location.href='dashboard.html';}

        let inventory=[],sales=[],cart=[],cartDiscount=0;
        let currentDate=todayStr(),isProcessing=false;
        let unsubSales=null,unsubInv=null,knownDates=[];

        function todayStr(){return new Date().toISOString().split('T')[0];}

        /* TOAST */
        function toast(msg,type='success'){
            const w=document.getElementById('toastWrap'),el=document.createElement('div');
            el.className=`toast ${type}`;
            el.innerHTML=`<span>${type==='success'?'✓':type==='error'?'✕':'ℹ'}</span> ${msg}`;
            w.appendChild(el);
            setTimeout(()=>{el.classList.add('fade-out');setTimeout(()=>el.remove(),350);},3200);
        }

        /* INIT */
        window.onload=async function(){
            const names={master:'Master Warehouse',makeni:'Kabanana Branch',kabana:'Makeni Branch'};
            document.getElementById('pageTitle').textContent='Sales Terminal — '+(names[branchId]||branchId);
            document.getElementById('dateInput').value=currentDate;
            setupInventoryListener();
            await loadKnownDates();
            setupSalesListener(currentDate);
            loadCartFromStorage();
        };

        /* KNOWN DATES — fetch all distinct dates with sales for this branch */
        async function loadKnownDates(){
            try{
                const snap=await getDocs(query(collection(db,'sales'),where('branchId','==',branchId)));
                const s=new Set([todayStr()]);
                snap.docs.forEach(d=>{if(d.data().date)s.add(d.data().date);});
                knownDates=Array.from(s).sort((a,b)=>b.localeCompare(a));
            }catch(e){knownDates=[todayStr()];}
            renderChips();
        }

        function renderChips(){
            const c=document.getElementById('chips');
            c.innerHTML='';
            knownDates.slice(0,12).forEach(date=>{
                const b=document.createElement('button');
                b.className='chip'+(date===currentDate?' active':'');
                b.textContent=fmtDate(date);b.dataset.date=date;
                b.onclick=()=>selectDate(date);
                c.appendChild(b);
            });
        }

        function fmtDate(d){
            const today=todayStr();
            const yest=new Date();yest.setDate(yest.getDate()-1);
            if(d===today)return'Today';
            if(d===yest.toISOString().split('T')[0])return'Yesterday';
            return new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short'});
        }

        function selectDate(date){
            currentDate=date;
            document.getElementById('dateInput').value=date;
            renderChips();
            setupSalesListener(date);
        }

        window.filterByDate=function(){
            const v=document.getElementById('dateInput').value;
            if(!v){toast('Pick a date.','error');return;}
            if(!knownDates.includes(v)){knownDates.unshift(v);knownDates.sort((a,b)=>b.localeCompare(a));}
            selectDate(v);
        };

        /* INVENTORY */
        function setupInventoryListener(){
            if(unsubInv)unsubInv();
            unsubInv=onSnapshot(query(collection(db,'inventory'),where('branchId','==',branchId)),snap=>{
                inventory=snap.docs.map(d=>({id:d.id,...d.data(),stock:Number(d.data().stock)||0,price:Number(d.data().price)||0,sold:Number(d.data().sold)||0}));
                populateSel();
            });
        }

        function populateSel(){
            const sel=document.getElementById('prodSel'),cur=sel.value;
            sel.innerHTML='<option value="">— Select Product —</option>';
            [...inventory].sort((a,b)=>a.name.localeCompare(b.name)).forEach(i=>{
                const o=document.createElement('option');
                o.value=i.code;
                o.textContent=`${i.name} (${i.code}) — ZMW ${i.price.toFixed(2)} | Stock: ${i.stock}`;
                o.disabled=i.stock<=0;
                sel.appendChild(o);
            });
            sel.value=cur;
        }

        /* SALES LISTENER */
        function setupSalesListener(date){
            if(unsubSales)unsubSales();
            unsubSales=onSnapshot(
                query(collection(db,'sales'),where('branchId','==',branchId),where('date','==',date)),
                snap=>{
                    sales=snap.docs.map(d=>({id:d.id,...d.data()}));
                    renderSales();updateTotal();
                },
                err=>{console.error(err);toast('Error loading sales.','error');}
            );
        }

        function renderSales(){
            const tb=document.querySelector('#salesTbl tbody');
            tb.innerHTML='';
            if(!sales.length){tb.innerHTML='<tr class="empty-row"><td colspan="8">No sales recorded for this date.</td></tr>';updateRevBar();return;}
            sales.forEach(s=>{
                const disc=s.discount||0;
                const total=s.total!=null?s.total:(s.price*s.quantity)-disc;
                const tr=document.createElement('tr');
                tr.innerHTML=`
                    <td><input type="checkbox" data-id="${s.id}" onchange="updateRevBar()"></td>
                    <td>${s.date}</td>
                    <td><span class="codechip">${s.code}</span></td>
                    <td>${s.name}</td>
                    <td>ZMW ${Number(s.price).toFixed(2)}</td>
                    <td>${s.quantity}</td>
                    <td>${disc>0?`<span style="color:var(--discount);font-weight:600;">ZMW ${disc.toFixed(2)}</span>`:'<span style="color:var(--text-fade)">—</span>'}</td>
                    <td><strong>ZMW ${Number(total).toFixed(2)}</strong></td>`;
                tb.appendChild(tr);
            });
            updateRevBar();
        }

        function updateTotal(){
            const t=sales.reduce((s,r)=>{const v=r.total!=null?r.total:(r.price*r.quantity)-(r.discount||0);return s+v;},0);
            document.getElementById('totalPill').innerHTML=`Sales (${fmtDate(currentDate)}): <span>ZMW ${t.toFixed(2)}</span>`;
        }

        /* REVERSE BAR */
        window.updateRevBar=function(){
            const n=document.querySelectorAll('#salesTbl tbody input[type=checkbox]:checked').length;
            const bar=document.getElementById('revBar');
            bar.classList.toggle('show',n>0);
            if(n>0)document.getElementById('revLabel').textContent=`${n} sale${n>1?'s':''} selected`;
        };

        /* FORM TOGGLE */
        window.toggleForm=function(){
            const f=document.getElementById('addCard');
            const show=f.style.display==='none'||f.style.display==='';
            f.style.display=show?'block':'none';
            document.getElementById('togBtn').textContent=show?'Hide Form':'+ Add Item to Cart';
            if(show){document.getElementById('discPanel').classList.remove('show');setTimeout(()=>document.getElementById('prodSel').focus(),80);}
        };

        window.toggleDisc=function(){
            const p=document.getElementById('discPanel');
            p.classList.toggle('show');
            if(p.classList.contains('show')){
                document.getElementById('addCard').style.display='none';
                document.getElementById('togBtn').textContent='+ Add Item to Cart';
            }
        };

        /* ADD TO CART */
        window.addToCart=function(){
            const code=document.getElementById('prodSel').value;
            const qty=parseInt(document.getElementById('qtyInp').value);
            if(!code){toast('Select a product.','error');return;}
            if(isNaN(qty)||qty<1){toast('Enter a valid quantity.','error');return;}
            const prod=inventory.find(i=>i.code===code);
            if(!prod){toast('Product not found.','error');return;}
            if(prod.stock<qty){toast(`Only ${prod.stock} units available.`,'error');return;}

            const idx=cart.findIndex(i=>i.code===code);
            if(idx>-1){
                const nq=cart[idx].quantity+qty;
                if(nq>prod.stock){toast(`Cannot exceed stock (${prod.stock}).`,'error');return;}
                cart[idx].quantity=nq;cart[idx].subtotal=nq*prod.price;
                cart[idx].discount=0;cart[idx].total=cart[idx].subtotal;
            }else{
                cart.push({code:prod.code,name:prod.name,price:prod.price,quantity:qty,subtotal:qty*prod.price,discount:0,total:qty*prod.price,stock:prod.stock});
            }
            cartDiscount=0;document.getElementById('discInp').value='0';
            toast(`${prod.name} added.`);
            renderCart();saveCart();
            document.getElementById('qtyInp').value=1;
        };

        window.removeFromCart=function(i){
            cart.splice(i,1);
            if(!cart.length){cartDiscount=0;document.getElementById('discInp').value='0';}
            renderCart();saveCart();
        };

        window.clearCart=function(){
            if(!cart.length)return;
            if(!confirm('Clear cart?'))return;
            cart=[];cartDiscount=0;document.getElementById('discInp').value='0';
            renderCart();saveCart();
        };

        /* DISCOUNT */
        window.applyDiscount=function(){
            const amt=parseFloat(document.getElementById('discInp').value);
            if(isNaN(amt)||amt<0){toast('Enter a valid amount.','error');return;}
            if(!cart.length){toast('Cart is empty.','error');return;}
            const sub=cart.reduce((s,i)=>s+i.subtotal,0);
            if(amt>sub){toast(`Discount cannot exceed ZMW ${sub.toFixed(2)}.`,'error');return;}
            cartDiscount=amt;
            if(amt>0){
                cart=cart.map(i=>({...i,discount:amt*(i.subtotal/sub),total:i.subtotal-(amt*(i.subtotal/sub))}));
                const diff=sub-amt-cart.reduce((s,i)=>s+i.total,0);
                if(Math.abs(diff)>0.001){const big=cart.reduce((mx,i)=>i.subtotal>mx.subtotal?i:mx,cart[0]);big.total+=diff;big.discount-=diff;}
            }else{cart=cart.map(i=>({...i,discount:0,total:i.subtotal}));}
            toast(amt>0?`ZMW ${amt.toFixed(2)} discount applied.`:'Discount removed.');
            renderCart();saveCart();
        };

        /* RENDER CART */
        function renderCart(){
            const card=document.getElementById('cartCard'),tb=document.getElementById('cartTb'),totEl=document.getElementById('cartTot');
            if(!cart.length){card.style.display='none';return;}
            card.style.display='block';tb.innerHTML='';
            let grand=0,sub=0;
            cart.forEach((item,idx)=>{
                sub+=item.subtotal;grand+=item.total;
                const hasD=item.discount>0;
                const tr=document.createElement('tr');
                tr.innerHTML=`
                    <td><strong>${item.name}</strong><br><span style="font-size:.73rem;color:var(--text-fade)">${item.code}</span></td>
                    <td>ZMW ${item.price.toFixed(2)}</td>
                    <td>${item.quantity}</td>
                    <td>${hasD?`<span class="orig">ZMW ${item.subtotal.toFixed(2)}</span>`:''}<strong>ZMW ${item.total.toFixed(2)}</strong>${hasD?`<span class="dbadge">-${item.discount.toFixed(2)}</span>`:''}</td>
                    <td><button class="rm-btn" onclick="removeFromCart(${idx})">✕</button></td>`;
                tb.appendChild(tr);
            });
            if(cartDiscount>0){
                totEl.classList.add('disc');
                totEl.innerHTML=`<span class="orig">Subtotal ZMW ${sub.toFixed(2)}</span> &nbsp;Total: <strong>ZMW ${grand.toFixed(2)}</strong><span class="dbadge">Disc -${cartDiscount.toFixed(2)}</span>`;
            }else{totEl.classList.remove('disc');totEl.textContent=`Cart Total: ZMW ${grand.toFixed(2)}`;}
        }

        /* PROCESS CART */
        window.processCart=async function(){
            if(isProcessing)return;
            if(!cart.length){toast('Cart is empty.','error');return;}
            const saleDate=todayStr(),btn=document.getElementById('procBtn');
            isProcessing=true;btn.disabled=true;btn.innerHTML='<span class="spin"></span> Processing…';
            try{
                for(const item of cart){
                    await runTransaction(db,async tx=>{
                        const snap=await getDocs(query(collection(db,'inventory'),where('branchId','==',branchId),where('code','==',item.code)));
                        if(snap.empty)throw new Error(`${item.code} not found.`);
                        const invDoc=snap.docs[0];
                        if((invDoc.data().stock||0)<item.quantity)throw new Error(`Not enough stock for ${item.name}.`);
                        tx.update(doc(db,'inventory',invDoc.id),{stock:increment(-item.quantity),sold:increment(item.quantity)});
                        tx.set(doc(collection(db,'sales')),{date:saleDate,code:item.code,name:item.name,price:item.price,quantity:item.quantity,discount:item.discount||0,subtotal:item.subtotal,total:item.total,branchId,timestamp:serverTimestamp()});
                    });
                }
                if(!knownDates.includes(saleDate)){knownDates.unshift(saleDate);knownDates.sort((a,b)=>b.localeCompare(a));}
                if(currentDate!==saleDate)selectDate(saleDate);else renderChips();
                cart=[];cartDiscount=0;document.getElementById('discInp').value='0';
                renderCart();saveCart();toast('Sales processed successfully!');
            }catch(err){console.error(err);toast('Error: '+err.message,'error');}
            finally{btn.disabled=false;btn.innerHTML='✓ Process Sales';isProcessing=false;}
        };

        /* REVERSE */
        window.reverseSales=async function(){
            if(isProcessing)return;
            const boxes=Array.from(document.querySelectorAll('#salesTbl tbody input[type=checkbox]:checked'));
            if(!boxes.length)return;
            if(!confirm(`Reverse ${boxes.length} sale(s)?`))return;
            isProcessing=true;
            const btn=document.getElementById('revBtn');
            btn.disabled=true;btn.innerHTML='<span class="spin"></span> Reversing…';
            try{
                for(const box of boxes){
                    const sale=sales.find(s=>s.id===box.dataset.id);
                    if(!sale)continue;
                    await runTransaction(db,async tx=>{
                        const snap=await getDocs(query(collection(db,'inventory'),where('branchId','==',branchId),where('code','==',sale.code)));
                        if(!snap.empty)tx.update(doc(db,'inventory',snap.docs[0].id),{stock:increment(sale.quantity),sold:increment(-sale.quantity)});
                        tx.delete(doc(db,'sales',sale.id));
                    });
                }
                toast(`${boxes.length} sale(s) reversed.`);updateRevBar();
            }catch(err){console.error(err);toast('Error: '+err.message,'error');}
            finally{btn.disabled=false;btn.innerHTML='↩ Reverse Selected';isProcessing=false;}
        };

        /* LOCAL STORAGE CART */
        function saveCart(){localStorage.setItem(`cart_${branchId}`,JSON.stringify({items:cart,discount:cartDiscount}));}
        function loadCartFromStorage(){
            try{
                const raw=localStorage.getItem(`cart_${branchId}`);if(!raw)return;
                const d=JSON.parse(raw);cart=d.items||[];cartDiscount=d.discount||0;
                if(cartDiscount>0)document.getElementById('discInp').value=cartDiscount;
                renderCart();
            }catch(e){cart=[];cartDiscount=0;}
        }
    </script>
</head>
<body>
<div class="page-wrap">
    <!-- TOPBAR -->
    <div class="topbar">
        <div class="topbar-left">
            <span class="page-title" id="pageTitle">Sales Terminal</span>
            <div class="total-pill" id="totalPill">Sales (Today): <span>ZMW 0.00</span></div>
        </div>
        <div class="topbar-right">
            <a href="salestracker.html" class="btn btn-warning">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                Sales Tracker
            </a>
        </div>
    </div>

    <div class="main-content">
        <!-- LEFT PANEL -->
        <div class="left-panel">
            <div class="left-inner">
                <!-- Action row -->
                <div style="display:flex;gap:8px;">
                    <button class="btn btn-success" id="togBtn" onclick="toggleForm()" style="flex:2;">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                        + Add Item to Cart
                    </button>
                    <button class="btn btn-discount" onclick="toggleDisc()" style="flex:1;">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M17 17h.01M6.93 17.07L17.07 6.93M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        Discount
                    </button>
                </div>

                <!-- Discount panel -->
                <div class="disc-panel" id="discPanel">
                    <label>Apply Fixed Discount to Entire Cart</label>
                    <div class="disc-row">
                        <input type="number" id="discInp" min="0" step="0.01" value="0" placeholder="Amount (ZMW)">
                        <button class="btn btn-discount" onclick="applyDiscount()">Apply</button>
                    </div>
                    <span style="font-size:.77rem;color:#7b1fa2;">Split proportionally across all items in cart.</span>
                </div>

                <!-- Add item form -->
                <div class="card" id="addCard" style="display:none;">
                    <div class="card-hdr">
                        <h3>
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" width="15" height="15"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
                            Add Item
                        </h3>
                    </div>
                    <div class="card-body">
                        <div class="fg"><label>Product</label>
                            <select id="prodSel"><option value="">— Select Product —</option></select>
                        </div>
                        <div class="fg"><label>Quantity</label>
                            <input type="number" id="qtyInp" min="1" value="1">
                        </div>
                        <div style="display:flex;gap:8px;margin-top:4px;">
                            <button class="btn btn-primary" onclick="addToCart()" style="flex:2;justify-content:center;">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                                Add to Cart
                            </button>
                            <button class="btn btn-ghost" onclick="toggleForm()" style="flex:1;justify-content:center;">Cancel</button>
                        </div>
                    </div>
                </div>

                <!-- Cart card -->
                <div class="card" id="cartCard" style="display:none;">
                    <div class="card-hdr">
                        <h3>
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" width="15" height="15"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
                            Cart
                        </h3>
                    </div>
                    <div class="cart-wrap">
                        <table class="ct">
                            <thead><tr><th>Product</th><th>Price</th><th>Qty</th><th>Total</th><th></th></tr></thead>
                            <tbody id="cartTb"></tbody>
                        </table>
                    </div>
                    <div class="cart-foot">
                        <div class="cart-total" id="cartTot">Cart Total: ZMW 0.00</div>
                    </div>
                    <div class="cart-acts">
                        <button class="btn btn-success" id="procBtn" onclick="processCart()">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                            Process Sales
                        </button>
                        <button class="btn btn-danger" onclick="clearCart()">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                            Clear
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- RIGHT PANEL — SALES HISTORY -->
        <div class="right-panel">

            <!-- Quick date chips -->
            <div class="chips-row">
                <span class="chips-label">History:</span>
                <div style="display:flex;gap:5px;flex-wrap:wrap;" id="chips"></div>
            </div>

            <!-- Date picker -->
            <div class="date-bar">
                <label>Jump to date</label>
                <input type="date" id="dateInput">
                <button class="btn btn-primary" onclick="filterByDate()">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 115 11a6 6 0 0112 0z"/></svg>
                    Go
                </button>
            </div>

            <!-- Reverse bar -->
            <div class="rev-bar" id="revBar">
                <span id="revLabel">0 sales selected</span>
                <button class="btn btn-danger" id="revBtn" onclick="reverseSales()">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"/></svg>
                    Reverse Selected
                </button>
            </div>

            <!-- Sales table -->
            <div class="card tcard">
                <div class="tscroll">
                    <table class="st" id="salesTbl">
                        <thead>
                            <tr>
                                <th width="34px">
                                    <input type="checkbox" title="Select all" onchange="document.querySelectorAll('#salesTbl tbody input[type=checkbox]').forEach(cb=>cb.checked=this.checked);updateRevBar();">
                                </th>
                                <th>Date</th><th>Code</th><th>Product</th><th>Price</th><th>Qty</th><th>Discount</th><th>Total</th>
                            </tr>
                        </thead>
                        <tbody><tr class="empty-row"><td colspan="8">Loading…</td></tr></tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TriSmart Stores | Inventory View & Edit</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --bg:#f4f6fb; --bg2:#fff; --bg3:#f1f3f5;
            --border:#e2e6ef; --border2:#cdd3e0;
            --text:#1a1e2e; --fade:#6b7490; --dim:#a0a8c0;
            --blue:#4361ee; --cyan:#00b4d8; --green:#10b981;
            --orange:#f59e0b; --pink:#f72585; --danger:#ef4444;
            --r:10px; --r-lg:16px;
            --hdr:52px; --sw:220px;
        }
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;font-size:13px}

        /* ── TOPBAR ── */
        .topbar{position:fixed;top:0;left:0;right:0;height:var(--hdr);background:rgba(255,255,255,0.95);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 10px;z-index:1100}
        .topbar-left{display:flex;align-items:center;gap:8px}
        .menu-btn{width:32px;height:32px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.85rem;color:var(--fade)}
        .logo-mark{width:28px;height:28px;background:linear-gradient(135deg,var(--blue),var(--cyan));border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.75rem}
        .logo-text{font-weight:800;font-size:.85rem}
        .logo-text span{color:var(--blue)}
        .branch-badge{background:linear-gradient(135deg,var(--green),#059669);color:#fff;padding:2px 7px;border-radius:100px;font-size:.55rem;font-weight:800}
        .time-badge{background:var(--bg3);border:1px solid var(--border2);border-radius:100px;padding:3px 9px;font-family:'DM Mono',monospace;font-size:.6rem;color:var(--fade)}

        /* ── SIDEBAR ── */
        .sidebar{position:fixed;top:var(--hdr);left:0;width:var(--sw);height:calc(100vh - var(--hdr));background:rgba(255,255,255,0.98);border-right:1px solid var(--border);padding:10px 8px 14px;z-index:1000;transition:transform .28s cubic-bezier(.4,0,.2,1);overflow-y:auto;display:flex;flex-direction:column}
        .sidebar.hidden{transform:translateX(-100%)}
        .sb-label{font-size:.55rem;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.14em;padding:0 8px;margin:10px 0 4px}
        .sidebar a{display:flex;align-items:center;gap:8px;padding:8px 10px;color:var(--fade);text-decoration:none;font-size:.76rem;font-weight:500;border-radius:var(--r);margin-bottom:2px;transition:all .15s}
        .sidebar a i{width:14px;text-align:center;font-size:.78rem}
        .sidebar a:hover{background:rgba(67,97,238,.08);color:var(--blue)}
        .sidebar a.active{background:rgba(67,97,238,.12);color:var(--blue);font-weight:700}
        .logout-link{margin-top:auto;display:flex;align-items:center;gap:8px;padding:8px 10px;color:var(--danger);font-size:.76rem;font-weight:700;border-radius:var(--r);border:1px solid rgba(239,68,68,.15);background:rgba(239,68,68,.04);cursor:pointer;transition:all .15s}
        .logout-link:hover{background:rgba(239,68,68,.1)}
        .sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;backdrop-filter:blur(3px)}
        .sb-overlay.show{display:block}

        /* ── MAIN ── */
        main{margin-top:var(--hdr);margin-left:var(--sw);padding:12px 10px 28px;transition:margin-left .28s cubic-bezier(.4,0,.2,1)}

        /* ── STATS ROW ── */
        .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
        .stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:12px 10px}
        .stat-label{font-size:.58rem;font-weight:700;color:var(--fade);text-transform:uppercase;margin-bottom:3px}
        .stat-value{font-size:1.2rem;font-weight:800;color:var(--blue);font-family:'DM Mono',monospace}

        /* ── CONTENT BAR ── */
        .content-bar{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:10px 12px;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:.75rem;font-weight:600}
        .inv-value-pill{font-family:'DM Mono',monospace;font-weight:800;color:var(--green);font-size:.85rem}

        /* ── TABS (only inventory remains, but keep structure for simplicity) ── */
        .tab-bar{display:flex;gap:3px;margin-bottom:12px;border-bottom:1px solid var(--border)}
        .tab-btn{padding:7px 14px;background:none;border:none;font-weight:700;font-size:.72rem;color:var(--fade);cursor:pointer;border-bottom:2px solid transparent}
        .tab-btn.active{color:var(--blue);border-bottom-color:var(--blue)}
        .tab-content{display:none}
        .tab-content.active{display:block}

        /* ── ACTION BAR ── */
        .action-flex{display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap}
        .search-wrap{flex:1;position:relative;min-width:120px}
        .search-wrap input{width:100%;padding:7px 7px 7px 26px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg3);font-size:.72rem;outline:none}
        .search-icon{position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:.65rem;color:var(--dim)}
        .btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--r);font-weight:700;font-size:.7rem;cursor:pointer;border:none;transition:.15s;white-space:nowrap}
        .btn-primary{background:var(--blue);color:#fff}
        .btn-danger{background:var(--danger);color:#fff}
        .btn-sm{padding:4px 10px;font-size:.65rem;background:var(--bg3);color:var(--text);border:1px solid var(--border)}

        /* ── TABLE ── */
        .table-card{background:var(--bg2);border-radius:var(--r-lg);border:1px solid var(--border);overflow:hidden}
        .table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
        table{width:100%;border-collapse:collapse;min-width:320px}
        th{text-align:left;padding:10px 8px;background:#fafbff;font-size:.55rem;text-transform:uppercase;color:var(--fade);border-bottom:1px solid var(--border);white-space:nowrap}
        td{padding:9px 8px;font-size:.72rem;border-bottom:1px solid #f0f2f8;vertical-align:middle}
        tr:last-child td{border-bottom:none}
        .code-chip{font-family:'DM Mono',monospace;background:#eef2ff;padding:2px 7px;border-radius:20px;font-size:.6rem;font-weight:700;color:var(--blue)}
        .stock-chip{padding:2px 8px;border-radius:40px;font-weight:800;display:inline-block;font-size:.62rem}
        .empty-row td{text-align:center;padding:28px;color:var(--fade)}

        /* ── 3-DOT MENU ── */
        .dots-wrap{position:relative;display:inline-block}
        .dots-btn{background:none;border:1px solid var(--border);border-radius:7px;width:26px;height:26px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:2px;padding:2px}
        .dots-btn .dot{width:3px;height:3px;background:var(--fade);border-radius:50%}
        .dots-menu{position:absolute;right:0;top:calc(100% + 4px);background:#fff;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.13);min-width:120px;display:none;z-index:400;border:1px solid var(--border);overflow:hidden}
        .dots-menu.open{display:block}
        .dots-item{display:flex;align-items:center;gap:8px;width:100%;padding:9px 13px;background:none;border:none;cursor:pointer;font-weight:600;font-size:.7rem;transition:background .12s}
        .dots-item:hover{background:var(--bg3)}
        .dots-item.edit{color:var(--blue)}
        .dots-item.delete{color:var(--danger);border-top:1px solid var(--border)}

        /* ── MODALS ── */
        .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:2000;padding:12px;backdrop-filter:blur(3px)}
        .modal-box{background:#fff;border-radius:18px;padding:18px;width:100%;max-width:400px;max-height:90vh;overflow-y:auto;animation:popIn .2s ease}
        @keyframes popIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
        .modal-box h3{font-size:.88rem;font-weight:800;margin-bottom:14px}
        .form-actions{display:flex;gap:8px;margin-top:14px}
        .form-actions .btn{flex:1;justify-content:center}

        /* ── TOAST ── */
        .toast-wrap{position:fixed;bottom:14px;right:10px;z-index:9999;display:flex;flex-direction:column;gap:5px}
        .toast{background:#1f2937;color:#fff;padding:7px 13px;border-radius:30px;font-size:.67rem;font-weight:600;display:flex;align-items:center;gap:6px;animation:toastIn .25s ease;box-shadow:0 4px 16px rgba(0,0,0,.2)}
        @keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        .toast.error{background:#ef4444}
        .toast.success{background:#10b981}

        /* ── PASSWORD GATE ── */
        .pw-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:3000;backdrop-filter:blur(6px)}
        .pw-box{background:#fff;border-radius:20px;padding:24px;width:calc(100% - 32px);max-width:320px;text-align:center;animation:popIn .25s ease}
        .pw-box .lock-icon{font-size:2rem;margin-bottom:10px;color:var(--blue)}
        .pw-box h3{font-size:.95rem;font-weight:800;margin-bottom:4px}
        .pw-box p{font-size:.68rem;color:var(--fade);margin-bottom:14px}
        .pw-box input{width:100%;padding:9px;border:1px solid var(--border);border-radius:var(--r);text-align:center;font-size:.85rem;letter-spacing:.2em;margin-bottom:10px;outline:none;font-family:'DM Mono',monospace}
        .pw-box input:focus{border-color:var(--blue)}
        .pw-error{color:var(--danger);font-size:.65rem;margin-top:-6px;margin-bottom:8px;display:none}

        /* ── RESPONSIVE ── */
        @media(max-width:640px){
            .sidebar{transform:translateX(-100%)}
            .sidebar.visible{transform:translateX(0)!important}
            main{margin-left:0!important}
            .stats-row{grid-template-columns:1fr 1fr}
            .stat-card:first-child{grid-column:1/-1}
            .stat-value{font-size:1rem}
            .time-badge{display:none}
            :root{--sw:230px}
        }
        @media(min-width:641px){
            .sidebar{transform:translateX(0)}
            .sidebar.hidden{transform:translateX(-100%)}
        }
    </style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
    <div class="topbar-left">
        <div class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></div>
        <div class="logo-mark"><i class="fas fa-warehouse"></i></div>
        <div class="logo-text">Tri<span>smart</span></div>
        <div class="branch-badge" id="branchBadge"><i class="fas fa-store"></i> BRANCH</div>
    </div>
    <div class="time-badge" id="timeBadge">--:--</div>
</header>

<!-- SIDEBAR -->
<nav class="sidebar" id="sidebar">
    <div class="sb-label">Main</div>
    <a href="Airtel.html"><i class="fas fa-mobile-alt"></i> Airtel Money</a>
    <a href="warehouse.html" class="active"><i class="fas fa-warehouse"></i> Warehouse</a>
    <a href="sale.html"><i class="fas fa-chart-line"></i> Sales</a>
    <div class="sb-label">Tools</div>
    <a href="Todo.html"><i class="fas fa-tasks"></i> To-Do</a>
    <a href="lowstock.html"><i class="fas fa-exclamation-triangle"></i> Low Stock</a>
    <a href="Report.html"><i class="fas fa-file-alt"></i> Daily Report</a>
    <div class="logout-link" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Sign out</div>
</nav>
<div class="sb-overlay" id="sbOverlay"></div>

<!-- MAIN -->
<main id="mainContent">
    <!-- Stats row (visible for admin) -->
    <div class="stats-row" id="statsRow" style="display:none">
        <div class="stat-card"><div class="stat-label">Products</div><div class="stat-value" id="statItems">0</div></div>
        <div class="stat-card"><div class="stat-label">Total Stock</div><div class="stat-value" id="statStock">0</div></div>
        <div class="stat-card"><div class="stat-label">Inv. Value</div><div class="stat-value" id="statValue">K0</div></div>
    </div>

    <!-- Content Bar -->
    <div class="content-bar">
        <div style="display:flex;align-items:center;gap:6px"><i class="fas fa-archive" style="color:var(--blue)"></i> <span id="branchNameDisplay">Warehouse</span></div>
        <div class="inv-value-pill" id="totalStockPill">K0.00</div>
    </div>

    <!-- Single Tab: Inventory (removed Transfers tab entirely) -->
    <div class="tab-bar">
        <button class="tab-btn active" data-tab="inventory"><i class="fas fa-boxes"></i> Inventory (View & Edit)</button>
    </div>

    <!-- INVENTORY TAB (always active) -->
    <div class="tab-content active" id="tabInventory">
        <div class="action-flex">
            <div class="search-wrap"><i class="fas fa-search search-icon"></i><input type="text" id="searchInput" placeholder="Search code or name…"></div>
            <!-- Add button visible only for admin (Chris) -->
            <button class="btn btn-primary" id="addInventoryBtn" style="display:none"><i class="fas fa-plus"></i> Add Product</button>
        </div>

        <div class="table-card">
            <div class="table-scroll">
                <table>
                    <thead>
                        <tr>
                            <th>Code</th>
                            <th>Product</th>
                            <th>Price</th>
                            <th>Stock</th>
                            <th id="actionsTh" style="display:none"></th>
                        </tr>
                    </thead>
                    <tbody id="inventoryTbody"><tr class="empty-row"><td colspan="5">Loading…</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<div class="toast-wrap" id="toastContainer"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.5.0/firebase-app.js";
import { getFirestore, collection, query, where, getDocs, addDoc, updateDoc, deleteDoc, doc, onSnapshot, orderBy, writeBatch }
    from "https://www.gstatic.com/firebasejs/11.5.0/firebase-firestore.js";

// Firebase config
const db = getFirestore(initializeApp({
    apiKey:"AIzaSyB-lm7Y3r1F6VvY8PKvY8glLabZDbJsHM1k",
    authDomain:"trismartstores.firebaseapp.com",
    projectId:"trismartstores",
    storageBucket:"trismartstores.appspot.com",
    messagingSenderId:"416692703333",
    appId:"1:416692703333:web:d4b60292621435c748f68c"
}));

/* ─── AUTH & BRANCH ─── */
const branchId = localStorage.getItem('branchId');
const loggedInUser = (localStorage.getItem('loggedInUser') || localStorage.getItem('userName') || '').toLowerCase().trim();
if (!branchId) { alert("Missing branch. Please login."); window.location.href = "dashboard.html"; }

const branches = {
    makeni: { id:'makeni', name:'Kabanana Branch' },
    kabana: { id:'kabana', name:'Makeni Branch' }
};
const currentBranch = branches[branchId] || { name: branchId, id: branchId };
document.getElementById('branchNameDisplay').innerText = currentBranch.name;
document.getElementById('branchBadge').innerHTML = `<i class="fas fa-store"></i> ${currentBranch.name.toUpperCase()}`;

const isAdmin = loggedInUser === 'chris';
const isWarehouseMan = loggedInUser === 'warehouseman';
const canEdit = isAdmin || isWarehouseMan;   // anyone with editing rights still needs password for modification

/* ─── PASSWORD SYSTEM ─── */
let editUnlocked = false;
const EDIT_PASSWORD = 'Abc12345';

function promptPassword(onSuccess) {
    const overlay = document.createElement('div');
    overlay.className = 'pw-overlay';
    overlay.innerHTML = `
        <div class="pw-box">
            <div class="lock-icon"><i class="fas fa-lock"></i></div>
            <h3>Edit Protected</h3>
            <p>Enter password to edit inventory</p>
            <input type="password" id="pwInput" placeholder="••••••••" autocomplete="off">
            <div class="pw-error" id="pwError">Incorrect password</div>
            <button class="btn btn-primary" style="width:100%;justify-content:center" id="pwSubmit"><i class="fas fa-unlock"></i> Unlock</button>
        </div>`;
    document.body.appendChild(overlay);
    const input = overlay.querySelector('#pwInput');
    const errEl = overlay.querySelector('#pwError');
    input.focus();
    const submit = () => {
        if (input.value === EDIT_PASSWORD) {
            editUnlocked = true;
            overlay.remove();
            onSuccess();
        } else {
            errEl.style.display = 'block';
            input.value = '';
            input.focus();
        }
    };
    overlay.querySelector('#pwSubmit').onclick = submit;
    input.addEventListener('keydown', e => { if(e.key==='Enter') submit(); });
    overlay.onclick = e => { if(e.target===overlay) overlay.remove(); };
}

function withEditAuth(action) {
    if (editUnlocked) { action(); }
    else { promptPassword(action); }
}

/* ─── UI BASED ON ROLE ─── */
if (isAdmin) {
    document.getElementById('statsRow').style.display = 'grid';
    document.getElementById('addInventoryBtn').style.display = 'inline-flex';
    document.getElementById('actionsTh').style.display = 'table-cell';
} else if (isWarehouseMan) {
    document.getElementById('actionsTh').style.display = 'table-cell';
} else {
    document.getElementById('actionsTh').style.display = 'none';
}

let inventory = [];
let unsubInventory = null;

function toast(msg, type='success') {
    const c = document.getElementById('toastContainer');
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.innerHTML = `<i class="fas ${type==='error'?'fa-exclamation-triangle':'fa-check-circle'}"></i> ${msg}`;
    c.appendChild(el);
    setTimeout(()=>el.remove(), 2800);
}

function esc(s) {
    return String(s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function updateStats(inv) {
    const totalStock = inv.reduce((s,i)=>s+i.stock,0);
    const totalValue = inv.reduce((s,i)=>s+(i.price*i.stock),0);
    if(isAdmin) {
        document.getElementById('statItems').innerText = inv.length;
        document.getElementById('statStock').innerText = totalStock;
        document.getElementById('statValue').innerHTML = `K${totalValue.toFixed(0)}`;
    }
    document.getElementById('totalStockPill').innerHTML = `K${totalValue.toFixed(2)}`;
}

function closeAllMenus() { document.querySelectorAll('.dots-menu.open').forEach(m=>m.classList.remove('open')); }
document.addEventListener('click', closeAllMenus);

window.toggleMenu = (e, id) => {
    e.stopPropagation();
    const m = document.getElementById('dm-'+id);
    const open = m.classList.contains('open');
    closeAllMenus();
    if(!open) m.classList.add('open');
};

/* ─── EDIT ITEM (with password) ─── */
window.editItem = (id) => {
    withEditAuth(() => {
        const item = inventory.find(i=>i.id===id);
        if(!item) return;
        const modal = document.createElement('div');
        modal.className = 'modal-bg';
        modal.innerHTML = `
            <div class="modal-box">
                <h3>✏️ Edit Product</h3>
                <form id="editFormModal">
                    <div class="field-group"><label>Code</label><input name="code" value="${esc(item.code)}" required></div>
                    <div class="field-group"><label>Name</label><input name="name" value="${esc(item.name)}" required></div>
                    <div class="field-group"><label>Price (K)</label><input name="price" type="number" step="0.01" value="${item.price}" required></div>
                    <div class="field-group"><label>Stock</label><input name="stock" type="number" value="${item.stock}" required></div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                        <button type="button" class="btn btn-sm" id="closeEditModal">Cancel</button>
                    </div>
                </form>
            </div>`;
        document.body.appendChild(modal);
        modal.querySelector('#editFormModal').onsubmit = async (e) => {
            e.preventDefault();
            const code = e.target.code.value.trim().toUpperCase();
            const name = e.target.name.value.trim();
            const price = parseFloat(e.target.price.value);
            const stock = parseInt(e.target.stock.value);
            if(!code||!name||isNaN(price)||price<0||isNaN(stock)||stock<0) return toast("Invalid data","error");
            if(code!==item.code && inventory.some(i=>i.code===code && i.id!==item.id)) return toast("Code already exists","error");
            try {
                await updateDoc(doc(db,'inventory',item.id),{code,name,price,stock});
                modal.remove(); toast("Product updated successfully");
            } catch(err) { toast(err.message,"error"); }
        };
        modal.querySelector('#closeEditModal').onclick = ()=>modal.remove();
        modal.onclick = e=>{ if(e.target===modal) modal.remove(); };
    });
};

/* ─── DELETE ITEM (with password) ─── */
window.deleteItem = (id) => {
    withEditAuth(async () => {
        const item = inventory.find(i=>i.id===id);
        if(!item) return;
        if(!confirm(`Permanently delete "${item.name}"? This action cannot be undone.`)) return;
        try {
            await deleteDoc(doc(db,'inventory',id));
            toast(`${item.code} deleted`);
        } catch(err) { toast(err.message,"error"); }
    });
};

/* ─── RENDER INVENTORY TABLE ─── */
function renderTable() {
    const tbody = document.getElementById('inventoryTbody');
    const search = document.getElementById('searchInput').value.toLowerCase();
    let filtered = inventory.filter(i=>i.name?.toLowerCase().includes(search)||i.code?.toLowerCase().includes(search));
    tbody.innerHTML = '';
    if(!filtered.length) {
        const cols = canEdit ? 5 : 4;
        tbody.innerHTML = `<tr class="empty-row"><td colspan="${cols}">No products found</td></tr>`;
        return;
    }
    filtered.forEach(item => {
        const bg = item.stock===0?'#fee2e2':item.stock<5?'#fff3e0':'#d1fae5';
        const tc = item.stock===0?'#b91c1c':item.stock<5?'#b45309':'#065f46';
        let actHtml = '';
        if(canEdit) {
            actHtml = `<td>
                <div class="dots-wrap">
                    <button class="dots-btn" onclick="toggleMenu(event,'${item.id}')">
                        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
                    </button>
                    <div class="dots-menu" id="dm-${item.id}">
                        <button class="dots-item edit" onclick="closeAllMenus();editItem('${item.id}')"><i class="fas fa-edit"></i> Edit</button>
                        <button class="dots-item delete" onclick="closeAllMenus();deleteItem('${item.id}')"><i class="fas fa-trash-alt"></i> Delete</button>
                    </div>
                </div>
            </td>`;
        }
        const row = tbody.insertRow();
        row.innerHTML = `
            <td><span class="code-chip">${esc(item.code)}</span></td>
            <td><strong>${esc(item.name)}</strong></td>
            <td>K${item.price.toFixed(2)}</td>
            <td><span class="stock-chip" style="background:${bg};color:${tc}">${item.stock}</span></td>
            ${actHtml}`;
    });
}

/* ─── INVENTORY LISTENER ─── */
function setupInventoryListener() {
    if(unsubInventory) unsubInventory();
    const q = query(collection(db,'inventory'), where('branchId','==',branchId));
    unsubInventory = onSnapshot(q, snap => {
        inventory = snap.docs.map(d=>({id:d.id,...d.data(),stock:Number(d.data().stock)||0,price:Number(d.data().price)||0}));
        inventory.sort((a,b)=>(a.code||'').localeCompare(b.code||''));
        updateStats(inventory);
        renderTable();
    });
}

/* ─── ADD PRODUCT (only admin with password) ─── */
document.getElementById('addInventoryBtn')?.addEventListener('click', () => {
    if(!isAdmin) return;
    withEditAuth(() => {
        const modal = document.createElement('div');
        modal.className = 'modal-bg';
        modal.innerHTML = `
            <div class="modal-box">
                <h3><i class="fas fa-plus"></i> Add New Product</h3>
                <form id="addProductForm">
                    <div class="field-group"><label>Product Code</label><input name="code" required placeholder="e.g. ELEC-01"></div>
                    <div class="field-group"><label>Product Name</label><input name="name" required></div>
                    <div class="field-group"><label>Price (K)</label><input name="price" type="number" step="0.01" required></div>
                    <div class="field-group"><label>Initial Stock</label><input name="stock" type="number" value="0" required></div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Create Product</button>
                        <button type="button" class="btn btn-sm" id="closeAddModal">Cancel</button>
                    </div>
                </form>
            </div>`;
        document.body.appendChild(modal);
        modal.querySelector('#addProductForm').onsubmit = async (e) => {
            e.preventDefault();
            const code = e.target.code.value.trim().toUpperCase();
            const name = e.target.name.value.trim();
            const price = parseFloat(e.target.price.value);
            const stock = parseInt(e.target.stock.value);
            if(!code||!name||isNaN(price)||price<0||isNaN(stock)) return toast("Invalid fields","error");
            if(inventory.some(i=>i.code===code)) return toast("Code already exists","error");
            try {
                await addDoc(collection(db,'inventory'),{code,name,price,stock,sold:0,branchId});
                modal.remove(); toast(`${code} added successfully`);
            } catch(err) { toast(err.message,"error"); }
        };
        modal.querySelector('#closeAddModal').onclick = ()=>modal.remove();
        modal.onclick = e=>{ if(e.target===modal) modal.remove(); };
    });
});

/* ─── SEARCH LISTENER ─── */
document.getElementById('searchInput').addEventListener('input', renderTable);

/* ─── SIDEBAR / MENU LOGIC (unchanged but functional) ─── */
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('sbOverlay');
const menuBtn = document.getElementById('menuBtn');
const mainEl  = document.getElementById('mainContent');
const mobile  = () => window.innerWidth <= 640;

function initSidebar() {
    if(!mobile()) {
        sidebar.classList.remove('hidden');
        mainEl.style.marginLeft = '220px';
    } else {
        sidebar.classList.remove('visible');
        mainEl.style.marginLeft = '0';
    }
}
menuBtn.addEventListener('click', () => {
    if(mobile()) {
        const open = sidebar.classList.contains('visible');
        if(open) { sidebar.classList.remove('visible'); overlay.classList.remove('show'); }
        else { sidebar.classList.add('visible'); overlay.classList.add('show'); }
    } else {
        const hidden = sidebar.classList.contains('hidden');
        if(hidden) { sidebar.classList.remove('hidden'); mainEl.style.marginLeft='220px'; }
        else { sidebar.classList.add('hidden'); mainEl.style.marginLeft='0'; }
    }
});
overlay.addEventListener('click', ()=>{ sidebar.classList.remove('visible'); overlay.classList.remove('show'); });
window.addEventListener('resize', initSidebar);
initSidebar();

/* ─── CLOCK ─── */
function updateClock() { document.getElementById('timeBadge').innerText = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }
setInterval(updateClock,1000); updateClock();

/* ─── LOGOUT ─── */
document.getElementById('logoutBtn').addEventListener('click', ()=>{ localStorage.clear(); window.location.href='index.html'; });

// Start inventory listener
setupInventoryListener();

// Note: The "Transfers" section, "Transfers Tab", and all transfer-related UI & logic have been completely removed.
// No cross-branch transfer functionality remains. Password protection is enforced for any edit/add/delete action.
</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trismart — Branch Warehouse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'DM Sans', sans-serif;
            background: #f4f6fb;
            color: #1a1e2e;
        }
        
        /* Header */
        .header {
            background: white;
            border-bottom: 1px solid #e2e6ef;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }
        
        .logo {
            font-size: 1.2rem;
            font-weight: 800;
        }
        
        .logo span {
            color: #4361ee;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .user-name {
            font-weight: 600;
            color: #4361ee;
        }
        
        .branch-badge {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .logout-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.75rem;
        }
        
        .logout-btn:hover {
            background: #dc2626;
        }
        
        /* Main Content */
        .main {
            margin-top: 70px;
            padding: 20px;
        }
        
        /* Stats Cards */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #e2e6ef;
        }
        
        .stat-label {
            font-size: 0.7rem;
            color: #6b7490;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        
        .stat-value {
            font-size: 1.5rem;
            font-weight: 800;
            color: #4361ee;
        }
        
        /* Search & Filter */
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .search-box {
            flex: 1;
            position: relative;
        }
        
        .search-box input {
            width: 100%;
            padding: 10px 35px 10px 12px;
            border: 1px solid #e2e6ef;
            border-radius: 10px;
            font-size: 0.85rem;
            font-family: 'DM Sans', sans-serif;
        }
        
        .search-box i {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #a0a8c0;
        }
        
        /* Table */
        .table-container {
            background: white;
            border-radius: 12px;
            border: 1px solid #e2e6ef;
            overflow-x: auto;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            background: #f8f9ff;
            padding: 12px;
            text-align: left;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #6b7490;
            border-bottom: 1px solid #e2e6ef;
        }
        
        td {
            padding: 12px;
            font-size: 0.85rem;
            border-bottom: 1px solid #f0f2f8;
        }
        
        tr:last-child td {
            border-bottom: none;
        }
        
        tr:hover td {
            background: #f8f9ff;
        }
        
        .code-badge {
            font-family: 'DM Mono', monospace;
            background: #eef2ff;
            color: #4361ee;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        
        .stock-badge {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            display: inline-block;
        }
        
        .stock-high {
            background: rgba(16, 185, 129, 0.1);
            color: #065f46;
        }
        
        .stock-medium {
            background: rgba(245, 158, 11, 0.12);
            color: #92400e;
        }
        
        .stock-low {
            background: rgba(239, 68, 68, 0.1);
            color: #991b1b;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #a0a8c0;
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 15px;
            opacity: 0.5;
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1e2029;
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        
        .toast.success {
            border-left: 3px solid #10b981;
        }
        
        .toast.error {
            border-left: 3px solid #ef4444;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        /* Loading */
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(244, 246, 251, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e2e6ef;
            border-top-color: #4361ee;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 600px) {
            .main {
                padding: 15px;
            }
            .stats {
                grid-template-columns: 1fr 1fr;
            }
            th, td {
                padding: 8px;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>

<div id="loadingOverlay" class="loading">
    <div class="spinner"></div>
</div>

<header class="header">
    <div class="logo">Tri<span>smart</span> <span style="font-size: 0.7rem;">Branch</span></div>
    <div class="user-info">
        <span class="branch-badge" id="branchName">Loading...</span>
        <span class="user-name" id="userName"></span>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
</header>

<div class="main">
    <div class="stats">
        <div class="stat-card">
            <div class="stat-label">Total Products</div>
            <div class="stat-value" id="totalProducts">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Total Stock Value</div>
            <div class="stat-value" id="totalValue">K0.00</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Low Stock Items</div>
            <div class="stat-value" id="lowStockCount">0</div>
        </div>
    </div>
    
    <div class="controls">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search by code or name...">
            <i class="fas fa-search"></i>
        </div>
    </div>
    
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Code</th>
                    <th>Product Name</th>
                    <th>Price (ZMW)</th>
                    <th>Stock</th>
                    <th>Total Value</th>
                </tr>
            </thead>
            <tbody id="inventoryTable">
                <tr>
                    <td colspan="5" class="empty-state">
                        <i class="fas fa-box-open"></i>
                        <div>Loading inventory...</div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<div id="toastContainer"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.5.0/firebase-app.js";
    import {
        getFirestore,
        collection,
        query,
        where,
        onSnapshot,
        orderBy
    } from "https://www.gstatic.com/firebasejs/11.5.0/firebase-firestore.js";

    // Firebase config
    const firebaseConfig = {
        apiKey: "AIzaSyB-lm7Y3r1F6VvY8PKvY8glLabZDbJsHM1k",
        authDomain: "trismartstores.firebaseapp.com",
        projectId: "trismartstores",
        storageBucket: "trismartstores.appspot.com",
        messagingSenderId: "416692703333",
        appId: "1:416692703333:web:d4b60292621435c748f68c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Get logged in user
    const userName = localStorage.getItem('userName') || '';
    
    // Map users to branches
    const userBranches = {
        'miriam': { id: 'makeni', name: 'Kabanana Branch' },
        'margret': { id: 'kabana', name: 'Makeni Branch' }
    };
    
    // Check if user is authorized
    if (!userName || !userBranches[userName.toLowerCase()]) {
        alert('Unauthorized access. Please login first.');
        window.location.href = 'index.html';
    }
    
    const userBranch = userBranches[userName.toLowerCase()];
    
    // Display user info
    document.getElementById('userName').textContent = userName.charAt(0).toUpperCase() + userName.slice(1);
    document.getElementById('branchName').textContent = userBranch.name;
    document.title = `${userBranch.name} - Trismart`;
    
    let inventory = [];
    let unsubscribe = null;
    
    // Show toast message
    function showToast(message, type = 'success') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `
            <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i>
            <span>${message}</span>
        `;
        container.appendChild(toast);
        
        setTimeout(() => {
            toast.remove();
        }, 3000);
    }
    
    // Hide loading overlay
    function hideLoading() {
        const loading = document.getElementById('loadingOverlay');
        if (loading) {
            loading.style.opacity = '0';
            setTimeout(() => {
                loading.style.display = 'none';
            }, 300);
        }
    }
    
    // Update stats
    function updateStats() {
        const totalProducts = inventory.length;
        const totalValue = inventory.reduce((sum, item) => sum + (item.price * item.stock), 0);
        const lowStock = inventory.filter(item => item.stock < 10 && item.stock > 0).length;
        
        document.getElementById('totalProducts').textContent = totalProducts;
        document.getElementById('totalValue').textContent = `K${totalValue.toFixed(2)}`;
        document.getElementById('lowStockCount').textContent = lowStock;
    }
    
    // Render inventory table
    function renderTable(items) {
        const tbody = document.getElementById('inventoryTable');
        
        if (!items.length) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="5" class="empty-state">
                        <i class="fas fa-box-open"></i>
                        <div>No products found in ${userBranch.name}</div>
                    </td>
                </tr>
            `;
            updateStats();
            return;
        }
        
        tbody.innerHTML = items.map(item => {
            let stockClass = 'stock-high';
            if (item.stock === 0) stockClass = 'stock-low';
            else if (item.stock < 10) stockClass = 'stock-medium';
            
            return `
                <tr>
                    <td><span class="code-badge">${item.code}</span></td>
                    <td style="font-weight: 500;">${item.name}</td>
                    <td>K${item.price.toFixed(2)}</td>
                    <td><span class="stock-badge ${stockClass}">${item.stock}</span></td>
                    <td>K${(item.price * item.stock).toFixed(2)}</td>
                </tr>
            `;
        }).join('');
        
        updateStats();
    }
    
    // Search functionality
    function searchInventory() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        if (!searchTerm) {
            renderTable(inventory);
            return;
        }
        
        const filtered = inventory.filter(item => 
            item.code.toLowerCase().includes(searchTerm) || 
            item.name.toLowerCase().includes(searchTerm)
        );
        renderTable(filtered);
    }
    
    // Set up real-time listener for branch inventory
    function setupListener() {
        if (unsubscribe) unsubscribe();
        
        const q = query(
            collection(db, 'inventory'),
            where('branchId', '==', userBranch.id),
            orderBy('code')
        );
        
        unsubscribe = onSnapshot(q, (snapshot) => {
            inventory = snapshot.docs.map(doc => ({
                id: doc.id,
                ...doc.data(),
                stock: Number(doc.data().stock) || 0,
                price: Number(doc.data().price) || 0
            }));
            
            renderTable(inventory);
            hideLoading();
            
        }, (error) => {
            console.error('Error loading inventory:', error);
            showToast('Error loading inventory: ' + error.message, 'error');
            hideLoading();
        });
    }
    
    // Logout function
    window.logout = function() {
        localStorage.removeItem('userName');
        localStorage.removeItem('branchId');
        window.location.href = 'index.html';
    };
    
    // Attach search event
    document.getElementById('searchInput').addEventListener('input', searchInventory);
    
    // Initialize
    setupListener();
    
    // Auto-refresh every 30 seconds
    setInterval(() => {
        if (unsubscribe) {
            unsubscribe();
            setupListener();
        }
    }, 30000);
</script>
</body>
</html>

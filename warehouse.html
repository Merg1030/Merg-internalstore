<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warehouse Inventory</title>
    <style>
        :root {
            --primary: #4361ee;
            --accent: #4cc9f0;
            --danger: #f72585;
            --warning: #f8961e;
            --success: #2ecc71;
            --master: #f8961e;
            --bg: #f4f6fb;
            --surface: #ffffff;
            --bg-lighter: #f1f3f5;
            --border: #dee2e6;
            --text: #212529;
            --text-fade: #6c757d;
            --radius: 10px;
            --radius-lg: 16px;
            --shadow: 0 2px 12px rgba(67,97,238,0.08);
            --shadow-lg: 0 8px 32px rgba(67,97,238,0.13);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Poppins', Tahoma, Geneva, Verdana, sans-serif; }
        html, body { height: 100%; background: var(--bg); color: var(--text); }
        body { min-height: 100vh; display: flex; }

        .page-wrap { width: 100vw; min-height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* ── TOP BAR ── */
        .topbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            min-height: 64px;
            box-shadow: var(--shadow);
            flex-shrink: 0;
        }
        .topbar-left { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .page-title { font-size: 1.1rem; font-weight: 700; color: var(--primary); white-space: nowrap; }
        .master-pill {
            display: none;
            background: linear-gradient(90deg, var(--master), #f3722c);
            color: white; font-size: 0.63rem; font-weight: 700;
            letter-spacing: 0.12em; text-transform: uppercase;
            padding: 3px 10px; border-radius: 100px;
        }
        .total-pill {
            background: linear-gradient(135deg, #eef2ff, #e0e7ff);
            border: 1px solid #c7d2fe; color: var(--primary);
            font-size: 0.82rem; font-weight: 600;
            padding: 6px 16px; border-radius: 100px; white-space: nowrap;
        }
        .total-pill span { font-weight: 800; }
        .topbar-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

        /* ── BUTTONS ── */
        .btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 16px; border: none; border-radius: var(--radius);
            cursor: pointer; font-size: 0.85rem; font-weight: 600;
            transition: all 0.18s; white-space: nowrap;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08); text-decoration: none;
        }
        .btn svg { width: 15px; height: 15px; flex-shrink: 0; }
        .btn-primary { background: linear-gradient(135deg, var(--primary), #3a56d4); color: white; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(67,97,238,0.3); }
        .btn-success { background: linear-gradient(135deg, var(--success), #27ae60); color: white; }
        .btn-success:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(46,204,113,0.3); }
        .btn-warning { background: linear-gradient(135deg, var(--warning), #e07b0a); color: white; }
        .btn-warning:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(248,150,30,0.3); }
        .btn-ghost { background: var(--bg-lighter); color: var(--primary); border: 1px solid var(--border); }
        .btn-ghost:hover { background: var(--border); }
        .btn-danger { background: linear-gradient(135deg, var(--danger), #c82333); color: white; }
        .btn-danger:hover { opacity: 0.9; transform: translateY(-1px); }

        /* ── SEARCH ── */
        .search-wrap { position: relative; }
        .search-wrap input {
            padding: 8px 12px 8px 34px; border: 1px solid var(--border);
            border-radius: var(--radius); font-size: 0.85rem;
            background: var(--bg); color: var(--text); width: 220px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .search-wrap input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(67,97,238,0.1); }
        .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-fade); pointer-events: none; }

        /* ── SLIDE PANEL ── */
        .panel-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.35);
            z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.25s;
        }
        .panel-overlay.open { opacity: 1; pointer-events: all; }

        .slide-panel {
            position: fixed; top: 0; right: 0;
            width: min(480px, 100vw); height: 100vh;
            background: var(--surface); box-shadow: -8px 0 40px rgba(0,0,0,0.15);
            z-index: 201; transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .slide-panel.open { transform: translateX(0); }

        .panel-header {
            padding: 22px 24px 18px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
        }
        .panel-header h3 {
            font-size: 1.05rem; font-weight: 700; color: var(--text);
            display: flex; align-items: center; gap: 10px;
        }
        .panel-icon {
            width: 36px; height: 36px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
        }
        .panel-icon.green { background: #d4f5e7; color: #27ae60; }
        .panel-icon.blue  { background: #e0e7ff; color: var(--primary); }

        .close-panel-btn {
            width: 32px; height: 32px; border-radius: 8px;
            border: 1px solid var(--border); background: var(--bg-lighter);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            color: var(--text-fade); font-size: 1rem; transition: all 0.15s;
        }
        .close-panel-btn:hover { background: var(--danger); color: white; border-color: var(--danger); }

        .panel-body {
            flex: 1; overflow-y: auto; padding: 24px;
            display: flex; flex-direction: column; gap: 16px;
        }

        /* ── FORM FIELDS ── */
        .field-group { display: flex; flex-direction: column; gap: 6px; }
        .field-group label {
            font-size: 0.76rem; font-weight: 700; color: var(--text-fade);
            text-transform: uppercase; letter-spacing: 0.07em;
        }
        .field-group input,
        .field-group select {
            width: 100%; padding: 10px 14px;
            border: 1.5px solid var(--border); border-radius: var(--radius);
            font-size: 0.92rem; color: var(--text); background: var(--bg);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .field-group input:focus,
        .field-group select:focus {
            outline: none; border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(67,97,238,0.1); background: white;
        }
        .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

        .product-preview-box {
            background: linear-gradient(135deg, #eef2ff, #e0e7ff);
            border: 1px solid #c7d2fe; border-radius: var(--radius);
            padding: 12px 14px; font-size: 0.83rem; color: var(--primary);
            min-height: 46px; display: flex; align-items: center; gap: 8px;
        }

        .tip-text { font-size: 0.78rem; color: var(--text-fade); }

        .panel-footer {
            padding: 16px 24px; border-top: 1px solid var(--border);
            display: flex; gap: 10px; flex-shrink: 0;
        }
        .panel-footer .btn { flex: 1; justify-content: center; padding: 11px; }

        /* ── TOAST ── */
        .toast-wrap {
            position: fixed; bottom: 24px; right: 24px; z-index: 9999;
            display: flex; flex-direction: column; gap: 8px; pointer-events: none;
        }
        .toast {
            background: #1e2029; color: white; padding: 12px 18px;
            border-radius: var(--radius); font-size: 0.86rem; font-weight: 500;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3); animation: toastIn 0.25s ease;
            display: flex; align-items: center; gap: 10px; max-width: 320px;
        }
        .toast.success { border-left: 3px solid var(--success); }
        .toast.error   { border-left: 3px solid var(--danger); }
        .toast.fade-out { animation: toastOut 0.3s ease forwards; }
        @keyframes toastIn  { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
        @keyframes toastOut { from { opacity:1; transform:translateY(0); } to { opacity:0; transform:translateY(12px); } }

        /* ── MAIN CONTENT ── */
        .main-content { flex: 1; overflow-y: auto; padding: 16px 20px 20px; }
        .table-card {
            background: var(--surface); border-radius: var(--radius-lg);
            border: 1px solid var(--border); box-shadow: var(--shadow); overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        thead th {
            background: #f8f9ff; color: var(--text-fade);
            font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.1em; padding: 13px 14px;
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 5; text-align: left;
        }
        tbody td {
            padding: 12px 14px; font-size: 0.88rem;
            border-bottom: 1px solid #f0f2f8; color: var(--text); transition: background 0.12s;
        }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover td { background: #f8f9ff; }

        .code-chip {
            font-family: 'Courier New', monospace; font-size: 0.78rem;
            background: #eef2ff; color: var(--primary);
            border: 1px solid #c7d2fe; border-radius: 6px; padding: 2px 8px; font-weight: 600;
        }
        .stock-chip { font-size: 0.78rem; font-weight: 700; padding: 3px 10px; border-radius: 100px; }
        .stock-ok   { background: #d4f5e7; color: #1a7a4a; }
        .stock-low  { background: #fde8d0; color: #b85c00; }
        .stock-zero { background: #fde2ec; color: #a51040; }

        /* three-dots */
        .menu-container { position: relative; display: inline-block; }
        .three-dots-btn {
            background: none; border: none; cursor: pointer;
            width: 30px; height: 30px; border-radius: 7px;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; gap: 3px; transition: background 0.15s;
            box-shadow: none; min-width: unset; padding: 0;
        }
        .three-dots-btn:hover { background: var(--bg-lighter); }
        .three-dots-btn .dot { width: 3.5px; height: 3.5px; background: var(--text-fade); border-radius: 50%; }
        .menu-dropdown {
            position: absolute; top: 100%; right: 0;
            background: white; border: 1px solid var(--border);
            border-radius: var(--radius); box-shadow: var(--shadow-lg);
            z-index: 100; min-width: 130px; display: none; overflow: hidden;
        }
        .menu-dropdown.show { display: block; }
        .menu-item {
            display: flex; align-items: center; gap: 8px;
            padding: 9px 14px; cursor: pointer; font-size: 0.83rem;
            border-bottom: 1px solid #f0f2f8; transition: background 0.12s; color: var(--text);
        }
        .menu-item:last-child { border-bottom: none; }
        .menu-item:hover { background: var(--bg-lighter); }
        .menu-item.edit   { color: var(--primary); }
        .menu-item.delete { color: var(--danger); }

        /* ── EDIT MODAL ── */
        .modal-bg {
            position: fixed; inset: 0; background: rgba(0,0,0,0.45);
            display: flex; align-items: center; justify-content: center;
            z-index: 500; backdrop-filter: blur(2px);
        }
        .modal {
            background: white; border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg); padding: 28px 24px 22px;
            width: min(420px, 95vw); animation: modalIn 0.2s ease;
        }
        @keyframes modalIn { from { opacity:0; transform:scale(0.96); } to { opacity:1; transform:scale(1); } }
        .modal h3 { margin-bottom: 20px; color: var(--primary); font-size: 1.05rem; }
        .modal .field-group { margin-bottom: 14px; }
        .modal .form-actions { display: flex; gap: 10px; margin-top: 20px; }
        .modal .form-actions .btn { flex: 1; justify-content: center; }

        .empty-row td { text-align: center; padding: 48px 20px; color: var(--text-fade); font-size: 0.9rem; }

        @media (max-width: 700px) {
            .topbar { padding: 10px 14px; }
            .search-wrap input { width: 140px; }
            .slide-panel { width: 100vw; }
            .field-row { grid-template-columns: 1fr; }
        }
        @media (max-width: 480px) {
            .topbar-right { gap: 5px; }
            .btn { padding: 7px 10px; font-size: 0.79rem; }
            .main-content { padding: 10px; }
        }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.5.0/firebase-app.js";
        import {
            getFirestore, collection, query, where,
            getDocs, addDoc, updateDoc, deleteDoc,
            doc, increment, onSnapshot, runTransaction
        } from "https://www.gstatic.com/firebasejs/11.5.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB-lm7Y3r1F6VvY8PKvY8glLabZDbJsHM1k",
            authDomain: "trismartstores.firebaseapp.com",
            projectId: "trismartstores",
            storageBucket: "trismartstores.appspot.com",
            messagingSenderId: "416692703333",
            appId: "1:416692703333:web:d4b60292621435c748f68c",
            measurementId: "G-NJPQ7L3QWJ"
        };

        const app = initializeApp(firebaseConfig);
        const db  = getFirestore(app);

        const branchId = localStorage.getItem('branchId');
        const userName = (localStorage.getItem('userName') || '').toLowerCase();
        const isAdmin  = userName === 'chris';
        const isMaster = branchId === 'master';

        if (!branchId) {
            alert('Branch ID not found.');
            window.location.href = 'dashboard.html';
        }

        const BRANCHES = {
            master: { id: 'master', name: 'Master Warehouse' },
            makeni: { id: 'makeni', name: 'Kabanana Branch' },
            kabana: { id: 'kabana', name: 'Makeni Branch' }
        };
        const getBranchName = id => BRANCHES[id]?.name || id;

        let inventory       = [];
        let sourceInventory = [];
        let activeMenu      = null;
        let editUnlocked    = false;

        /* ── TOAST ── */
        function toast(msg, type = 'success') {
            const wrap = document.getElementById('toastWrap');
            const el   = document.createElement('div');
            el.className = `toast ${type}`;
            el.innerHTML = `<span>${type === 'success' ? '✓' : '✕'}</span> ${msg}`;
            wrap.appendChild(el);
            setTimeout(() => { el.classList.add('fade-out'); setTimeout(() => el.remove(), 350); }, 3000);
        }

        /* ── PANEL ── */
        function openPanel(id) {
            document.getElementById('panelOverlay').classList.add('open');
            document.getElementById(id).classList.add('open');
        }
        window.closePanelById = function(id) {
            document.getElementById('panelOverlay').classList.remove('open');
            document.getElementById(id).classList.remove('open');
        };
        document.getElementById('panelOverlay').addEventListener('click', () => {
            closePanelById('addPanel');
            closePanelById('transferPanel');
        });

        /* ── ROLE UI ── */
        function setupRoleUI() {
            if (isMaster) document.getElementById('masterPill').style.display = 'inline-flex';
            // Restock/GRV button — admin only
            const rb = document.getElementById('restockBtn');
            if (rb) rb.style.display = isAdmin ? 'inline-flex' : 'none';
        }

        /* ── INVENTORY LISTENER (current branchId) ── */
        function setupListener() {
            const q = query(collection(db, 'inventory'), where('branchId', '==', branchId));
            onSnapshot(q, snap => {
                inventory = snap.docs.map(d => ({
                    id: d.id, ...d.data(),
                    stock: Number(d.data().stock) || 0,
                    price: Number(d.data().price) || 0
                }));
                inventory.sort((a, b) => a.code.localeCompare(b.code));
                rebuildDatalist('addProductCodes', inventory);
                rebuildDatalist('transferCodes', inventory);
                sourceInventory = inventory; // default source = current branch
                renderTable(inventory);
            }, err => { console.error(err); toast('Error loading inventory', 'error'); });
        }

        function rebuildDatalist(id, items) {
            const dl = document.getElementById(id);
            if (!dl) return;
            dl.innerHTML = '';
            items.forEach(i => { const o = document.createElement('option'); o.value = i.code; dl.appendChild(o); });
        }

        /* ── RENDER TABLE ── */
        function renderTable(items) {
            const tbody = document.querySelector('#inventoryTable tbody');
            tbody.innerHTML = '';
            let total = 0;
            if (!items.length) {
                tbody.innerHTML = `<tr class="empty-row"><td colspan="5">No items found. Add inventory to get started.</td></tr>`;
                document.getElementById('totalVal').textContent = '0.00';
                return;
            }
            items.forEach(item => {
                total += item.price * item.stock;
                const sc = item.stock === 0 ? 'stock-zero' : item.stock < 10 ? 'stock-low' : 'stock-ok';
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><span class="code-chip">${item.code}</span></td>
                    <td>${item.name}</td>
                    <td>ZMW ${item.price.toFixed(2)}</td>
                    <td><span class="stock-chip ${sc}">${item.stock}</span></td>
                    <td>
                        <div class="menu-container">
                            <button class="three-dots-btn" onclick="toggleMenu(event,'${item.id}')">
                                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                            </button>
                            <div class="menu-dropdown" id="menu-${item.id}">
                                <div class="menu-item edit"   onclick="handleEdit('${item.id}')">✏️ Edit</div>
                                <div class="menu-item delete" onclick="handleDelete('${item.id}')">🗑️ Delete</div>
                            </div>
                        </div>
                    </td>`;
                tbody.appendChild(tr);
            });
            document.getElementById('totalVal').textContent = total.toFixed(2);
        }

        /* ── SEARCH ── */
        window.searchInventory = function() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            renderTable(inventory.filter(i => i.name.toLowerCase().includes(q) || i.code.toLowerCase().includes(q)));
        };

        /* ── ADD PANEL ── */
        window.openAddPanel = function() {
            document.getElementById('addForm').reset();
            openPanel('addPanel');
            setTimeout(() => document.getElementById('addItemCode').focus(), 320);
        };

        // Code typed → auto-fill name/price if already exists
        document.getElementById('addItemCode').addEventListener('input', function() {
            const code  = this.value.toUpperCase();
            const found = inventory.find(i => i.code === code);
            if (found) {
                document.getElementById('addItemName').value  = found.name;
                document.getElementById('addItemPrice').value = found.price.toFixed(2);
            }
        });

        window.submitAddItem = async function(e) {
            e.preventDefault();
            const code  = document.getElementById('addItemCode').value.trim().toUpperCase();
            const name  = document.getElementById('addItemName').value.trim();
            const price = parseFloat(document.getElementById('addItemPrice').value);
            const stock = parseInt(document.getElementById('addItemStock').value);
            if (!code || !name || isNaN(price) || price < 0 || isNaN(stock) || stock < 0) {
                toast('Please fill in all fields correctly.', 'error'); return;
            }
            if (inventory.find(i => i.code === code)) {
                toast('Product code already exists in this inventory.', 'error'); return;
            }
            try {
                await addDoc(collection(db, 'inventory'), { code, name, price, stock, sold: 0, branchId });
                toast(`"${name}" added successfully!`);
                closePanelById('addPanel');
            } catch (err) { toast('Error: ' + err.message, 'error'); }
        };

        /* ── TRANSFER PANEL ── */
        window.openTransferPanel = function() {
            document.getElementById('transferForm').reset();
            document.getElementById('transferPreview').textContent = 'Enter a product code above to preview';
            openPanel('transferPanel');

            if (isAdmin) {
                // Show source picker and default to current branch
                const wrap = document.getElementById('transferSourceWrap');
                wrap.style.display = 'block';
                const sel = document.getElementById('transferSource');
                sel.innerHTML = '<option value="">— Select Source —</option>';
                Object.values(BRANCHES).forEach(b => {
                    const o = document.createElement('option');
                    o.value = b.id; o.textContent = b.name;
                    if (b.id === branchId) o.selected = true;
                    sel.appendChild(o);
                });
                buildDestOptions(branchId);
                sourceInventory = inventory;
                rebuildDatalist('transferCodes', inventory);
            } else {
                document.getElementById('transferSourceWrap').style.display = 'none';
                buildDestOptions(branchId);
                sourceInventory = inventory;
                rebuildDatalist('transferCodes', inventory);
            }

            setTimeout(() => document.getElementById('transferCode').focus(), 320);
        };

        function buildDestOptions(srcId) {
            const sel = document.getElementById('transferDest');
            sel.innerHTML = '<option value="">— Select Destination —</option>';
            const allowed = isAdmin
                ? Object.keys(BRANCHES).filter(id => id !== srcId)
                : (['master', branchId === 'makeni' ? 'kabana' : 'makeni']); // branch staff: master + other branch
            allowed.forEach(id => {
                const o = document.createElement('option');
                o.value = id; o.textContent = getBranchName(id);
                sel.appendChild(o);
            });
        }

        // Admin changes source → reload source inventory + update dest options
        window.handleSourceChange = async function() {
            const srcId = document.getElementById('transferSource').value;
            if (!srcId) return;
            document.getElementById('transferPreview').textContent = 'Loading source inventory…';
            try {
                if (srcId === branchId) {
                    sourceInventory = inventory;
                } else {
                    const snap = await getDocs(query(collection(db, 'inventory'), where('branchId', '==', srcId)));
                    sourceInventory = snap.docs.map(d => ({
                        id: d.id, ...d.data(),
                        stock: Number(d.data().stock) || 0,
                        price: Number(d.data().price) || 0
                    }));
                }
                rebuildDatalist('transferCodes', sourceInventory);
                buildDestOptions(srcId);
                document.getElementById('transferCode').value = '';
                document.getElementById('transferPreview').textContent = 'Enter a product code above to preview';
            } catch (err) { toast('Error loading source: ' + err.message, 'error'); }
        };

        // Code input → live preview
        document.getElementById('transferCode').addEventListener('input', function() {
            const code = this.value.toUpperCase();
            const item = sourceInventory.find(i => i.code === code);
            const prev = document.getElementById('transferPreview');
            if (item) {
                prev.innerHTML = `<strong>${item.name}</strong> &mdash; Stock: <strong>${item.stock}</strong> &mdash; ZMW ${item.price.toFixed(2)}`;
            } else {
                prev.textContent = code ? 'Product not found in selected source' : 'Enter a product code above to preview';
            }
        });

        window.submitTransfer = async function(e) {
            e.preventDefault();
            const code   = document.getElementById('transferCode').value.toUpperCase();
            const qty    = parseInt(document.getElementById('transferQty').value);
            const destId = document.getElementById('transferDest').value;
            const srcId  = isAdmin
                ? (document.getElementById('transferSource')?.value || branchId)
                : branchId;

            if (!code || isNaN(qty) || qty <= 0 || !destId) { toast('Please fill all fields.', 'error'); return; }
            if (srcId === destId) { toast('Source and destination cannot be the same.', 'error'); return; }

            const item = sourceInventory.find(i => i.code === code);
            if (!item) { toast('Product not found in source.', 'error'); return; }
            if (item.stock < qty) { toast(`Not enough stock. Available: ${item.stock}`, 'error'); return; }

            if (!confirm(`Transfer ${qty}× ${item.name}\nFrom: ${getBranchName(srcId)}\nTo: ${getBranchName(destId)}`)) return;

            try {
                await runTransaction(db, async tx => {
                    const srcRef = doc(db, 'inventory', item.id);
                    const srcDoc = await tx.get(srcRef);
                    if ((srcDoc.data().stock || 0) < qty) throw new Error(`Stock changed. Current: ${srcDoc.data().stock}`);
                    tx.update(srcRef, { stock: increment(-qty) });

                    const destSnap = await getDocs(query(collection(db, 'inventory'), where('branchId', '==', destId), where('code', '==', code)));
                    if (!destSnap.empty) {
                        tx.update(doc(db, 'inventory', destSnap.docs[0].id), { stock: increment(qty) });
                    } else {
                        tx.set(doc(collection(db, 'inventory')), { code, name: item.name, price: item.price, stock: qty, sold: 0, branchId: destId });
                    }

                    tx.set(doc(collection(db, 'transfers')), {
                        date: new Date().toISOString(), productCode: code,
                        productName: item.name, quantity: qty,
                        fromBranchId: srcId, fromBranchName: getBranchName(srcId),
                        toBranchId: destId,   toBranchName:  getBranchName(destId),
                        status: 'completed', timestamp: new Date()
                    });
                });

                toast(`Transferred ${qty}× ${item.name} → ${getBranchName(destId)}`);
                closePanelById('transferPanel');
            } catch (err) { console.error(err); toast('Transfer failed: ' + err.message, 'error'); }
        };

        /* ── MENU ── */
        function closeAllMenus() {
            if (activeMenu) { activeMenu.classList.remove('show'); activeMenu = null; }
        }
        window.toggleMenu = function(e, id) {
            e.stopPropagation();
            const menu = document.getElementById(`menu-${id}`);
            if (activeMenu && activeMenu !== menu) activeMenu.classList.remove('show');
            menu.classList.toggle('show');
            activeMenu = menu.classList.contains('show') ? menu : null;
        };
        document.addEventListener('click', closeAllMenus);

        /* ── EDIT ── */
        window.handleEdit = async function(id) {
            closeAllMenus();
            if (!editUnlocked) {
                const pass = prompt('Enter password to edit:');
                if (pass !== '1030') { toast('Incorrect password.', 'error'); return; }
                editUnlocked = true;
            }
            const item = inventory.find(i => i.id === id);
            if (!item) return;
            const bg = document.createElement('div');
            bg.className = 'modal-bg'; bg.id = 'modal-bg';
            bg.innerHTML = `
                <div class="modal">
                    <h3>✏️ Edit Product</h3>
                    <form id="editForm">
                        <div class="field-group"><label>Product Code</label>
                            <input type="text" name="code" required value="${item.code}"></div>
                        <div class="field-group"><label>Product Name</label>
                            <input type="text" name="name" required value="${item.name}"></div>
                        <div class="field-group"><label>Price (ZMW)</label>
                            <input type="number" name="price" min="0" step="0.01" required value="${item.price}"></div>
                        <div class="field-group"><label>Stock</label>
                            <input type="number" name="stock" min="0" required value="${item.stock}"></div>
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">Save Changes</button>
                            <button type="button" class="btn btn-danger" id="cancelEdit">Cancel</button>
                        </div>
                    </form>
                </div>`;
            document.body.appendChild(bg);
            document.getElementById('editForm').onsubmit = async ev => {
                ev.preventDefault();
                const f = ev.target;
                const code = f.code.value.trim().toUpperCase(), name = f.name.value.trim();
                const price = parseFloat(f.price.value), stock = parseInt(f.stock.value);
                if (!code || !name || isNaN(price) || price < 0 || isNaN(stock) || stock < 0) { toast('Invalid values.', 'error'); return; }
                if (code !== item.code && inventory.some(i => i.code === code)) { toast('Code already exists!', 'error'); return; }
                try {
                    await updateDoc(doc(db, 'inventory', item.id), { code, name, price, stock });
                    bg.remove(); toast('Product updated!');
                } catch (err) { toast('Error: ' + err.message, 'error'); }
            };
            document.getElementById('cancelEdit').onclick = () => bg.remove();
            bg.onclick = ev => { if (ev.target === bg) bg.remove(); };
        };

        /* ── DELETE ── */
        window.handleDelete = async function(id) {
            closeAllMenus();
            const item = inventory.find(i => i.id === id);
            if (!item) return;
            if (!confirm(`Delete "${item.name}" (${item.code})?`)) return;
            try {
                await deleteDoc(doc(db, 'inventory', id));
                toast('Product deleted.');
            } catch (err) { toast('Error: ' + err.message, 'error'); }
        };

        /* ── INIT ── */
        window.onload = function() {
            document.getElementById('pageTitle').textContent = `Warehouse — ${getBranchName(branchId)}`;
            setupRoleUI();
            setupListener();
        };
    </script>
</head>
<body>
    <div class="page-wrap">

        <!-- TOP BAR -->
        <div class="topbar">
            <div class="topbar-left">
                <span class="page-title" id="pageTitle">Warehouse</span>
                <span class="master-pill" id="masterPill">⭐ Master</span>
                <div class="total-pill">Total Stock Value: <span id="totalVal">0.00</span> ZMW</div>
            </div>
            <div class="topbar-right">
                <div class="search-wrap">
                    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" width="14" height="14">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
                    </svg>
                    <input type="text" id="searchInput" placeholder="Search products…" oninput="searchInventory()">
                </div>

                <button class="btn btn-success" onclick="openAddPanel()">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                    Add Item
                </button>

                <button class="btn btn-primary" onclick="openTransferPanel()">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>
                    Transfer
                </button>

                <!-- GRV/Restock — admin only, hidden via JS -->
                <a href="Restock.html" id="restockBtn" class="btn btn-warning" style="display:none;">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 4H7a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h5l5 5v11a2 2 0 0 1-2 2z"/></svg>
                    GRV / Restock
                </a>
            </div>
        </div>

        <!-- TABLE -->
        <div class="main-content">
            <div class="table-card">
                <table id="inventoryTable">
                    <thead>
                        <tr>
                            <th>Code</th>
                            <th>Product Name</th>
                            <th>Price</th>
                            <th>Stock</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- OVERLAY -->
    <div class="panel-overlay" id="panelOverlay"></div>

    <!-- ADD ITEM PANEL -->
    <div class="slide-panel" id="addPanel">
        <div class="panel-header">
            <h3>
                <span class="panel-icon green">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" width="18" height="18">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                    </svg>
                </span>
                Add New Item
            </h3>
            <button class="close-panel-btn" onclick="closePanelById('addPanel')">✕</button>
        </div>
        <form id="addForm" onsubmit="submitAddItem(event)">
            <div class="panel-body">
                <div class="field-row">
                    <div class="field-group">
                        <label>Product Code *</label>
                        <input type="text" id="addItemCode" list="addProductCodes" placeholder="e.g. PROD001" required autocomplete="off">
                        <datalist id="addProductCodes"></datalist>
                    </div>
                    <div class="field-group">
                        <label>Product Name *</label>
                        <input type="text" id="addItemName" placeholder="e.g. Sugar 2kg" required>
                    </div>
                </div>
                <div class="field-row">
                    <div class="field-group">
                        <label>Price (ZMW) *</label>
                        <input type="number" id="addItemPrice" min="0" step="0.01" placeholder="0.00" required>
                    </div>
                    <div class="field-group">
                        <label>Initial Stock *</label>
                        <input type="number" id="addItemStock" min="0" placeholder="0" required>
                    </div>
                </div>
                <p class="tip-text">💡 If the product code exists in this inventory, details will auto-fill above.</p>
            </div>
            <div class="panel-footer">
                <button type="submit" class="btn btn-success">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" width="15" height="15">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                    Save Item
                </button>
                <button type="button" class="btn btn-ghost" onclick="closePanelById('addPanel')">Cancel</button>
            </div>
        </form>
    </div>

    <!-- TRANSFER PANEL -->
    <div class="slide-panel" id="transferPanel">
        <div class="panel-header">
            <h3>
                <span class="panel-icon blue">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" width="18" height="18">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/>
                    </svg>
                </span>
                Transfer Stock
            </h3>
            <button class="close-panel-btn" onclick="closePanelById('transferPanel')">✕</button>
        </div>
        <form id="transferForm" onsubmit="submitTransfer(event)">
            <div class="panel-body">

                <!-- Admin only source picker -->
                <div id="transferSourceWrap" style="display:none;">
                    <div class="field-group">
                        <label>From (Source Branch)</label>
                        <select id="transferSource" onchange="handleSourceChange()">
                            <option value="">— Select Source —</option>
                        </select>
                    </div>
                </div>

                <div class="field-group">
                    <label>Product Code *</label>
                    <input type="text" id="transferCode" list="transferCodes" placeholder="Enter product code" required autocomplete="off">
                    <datalist id="transferCodes"></datalist>
                </div>

                <div class="field-group">
                    <label>Product Info</label>
                    <div class="product-preview-box" id="transferPreview">Enter a product code above to preview</div>
                </div>

                <div class="field-row">
                    <div class="field-group">
                        <label>Quantity *</label>
                        <input type="number" id="transferQty" min="1" placeholder="Units" required>
                    </div>
                    <div class="field-group">
                        <label>To (Destination) *</label>
                        <select id="transferDest" required>
                            <option value="">— Select —</option>
                        </select>
                    </div>
                </div>

            </div>
            <div class="panel-footer">
                <button type="submit" class="btn btn-primary">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" width="15" height="15">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                    Confirm Transfer
                </button>
                <button type="button" class="btn btn-ghost" onclick="closePanelById('transferPanel')">Cancel</button>
            </div>
        </form>
    </div>

    <!-- TOASTS -->
    <div class="toast-wrap" id="toastWrap"></div>
</body>
</html>

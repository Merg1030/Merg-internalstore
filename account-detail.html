<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Account Detail · Trismart</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --p: #4361ee; --p2: #3a56d4;
  --ok: #2ecc71; --warn: #f8961e; --danger: #ef4444; --purple: #7c3aed;
  --bg: #f4f6fb; --sur: #ffffff; --lite: #f1f3f5;
  --bdr: #dee2e6; --txt: #212529; --fade: #6c757d;
  --radius: 12px; --radius-lg: 16px;
  --sh: 0 1px 6px rgba(0,0,0,0.05);
}

html, body { height: 100%; width: 100%; overflow: hidden; font-family: 'DM Sans', system-ui, sans-serif; background: var(--bg); }
.app { display: flex; flex-direction: column; height: 100vh; width: 100%; overflow: hidden; }

.topbar { background: var(--sur); border-bottom: 1px solid var(--bdr); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; box-shadow: var(--sh); z-index: 100; }
.logo { display: flex; align-items: center; gap: 12px; }
.logo-mark { width: 32px; height: 32px; background: linear-gradient(135deg, var(--p), var(--p2)); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; }
.logo-text { font-weight: 800; font-size: 0.9rem; }
.back-btn { display: flex; align-items: center; gap: 8px; padding: 7px 14px; background: var(--lite); border: 1px solid var(--bdr); border-radius: 40px; font-size: 0.7rem; font-weight: 700; cursor: pointer; text-decoration: none; color: var(--txt); transition: 0.15s; }
.back-btn:hover { border-color: var(--p); color: var(--p); }

.main-content { flex: 1; overflow-y: auto; padding: 20px 24px; min-height: 0; }

.account-header-card { background: var(--sur); border: 1px solid var(--bdr); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 24px; box-shadow: var(--sh); }
.account-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
.account-info { display: flex; align-items: center; gap: 16px; }
.account-icon-large { width: 56px; height: 56px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; }
.icon-revenue { background: rgba(46,204,113,0.1); color: var(--ok); }
.icon-expense { background: rgba(239,68,68,0.1); color: var(--danger); }
.icon-asset { background: rgba(67,97,238,0.1); color: var(--p); }
.icon-liability { background: rgba(245,158,11,0.1); color: var(--warn); }
.icon-equity { background: rgba(124,58,237,0.1); color: var(--purple); }
.account-name h1 { font-size: 1.2rem; font-weight: 800; margin-bottom: 4px; }
.account-type-badge { font-size: 0.6rem; font-weight: 800; text-transform: uppercase; padding: 3px 10px; border-radius: 40px; display: inline-block; }
.balance-display { text-align: right; }
.balance-label { font-size: 0.6rem; font-weight: 800; text-transform: uppercase; color: var(--fade); }
.balance-amount { font-size: 1.8rem; font-weight: 800; font-family: 'DM Mono', monospace; }
.balance-amount.positive { color: var(--ok); }
.balance-amount.negative { color: var(--danger); }

/* Section bar */
.section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; margin-top: 8px; flex-wrap: wrap; gap: 10px; }
.section-header-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

/* Toggle button */
.toggle-btn { display: inline-flex; align-items: center; gap: 7px; padding: 6px 14px; border-radius: 40px; font-size: 0.7rem; font-weight: 700; cursor: pointer; border: 1.5px solid var(--bdr); background: var(--sur); color: var(--txt); transition: 0.15s; user-select: none; }
.toggle-btn:hover { border-color: var(--p); color: var(--p); }
.toggle-icon { transition: transform 0.25s; display: inline-block; }
.toggle-btn.collapsed .toggle-icon { transform: rotate(-90deg); }

/* Month filter */
.month-filter { display: flex; align-items: center; gap: 8px; background: var(--sur); border: 1.5px solid var(--bdr); border-radius: 40px; padding: 5px 12px; font-size: 0.7rem; font-weight: 700; color: var(--txt); transition: 0.15s; }
.month-filter:hover { border-color: var(--p); }
.month-filter input[type="month"] { border: none; outline: none; font-family: inherit; font-size: 0.7rem; font-weight: 700; color: var(--p); background: transparent; cursor: pointer; width: 110px; }
.clear-filter-btn { display: inline-flex; align-items: center; gap: 4px; padding: 5px 10px; background: rgba(239,68,68,0.08); color: var(--danger); border: 1.5px solid rgba(239,68,68,0.2); border-radius: 40px; font-size: 0.65rem; font-weight: 700; cursor: pointer; transition: 0.15s; }
.clear-filter-btn:hover { background: rgba(239,68,68,0.18); }
.filter-badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; background: rgba(67,97,238,0.1); color: var(--p); border-radius: 40px; font-size: 0.65rem; font-weight: 700; }

/* Buttons */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 40px; font-size: 0.7rem; font-weight: 700; cursor: pointer; border: none; transition: 0.15s; }
.btn-primary { background: linear-gradient(135deg, var(--p), var(--p2)); color: white; }
.btn-outline { background: transparent; border: 1.5px solid var(--bdr); color: var(--txt); }
.btn-outline:hover { border-color: var(--p); color: var(--p); }

/* Collapsible wrapper */
.table-wrap { overflow: hidden; transition: max-height 0.3s ease, opacity 0.25s ease; max-height: 3000px; opacity: 1; }
.table-wrap.hidden { max-height: 0 !important; opacity: 0; pointer-events: none; }

.table-container { background: var(--sur); border: 1px solid var(--bdr); border-radius: var(--radius); overflow: auto; min-height: 300px; max-height: calc(100vh - 300px); box-shadow: var(--sh); }

.transaction-table { width: 100%; border-collapse: collapse; font-size: 0.7rem; min-width: 650px; }
.transaction-table th { padding: 12px; text-align: left; font-size: 0.55rem; font-weight: 800; text-transform: uppercase; color: var(--fade); border-bottom: 1px solid var(--bdr); position: sticky; top: 0; background: white; z-index: 10; }
.transaction-table td { padding: 10px 12px; border-bottom: 1px solid #eff3f8; vertical-align: middle; }
.debit-amount { color: var(--danger); font-weight: 700; }
.credit-amount { color: var(--ok); font-weight: 700; }
.balance-amount-table { font-weight: 700; font-family: 'DM Mono', monospace; }
.empty-row td { text-align: center; padding: 60px; color: var(--fade); }

/* 3-dot action */
.action-cell { position: relative; width: 44px; }
.dots-btn { width: 30px; height: 30px; border-radius: 50%; border: 1.5px solid var(--bdr); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; color: var(--fade); transition: 0.15s; }
.dots-btn:hover { border-color: var(--p); color: var(--p); background: rgba(67,97,238,0.05); }
.dropdown-menu { position: absolute; right: 0; top: 36px; background: white; border: 1px solid var(--bdr); border-radius: 12px; box-shadow: 0 6px 24px rgba(0,0,0,0.13); z-index: 500; min-width: 130px; overflow: hidden; display: none; }
.dropdown-menu.open { display: block; }
.dropdown-item { display: flex; align-items: center; gap: 8px; padding: 10px 14px; font-size: 0.72rem; font-weight: 700; cursor: pointer; transition: 0.12s; color: var(--txt); border: none; background: none; width: 100%; text-align: left; }
.dropdown-item:hover { background: var(--lite); }
.dropdown-item.danger { color: var(--danger); }
.dropdown-item.danger:hover { background: rgba(239,68,68,0.07); }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 1000; display: none; align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal-content { background: white; border-radius: 24px; max-width: 500px; width: 90%; max-height: 85vh; overflow: auto; padding: 24px; }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--bdr); }
.modal-header h3 { font-size: 1rem; font-weight: 800; }
.close-modal { cursor: pointer; font-size: 1.2rem; color: var(--fade); }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 0.6rem; font-weight: 800; text-transform: uppercase; color: var(--fade); margin-bottom: 5px; }
.form-group input, .form-group select { width: 100%; padding: 10px 12px; border: 1.5px solid var(--bdr); border-radius: 12px; font-size: 0.8rem; font-family: inherit; }
.form-group input:focus, .form-group select:focus { outline: none; border-color: var(--p); }
.form-actions { display: flex; gap: 10px; margin-top: 20px; }

/* Toast */
.toast-wrap { position: fixed; bottom: 20px; right: 20px; z-index: 1100; display: flex; flex-direction: column; gap: 8px; }
.toast { background: #1e293b; color: white; padding: 10px 18px; border-radius: 40px; font-size: 0.7rem; animation: fadeIn 0.2s; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: var(--lite); }
::-webkit-scrollbar-thumb { background: var(--bdr); border-radius: 4px; }

@media (max-width: 700px) {
  .account-row { flex-direction: column; align-items: flex-start; }
  .balance-display { text-align: left; }
  .main-content { padding: 12px; }
  .topbar { padding: 0 12px; }
}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo">
      <div class="logo-mark"><i class="fas fa-book"></i></div>
      <div class="logo-text">Trismart · Account Detail</div>
    </div>
    <a href="accounts-dashboard.html" class="back-btn">
      <i class="fas fa-arrow-left"></i> Back to Accounts
    </a>
  </div>

  <div class="main-content">

    <div class="account-header-card" id="accountHeader">
      <div style="text-align:center;padding:30px;">Loading account details...</div>
    </div>

    <div class="section-header">
      <div class="section-header-left">

        <!-- Hide / Show toggle -->
        <button class="toggle-btn" id="toggleTableBtn" onclick="toggleTable()">
          <i class="fas fa-chevron-down toggle-icon"></i>
          <span id="toggleLabel">Transaction History</span>
        </button>

        <!-- Filter controls (hidden when table is collapsed) -->
        <div id="filterControls" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
          <div class="month-filter">
            <i class="fas fa-calendar-alt" style="color:var(--p);font-size:0.7rem;"></i>
            <input type="month" id="monthFilter" title="Filter by month">
          </div>
          <button class="clear-filter-btn" id="clearFilterBtn" onclick="clearMonthFilter()" style="display:none;">
            <i class="fas fa-times"></i> All Months
          </button>
          <span class="filter-badge" id="filterBadge" style="display:none;">
            <i class="fas fa-filter"></i> <span id="filterBadgeText"></span>
          </span>
        </div>
      </div>

      <button class="btn btn-primary" onclick="openTransactionModal()">
        <i class="fas fa-plus"></i> Add Transaction
      </button>
    </div>

    <div class="table-wrap" id="tableWrap">
      <div class="table-container">
        <table class="transaction-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Description</th>
              <th>Debit</th>
              <th>Credit</th>
              <th>Balance</th>
              <th style="width:50px;"></th>
            </tr>
          </thead>
          <tbody id="transactionsTbody">
            <tr class="empty-row"><td colspan="6">Loading transactions...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<!-- Add / Edit Modal -->
<div id="transactionModal" class="modal-overlay">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="modalTitle">Add Transaction</h3>
      <span class="close-modal" onclick="closeModal('transactionModal')">&times;</span>
    </div>
    <div class="form-group">
      <label>Date</label>
      <input type="date" id="transDate" required>
    </div>
    <div class="form-group">
      <label>Transaction Type</label>
      <select id="transType" required>
        <option value="credit">Credit (Money In / Income)</option>
        <option value="debit">Debit (Money Out / Expense)</option>
      </select>
    </div>
    <div class="form-group">
      <label>Amount (K)</label>
      <input type="number" id="transAmount" step="0.01" required placeholder="0.00">
    </div>
    <div class="form-group">
      <label>Description</label>
      <input type="text" id="transDesc" required placeholder="e.g., Rent payment, Sales revenue">
    </div>
    <div class="form-actions">
      <button id="submitTransBtn" class="btn btn-primary">Add Transaction</button>
      <button type="button" class="btn btn-outline" onclick="closeModal('transactionModal')">Cancel</button>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.5.0/firebase-app.js";
import { getFirestore, collection, query, where, doc, onSnapshot, runTransaction } from "https://www.gstatic.com/firebasejs/11.5.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB-lm7Y3r1F6VvY8PKvY8glLabZDbJsHM1k",
  authDomain: "trismartstores.firebaseapp.com",
  projectId: "trismartstores",
  storageBucket: "trismartstores.appspot.com",
  messagingSenderId: "416692703333",
  appId: "1:416692703333:web:d4b60292621435c748f68c"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const loggedInUser = localStorage.getItem('loggedInUser') || '';
const userName = (loggedInUser || localStorage.getItem('userName') || '').toLowerCase().trim();
if (userName !== 'chris') {
  document.body.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100vh;"><div style="background:white;padding:30px;border-radius:24px;">Access Denied.</div></div>`;
  throw new Error('unauth');
}

const accountId = localStorage.getItem('selectedAccountId');
if (!accountId) { toast('No account selected','error'); setTimeout(() => window.location.href='accounts-dashboard.html', 1500); }

let currentAccount = null;
let accountTransactions = [];
let editingTransactionId = null;

// ── TABLE TOGGLE ─────────────────────────────────────────────────────────────
const COLLAPSE_KEY = `trismart_table_collapsed_${accountId}`;
function isCollapsed() { return localStorage.getItem(COLLAPSE_KEY) === '1'; }

function applyCollapse(collapsed) {
  const wrap = document.getElementById('tableWrap');
  const btn  = document.getElementById('toggleTableBtn');
  const fc   = document.getElementById('filterControls');
  if (collapsed) {
    wrap.classList.add('hidden');
    btn.classList.add('collapsed');
    document.getElementById('toggleLabel').textContent = 'Show Transactions';
    fc.style.display = 'none';
  } else {
    wrap.classList.remove('hidden');
    btn.classList.remove('collapsed');
    document.getElementById('toggleLabel').textContent = 'Transaction History';
    fc.style.display = 'flex';
  }
}
window.toggleTable = function() {
  const next = !isCollapsed();
  localStorage.setItem(COLLAPSE_KEY, next ? '1' : '0');
  applyCollapse(next);
};

// ── MONTHLY FILTER ───────────────────────────────────────────────────────────
const FILTER_KEY = `trismart_month_filter_${accountId}`;
function getSavedFilter() { return localStorage.getItem(FILTER_KEY) || ''; }
function saveFilter(v)     { v ? localStorage.setItem(FILTER_KEY, v) : localStorage.removeItem(FILTER_KEY); }

function initMonthFilter() {
  const saved = getSavedFilter();
  const input = document.getElementById('monthFilter');
  if (saved) { input.value = saved; showFilterBadge(saved); }
  input.addEventListener('change', () => {
    saveFilter(input.value);
    input.value ? showFilterBadge(input.value) : hideFilterBadge();
    renderTransactions();
  });
}
function showFilterBadge(ym) {
  const [y, m] = ym.split('-');
  const names = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('filterBadgeText').textContent = `${names[+m-1]} ${y}`;
  document.getElementById('filterBadge').style.display    = 'inline-flex';
  document.getElementById('clearFilterBtn').style.display = 'inline-flex';
}
function hideFilterBadge() {
  document.getElementById('filterBadge').style.display    = 'none';
  document.getElementById('clearFilterBtn').style.display = 'none';
}
window.clearMonthFilter = function() {
  document.getElementById('monthFilter').value = '';
  saveFilter(''); hideFilterBadge(); renderTransactions();
};
function getFiltered() {
  const f = getSavedFilter();
  return f ? accountTransactions.filter(t => t.date && t.date.startsWith(f)) : accountTransactions;
}

// ── TOAST ────────────────────────────────────────────────────────────────────
function toast(msg, type='success') {
  const wrap = document.getElementById('toastWrap');
  const el   = document.createElement('div');
  el.className = 'toast';
  el.style.background = type === 'error' ? '#b91c1c' : '#1e293b';
  el.innerHTML = `<i class="fas ${type==='error'?'fa-times-circle':'fa-check-circle'}"></i> ${msg}`;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ── MODAL ────────────────────────────────────────────────────────────────────
function closeModal(id) { document.getElementById(id).classList.remove('show'); }
window.closeModal = closeModal;

function openTransactionModal(editId = null) {
  editingTransactionId = editId;
  const isEdit = !!editId;
  document.getElementById('modalTitle').textContent      = isEdit ? 'Edit Transaction' : 'Add Transaction';
  document.getElementById('submitTransBtn').textContent  = isEdit ? 'Save Changes'     : 'Add Transaction';

  if (isEdit) {
    const t = accountTransactions.find(x => x.id === editId);
    if (!t) return;
    document.getElementById('transDate').value   = t.date        || '';
    document.getElementById('transType').value   = t.type        || 'credit';
    document.getElementById('transAmount').value = t.amount      || '';
    document.getElementById('transDesc').value   = t.description || '';
  } else {
    document.getElementById('transDate').valueAsDate = new Date();
    document.getElementById('transType').value   = 'credit';
    document.getElementById('transAmount').value = '';
    document.getElementById('transDesc').value   = '';
  }
  document.getElementById('transactionModal').classList.add('show');
}
window.openTransactionModal = openTransactionModal;

// ── DROPDOWN ─────────────────────────────────────────────────────────────────
function closeAllDropdowns() {
  document.querySelectorAll('.dropdown-menu.open').forEach(m => m.classList.remove('open'));
}
window.closeAllDropdowns = closeAllDropdowns;

window.toggleDropdown = function(id) {
  const menu   = document.getElementById(id);
  const wasOpen = menu.classList.contains('open');
  closeAllDropdowns();
  if (!wasOpen) menu.classList.add('open');
};

document.addEventListener('click', e => {
  if (!e.target.closest('.action-cell')) closeAllDropdowns();
});

// ── FIREBASE LOAD ─────────────────────────────────────────────────────────────
function loadAccount() {
  onSnapshot(doc(db, 'accounts', accountId), snap => {
    if (snap.exists()) {
      currentAccount = { id: snap.id, ...snap.data(), balance: Number(snap.data().balance) || 0 };
      renderAccountHeader();
    } else {
      toast('Account not found','error');
      setTimeout(() => window.location.href='accounts-dashboard.html', 1500);
    }
  }, err => { console.error(err); toast('Error loading account','error'); });
}

function loadTransactions() {
  const q = query(collection(db, 'account_transactions'), where('accountId','==', accountId));
  onSnapshot(q, snap => {
    accountTransactions = snap.docs.map(d => ({ id: d.id, ...d.data(), amount: Number(d.data().amount)||0 }));
    renderTransactions();
    renderAccountHeader();
  }, err => {
    console.error(err);
    toast('Error loading transactions: '+err.message,'error');
    document.getElementById('transactionsTbody').innerHTML = '<tr class="empty-row"><td colspan="6">Error loading. Check console.</td></tr>';
  });
}

// ── RENDER HEADER ─────────────────────────────────────────────────────────────
function renderAccountHeader() {
  if (!currentAccount) return;
  const icons = {
    revenue:   { icon:'fa-chart-line',       cls:'icon-revenue',   label:'REVENUE'   },
    expense:   { icon:'fa-shopping-cart',    cls:'icon-expense',   label:'EXPENSE'   },
    asset:     { icon:'fa-coins',            cls:'icon-asset',     label:'ASSET'     },
    liability: { icon:'fa-hand-holding-usd', cls:'icon-liability', label:'LIABILITY' },
    equity:    { icon:'fa-chart-pie',        cls:'icon-equity',    label:'EQUITY'    }
  };
  const info  = icons[currentAccount.type] || icons.asset;
  const balCl = (currentAccount.type==='expense'||currentAccount.type==='liability') && currentAccount.balance>0 ? 'negative':'positive';
  const bg    = info.cls==='icon-revenue' ? 'rgba(46,204,113,0.15)' : 'rgba(67,97,238,0.15)';
  const col   = info.cls==='icon-revenue' ? '#2ecc71' : '#4361ee';

  document.getElementById('accountHeader').innerHTML = `
    <div class="account-row">
      <div class="account-info">
        <div class="account-icon-large ${info.cls}"><i class="fas ${info.icon}"></i></div>
        <div class="account-name">
          <h1>${esc(currentAccount.name)}</h1>
          <span class="account-type-badge" style="background:${bg};color:${col};">${info.label}</span>
          ${currentAccount.description?`<div style="font-size:0.65rem;color:var(--fade);margin-top:4px;">${esc(currentAccount.description)}</div>`:''}
        </div>
      </div>
      <div class="balance-display">
        <div class="balance-label">Current Balance</div>
        <div class="balance-amount ${balCl}">K${(currentAccount.balance||0).toFixed(2)}</div>
      </div>
    </div>
  `;
}

// ── RENDER TRANSACTIONS ───────────────────────────────────────────────────────
function renderTransactions() {
  const tbody    = document.getElementById('transactionsTbody');
  const filtered = getFiltered();

  if (!filtered.length) {
    const msg = getSavedFilter()
      ? 'No transactions for this month. Try another month or clear the filter.'
      : 'No transactions yet. Click "Add Transaction" to get started.';
    tbody.innerHTML = `<tr class="empty-row"><td colspan="6">${msg}</td></tr>`;
    return;
  }

  // sort newest first
  const desc = [...filtered].sort((a,b) => b.date > a.date ? 1 : b.date < a.date ? -1 : 0);
  // running balance ascending
  const asc  = [...filtered].sort((a,b) => a.date > b.date ? 1 : a.date < b.date ? -1 : 0);
  let run = 0;
  const balMap = new Map();
  for (const t of asc) { run += t.type==='credit' ? t.amount : -t.amount; balMap.set(t.id, run); }

  tbody.innerHTML = desc.map(t => {
    const isDebit  = t.type === 'debit';
    const dAmt     = isDebit  ? `K${t.amount.toFixed(2)}` : '-';
    const cAmt     = !isDebit ? `K${t.amount.toFixed(2)}` : '-';
    const bal      = (balMap.get(t.id)||0).toFixed(2);
    const menuId   = `menu_${t.id}`;
    return `
      <tr>
        <td>${t.date||'-'}</td>
        <td><strong>${esc(t.description||'-')}</strong></td>
        <td class="debit-amount">${dAmt}</td>
        <td class="credit-amount">${cAmt}</td>
        <td class="balance-amount-table">K${bal}</td>
        <td class="action-cell">
          <button class="dots-btn" onclick="toggleDropdown('${menuId}')">
            <i class="fas fa-ellipsis-v"></i>
          </button>
          <div class="dropdown-menu" id="${menuId}">
            <button class="dropdown-item" onclick="closeAllDropdowns();openTransactionModal('${t.id}')">
              <i class="fas fa-pen" style="color:var(--p);width:14px;"></i> Edit
            </button>
            <button class="dropdown-item danger" onclick="closeAllDropdowns();deleteTransaction('${t.id}')">
              <i class="fas fa-trash-alt" style="width:14px;"></i> Delete
            </button>
          </div>
        </td>
      </tr>
    `;
  }).join('');
}

// ── DELETE ────────────────────────────────────────────────────────────────────
window.deleteTransaction = async function(id) {
  if (!confirm('Delete this transaction? This will affect the account balance.')) return;
  const t = accountTransactions.find(x => x.id === id);
  if (!t) return;
  try {
    await runTransaction(db, async tx => {
      const aRef = doc(db,'accounts',accountId);
      const aDoc = await tx.get(aRef);
      if (!aDoc.exists()) throw new Error('Account not found');
      const newBal = (Number(aDoc.data().balance)||0) + (t.type==='credit' ? -t.amount : t.amount);
      tx.update(aRef, { balance: newBal });
      tx.delete(doc(db,'account_transactions',id));
    });
    toast('Transaction deleted');
  } catch(err) { console.error(err); toast(err.message,'error'); }
};

// ── SUBMIT (add or edit) ──────────────────────────────────────────────────────
document.getElementById('submitTransBtn').addEventListener('click', async () => {
  const amount = parseFloat(document.getElementById('transAmount').value);
  const type   = document.getElementById('transType').value;
  const date   = document.getElementById('transDate').value;
  const desc   = document.getElementById('transDesc').value.trim();

  if (!date)                      { toast('Pick a date','error'); return; }
  if (isNaN(amount)||amount<=0)   { toast('Enter a valid amount','error'); return; }
  if (!desc)                      { toast('Enter a description','error'); return; }

  try {
    if (editingTransactionId) {
      // EDIT — reverse old effect, apply new
      const old = accountTransactions.find(x => x.id === editingTransactionId);
      if (!old) { toast('Transaction not found','error'); return; }
      await runTransaction(db, async tx => {
        const aRef = doc(db,'accounts',accountId);
        const aDoc = await tx.get(aRef);
        if (!aDoc.exists()) throw new Error('Account not found');
        let bal = Number(aDoc.data().balance)||0;
        bal += old.type==='credit' ? -old.amount : old.amount; // undo old
        bal += type==='credit'     ?  amount      : -amount;   // apply new
        tx.update(aRef, { balance: bal });
        tx.update(doc(db,'account_transactions',editingTransactionId), { date, type, amount, description: desc });
      });
      toast('Transaction updated ✓');
    } else {
      // ADD
      const data = { accountId, accountName: currentAccount.name, date, type, amount, description: desc, createdAt: new Date().toISOString() };
      await runTransaction(db, async tx => {
        const aRef = doc(db,'accounts',accountId);
        const aDoc = await tx.get(aRef);
        if (!aDoc.exists()) throw new Error('Account not found');
        const newBal = (Number(aDoc.data().balance)||0) + (type==='credit' ? amount : -amount);
        tx.update(aRef, { balance: newBal });
        tx.set(doc(collection(db,'account_transactions')), data);
      });
      toast('Transaction added ✓');
    }
    closeModal('transactionModal');
    editingTransactionId = null;
  } catch(err) { console.error(err); toast(err.message,'error'); }
});

// ── HELPERS ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

// ── INIT ──────────────────────────────────────────────────────────────────────
applyCollapse(isCollapsed());
initMonthFilter();
loadAccount();
loadTransactions();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Account Detail · Trismart</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --p: #4361ee;
  --p2: #3a56d4;
  --ok: #2ecc71;
  --ok2: #27ae60;
  --warn: #f8961e;
  --danger: #ef4444;
  --purple: #7c3aed;
  --bg: #f4f6fb;
  --sur: #ffffff;
  --lite: #f1f3f5;
  --bdr: #dee2e6;
  --txt: #212529;
  --fade: #6c757d;
  --radius: 12px;
  --radius-lg: 16px;
  --sh: 0 1px 6px rgba(0,0,0,0.05);
  --shl: 0 4px 20px rgba(0,0,0,0.08);
}

html, body {
  height: 100%;
  width: 100%;
  overflow: hidden;
  font-family: 'DM Sans', system-ui, sans-serif;
  background: var(--bg);
}

.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  width: 100%;
  overflow: hidden;
}

.topbar {
  background: var(--sur);
  border-bottom: 1px solid var(--bdr);
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  box-shadow: var(--sh);
  z-index: 100;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-mark {
  width: 32px;
  height: 32px;
  background: linear-gradient(135deg, var(--p), var(--p2));
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
}

.logo-text {
  font-weight: 800;
  font-size: 0.9rem;
}

.back-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 14px;
  background: var(--lite);
  border: 1px solid var(--bdr);
  border-radius: 40px;
  font-size: 0.7rem;
  font-weight: 700;
  cursor: pointer;
  text-decoration: none;
  color: var(--txt);
  transition: 0.15s;
}

.back-btn:hover {
  border-color: var(--p);
  color: var(--p);
}

.main-content {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
  min-height: 0;
}

.account-header-card {
  background: var(--sur);
  border: 1px solid var(--bdr);
  border-radius: var(--radius-lg);
  padding: 20px;
  margin-bottom: 24px;
  box-shadow: var(--sh);
}

.account-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 16px;
}

.account-info {
  display: flex;
  align-items: center;
  gap: 16px;
}

.account-icon-large {
  width: 56px;
  height: 56px;
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.3rem;
}

.icon-revenue { background: rgba(46,204,113,0.1); color: var(--ok); }
.icon-expense { background: rgba(239,68,68,0.1); color: var(--danger); }
.icon-asset { background: rgba(67,97,238,0.1); color: var(--p); }
.icon-liability { background: rgba(245,158,11,0.1); color: var(--warn); }
.icon-equity { background: rgba(124,58,237,0.1); color: var(--purple); }

.account-name h1 {
  font-size: 1.2rem;
  font-weight: 800;
  margin-bottom: 4px;
}

.account-type-badge {
  font-size: 0.6rem;
  font-weight: 800;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 40px;
  display: inline-block;
}

.balance-display {
  text-align: right;
}

.balance-label {
  font-size: 0.6rem;
  font-weight: 800;
  text-transform: uppercase;
  color: var(--fade);
}

.balance-amount {
  font-size: 1.8rem;
  font-weight: 800;
  font-family: 'DM Mono', monospace;
}

.balance-amount.positive { color: var(--ok); }
.balance-amount.negative { color: var(--danger); }

.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  margin-top: 8px;
  flex-wrap: wrap;
  gap: 10px;
}

.section-header-left {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.section-title {
  font-size: 0.75rem;
  font-weight: 800;
  text-transform: uppercase;
  color: var(--fade);
  letter-spacing: 0.08em;
}

/* Monthly filter styles */
.month-filter {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--sur);
  border: 1.5px solid var(--bdr);
  border-radius: 40px;
  padding: 5px 12px;
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--txt);
  cursor: pointer;
  transition: 0.15s;
}

.month-filter:hover {
  border-color: var(--p);
  color: var(--p);
}

.month-filter input[type="month"] {
  border: none;
  outline: none;
  font-family: inherit;
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--p);
  background: transparent;
  cursor: pointer;
  width: 110px;
}

.clear-filter-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 5px 10px;
  background: rgba(239,68,68,0.1);
  color: var(--danger);
  border: 1.5px solid rgba(239,68,68,0.2);
  border-radius: 40px;
  font-size: 0.65rem;
  font-weight: 700;
  cursor: pointer;
  transition: 0.15s;
}

.clear-filter-btn:hover {
  background: rgba(239,68,68,0.2);
}

.filter-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 10px;
  background: rgba(67,97,238,0.1);
  color: var(--p);
  border-radius: 40px;
  font-size: 0.65rem;
  font-weight: 700;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: 40px;
  font-size: 0.7rem;
  font-weight: 700;
  cursor: pointer;
  border: none;
  transition: 0.15s;
}

.btn-primary {
  background: linear-gradient(135deg, var(--p), var(--p2));
  color: white;
}

.btn-outline {
  background: transparent;
  border: 1.5px solid var(--bdr);
  color: var(--txt);
}

.btn-outline:hover {
  border-color: var(--p);
  color: var(--p);
}

.table-container {
  background: var(--sur);
  border: 1px solid var(--bdr);
  border-radius: var(--radius);
  overflow: auto;
  flex: 1;
  min-height: 300px;
  max-height: calc(100vh - 320px);
  box-shadow: var(--sh);
}

.transaction-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.7rem;
  min-width: 650px;
}

.transaction-table th {
  padding: 12px 12px;
  text-align: left;
  font-size: 0.55rem;
  font-weight: 800;
  text-transform: uppercase;
  color: var(--fade);
  border-bottom: 1px solid var(--bdr);
  position: sticky;
  top: 0;
  background: white;
  z-index: 10;
}

.transaction-table td {
  padding: 10px 12px;
  border-bottom: 1px solid #eff3f8;
  vertical-align: middle;
}

.debit-amount {
  color: var(--danger);
  font-weight: 700;
}

.credit-amount {
  color: var(--ok);
  font-weight: 700;
}

.balance-amount-table {
  font-weight: 700;
  font-family: 'DM Mono', monospace;
}

.empty-row td {
  text-align: center;
  padding: 60px;
  color: var(--fade);
}

.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(4px);
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
}

.modal-overlay.show {
  display: flex;
}

.modal-content {
  background: white;
  border-radius: 24px;
  max-width: 500px;
  width: 90%;
  max-height: 85vh;
  overflow: auto;
  padding: 24px;
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--bdr);
}

.modal-header h3 {
  font-size: 1rem;
  font-weight: 800;
}

.close-modal {
  cursor: pointer;
  font-size: 1.2rem;
  color: var(--fade);
}

.form-group {
  margin-bottom: 16px;
}

.form-group label {
  display: block;
  font-size: 0.6rem;
  font-weight: 800;
  text-transform: uppercase;
  color: var(--fade);
  margin-bottom: 5px;
}

.form-group input, .form-group select {
  width: 100%;
  padding: 10px 12px;
  border: 1.5px solid var(--bdr);
  border-radius: 12px;
  font-size: 0.8rem;
  font-family: inherit;
}

.form-group input:focus, .form-group select:focus {
  outline: none;
  border-color: var(--p);
}

.form-actions {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.toast-wrap {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 1100;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.toast {
  background: #1e293b;
  color: white;
  padding: 10px 18px;
  border-radius: 40px;
  font-size: 0.7rem;
  animation: fadeIn 0.2s;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

::-webkit-scrollbar {
  width: 4px;
  height: 4px;
}

::-webkit-scrollbar-track {
  background: var(--lite);
}

::-webkit-scrollbar-thumb {
  background: var(--bdr);
  border-radius: 4px;
}

@media (max-width: 700px) {
  .account-row {
    flex-direction: column;
    align-items: flex-start;
  }
  .balance-display {
    text-align: left;
  }
  .main-content {
    padding: 12px;
  }
  .topbar {
    padding: 0 12px;
  }
}
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="logo">
      <div class="logo-mark"><i class="fas fa-book"></i></div>
      <div class="logo-text">Trismart · Account Detail</div>
    </div>
    <a href="accounts-dashboard.html" class="back-btn">
      <i class="fas fa-arrow-left"></i> Back to Accounts
    </a>
  </div>

  <div class="main-content">

    <div class="account-header-card" id="accountHeader">
      <div style="text-align:center; padding:30px;">Loading account details...</div>
    </div>

    <div class="section-header">
      <div class="section-header-left">
        <div class="section-title"><i class="fas fa-list"></i> Transaction History</div>

        <!-- Monthly Filter -->
        <div class="month-filter" title="Filter by month">
          <i class="fas fa-calendar-alt" style="color:var(--p); font-size:0.7rem;"></i>
          <input type="month" id="monthFilter" title="Select month to filter">
        </div>
        <button class="clear-filter-btn" id="clearFilterBtn" onclick="clearMonthFilter()" style="display:none;">
          <i class="fas fa-times"></i> All Months
        </button>
        <span class="filter-badge" id="filterBadge" style="display:none;">
          <i class="fas fa-filter"></i> <span id="filterBadgeText"></span>
        </span>
      </div>
      <button class="btn btn-primary" onclick="openTransactionModal()">
        <i class="fas fa-plus"></i> Add Transaction
      </button>
    </div>

    <div class="table-container">
      <table class="transaction-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Description</th>
            <th>Debit</th>
            <th>Credit</th>
            <th>Balance</th>
            <th style="width:50px;">Action</th>
          </tr>
        </thead>
        <tbody id="transactionsTbody">
          <tr class="empty-row"><td colspan="6">Loading transactions...</td></tr>
        </tbody>
       </table>
    </div>

  </div>
</div>

<div id="transactionModal" class="modal-overlay">
  <div class="modal-content">
    <div class="modal-header">
      <h3>Add Transaction</h3>
      <span class="close-modal" onclick="closeModal('transactionModal')">&times;</span>
    </div>
    <div id="transactionFormWrap">
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="transDate" required>
      </div>
      <div class="form-group">
        <label>Transaction Type</label>
        <select id="transType" required>
          <option value="credit">Credit (Money In / Income)</option>
          <option value="debit">Debit (Money Out / Expense)</option>
        </select>
      </div>
      <div class="form-group">
        <label>Amount (K)</label>
        <input type="number" id="transAmount" step="0.01" required placeholder="0.00">
      </div>
      <div class="form-group">
        <label>Description</label>
        <input type="text" id="transDesc" required placeholder="e.g., Rent payment, Sales revenue">
      </div>
      <div class="form-actions">
        <button id="submitTransBtn" class="btn btn-primary">Add Transaction</button>
        <button type="button" class="btn btn-outline" onclick="closeModal('transactionModal')">Cancel</button>
      </div>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.5.0/firebase-app.js";
import { getFirestore, collection, query, where, addDoc, updateDoc, deleteDoc, doc, onSnapshot, runTransaction, getDocs } from "https://www.gstatic.com/firebasejs/11.5.0/firebase-firestore.js";

const firebaseConfig = { 
  apiKey: "AIzaSyB-lm7Y3r1F6VvY8PKvY8glLabZDbJsHM1k", 
  authDomain: "trismartstores.firebaseapp.com", 
  projectId: "trismartstores", 
  storageBucket: "trismartstores.appspot.com", 
  messagingSenderId: "416692703333", 
  appId: "1:416692703333:web:d4b60292621435c748f68c" 
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const loggedInUser = localStorage.getItem('loggedInUser') || '';
const userName = (loggedInUser || localStorage.getItem('userName') || '').toLowerCase().trim();

if (userName !== 'chris') { 
  document.body.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100vh;"><div style="background:white;padding:30px;border-radius:24px;">Access Denied.</div></div>`; 
  throw new Error('unauth'); 
}

const accountId = localStorage.getItem('selectedAccountId');
if (!accountId) {
  toast('No account selected', 'error');
  setTimeout(() => window.location.href = 'accounts-dashboard.html', 1500);
}

let currentAccount = null;
let accountTransactions = [];
let unsubscribeAccount = null;
let unsubscribeTransactions = null;

// ── MONTHLY FILTER (persisted in localStorage) ──────────────────────────────
// Key is per-account so filters don't bleed between accounts
const FILTER_KEY = `trismart_month_filter_${accountId}`;

function getSavedFilter() {
  return localStorage.getItem(FILTER_KEY) || '';
}

function saveFilter(value) {
  if (value) {
    localStorage.setItem(FILTER_KEY, value);
  } else {
    localStorage.removeItem(FILTER_KEY);
  }
}

function initMonthFilter() {
  const saved = getSavedFilter();
  const input = document.getElementById('monthFilter');
  if (saved) {
    input.value = saved;
    showFilterBadge(saved);
  }

  input.addEventListener('change', () => {
    saveFilter(input.value);
    if (input.value) {
      showFilterBadge(input.value);
    } else {
      hideFilterBadge();
    }
    renderTransactions();
    renderAccountHeader();
  });
}

function showFilterBadge(yearMonth) {
  // yearMonth = "2025-04" → format nicely
  const [year, month] = yearMonth.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const label = `${months[parseInt(month, 10) - 1]} ${year}`;
  document.getElementById('filterBadgeText').textContent = label;
  document.getElementById('filterBadge').style.display = 'inline-flex';
  document.getElementById('clearFilterBtn').style.display = 'inline-flex';
}

function hideFilterBadge() {
  document.getElementById('filterBadge').style.display = 'none';
  document.getElementById('clearFilterBtn').style.display = 'none';
}

window.clearMonthFilter = function() {
  document.getElementById('monthFilter').value = '';
  saveFilter('');
  hideFilterBadge();
  renderTransactions();
  renderAccountHeader();
};

function getFilteredTransactions() {
  const filter = getSavedFilter(); // e.g. "2025-04"
  if (!filter) return accountTransactions;
  return accountTransactions.filter(t => t.date && t.date.startsWith(filter));
}
// ─────────────────────────────────────────────────────────────────────────────

function toast(msg, type = 'success') {
  const wrap = document.getElementById('toastWrap');
  const t = document.createElement('div');
  t.className = 'toast';
  t.style.background = type === 'error' ? '#b91c1c' : '#1e293b';
  t.innerHTML = `<i class="fas ${type === 'error' ? 'fa-times-circle' : 'fa-check-circle'}"></i> ${msg}`;
  wrap.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function closeModal(modalId) {
  document.getElementById(modalId).classList.remove('show');
}
window.closeModal = closeModal;

function openTransactionModal() {
  document.getElementById('transactionFormWrap').querySelectorAll('input, select').forEach(el => {
    if (el.type !== 'submit') el.value = '';
  });
  document.getElementById('transDate').valueAsDate = new Date();
  document.getElementById('transactionModal').classList.add('show');
}
window.openTransactionModal = openTransactionModal;

function loadAccount() {
  if (unsubscribeAccount) unsubscribeAccount();
  unsubscribeAccount = onSnapshot(doc(db, 'accounts', accountId), (docSnap) => {
    if (docSnap.exists()) {
      currentAccount = { id: docSnap.id, ...docSnap.data(), balance: Number(docSnap.data().balance) || 0 };
      renderAccountHeader();
    } else {
      toast('Account not found', 'error');
      setTimeout(() => window.location.href = 'accounts-dashboard.html', 1500);
    }
  }, (error) => {
    console.error('Account load error:', error);
    toast('Error loading account', 'error');
  });
}

function loadTransactions() {
  if (unsubscribeTransactions) unsubscribeTransactions();

  // FIX: Removed orderBy('date','desc') — that requires a composite Firestore index
  // which may not exist yet and causes silent query failures.
  // We sort in JavaScript instead (see renderTransactions).
  const q = query(
    collection(db, 'account_transactions'),
    where('accountId', '==', accountId)
  );

  unsubscribeTransactions = onSnapshot(q, (snap) => {
    accountTransactions = snap.docs.map(d => ({
      id: d.id,
      ...d.data(),
      amount: Number(d.data().amount) || 0
    }));

    console.log('Transactions loaded:', accountTransactions.length);
    renderTransactions();
    renderAccountHeader();
  }, (error) => {
    console.error('Transactions load error:', error);
    toast('Error loading transactions: ' + error.message, 'error');
    document.getElementById('transactionsTbody').innerHTML =
      '<tr class="empty-row"><td colspan="6">Error loading transactions. Check console for details.</td></tr>';
  });
}

function renderAccountHeader() {
  if (!currentAccount) return;
  
  const typeIcons = {
    revenue: { icon: 'fa-chart-line', class: 'icon-revenue', label: 'REVENUE' },
    expense: { icon: 'fa-shopping-cart', class: 'icon-expense', label: 'EXPENSE' },
    asset: { icon: 'fa-coins', class: 'icon-asset', label: 'ASSET' },
    liability: { icon: 'fa-hand-holding-usd', class: 'icon-liability', label: 'LIABILITY' },
    equity: { icon: 'fa-chart-pie', class: 'icon-equity', label: 'EQUITY' }
  };
  
  const typeInfo = typeIcons[currentAccount.type] || typeIcons.asset;
  const balanceClass = (currentAccount.type === 'expense' || currentAccount.type === 'liability') && currentAccount.balance > 0 ? 'negative' : 'positive';

  // Summary stats use the FILTERED set so the header reflects the active filter
  const filtered = getFilteredTransactions();
  const totalCredit = filtered.filter(t => t.type === 'credit').reduce((sum, t) => sum + t.amount, 0);
  const totalDebit  = filtered.filter(t => t.type === 'debit').reduce((sum, t) => sum + t.amount, 0);
  const filterNote  = getSavedFilter() ? ` <span style="font-size:0.55rem;color:var(--p);">(filtered period)</span>` : '';
  
  document.getElementById('accountHeader').innerHTML = `
    <div class="account-row">
      <div class="account-info">
        <div class="account-icon-large ${typeInfo.class}">
          <i class="fas ${typeInfo.icon}"></i>
        </div>
        <div class="account-name">
          <h1>${escapeHtml(currentAccount.name)}</h1>
          <span class="account-type-badge" style="background:${typeInfo.class === 'icon-revenue' ? 'rgba(46,204,113,0.15)' : 'rgba(67,97,238,0.15)'}; color:${typeInfo.class === 'icon-revenue' ? '#2ecc71' : '#4361ee'}">
            ${typeInfo.label}
          </span>
          ${currentAccount.description ? `<div style="font-size:0.65rem; color:var(--fade); margin-top:4px;">${escapeHtml(currentAccount.description)}</div>` : ''}
        </div>
      </div>
      <div class="balance-display">
        <div class="balance-label">Current Balance</div>
        <div class="balance-amount ${balanceClass}">K${(currentAccount.balance || 0).toFixed(2)}</div>
        <div style="font-size:0.6rem; color:var(--fade); margin-top:4px;">
          Credits: K${totalCredit.toFixed(2)} | Debits: K${totalDebit.toFixed(2)}${filterNote}
        </div>
      </div>
    </div>
  `;
}

function renderTransactions() {
  const tbody = document.getElementById('transactionsTbody');
  const filtered = getFilteredTransactions();

  if (filtered.length === 0) {
    const msg = getSavedFilter()
      ? 'No transactions for the selected month. Try a different month or clear the filter.'
      : 'No transactions for this account. Click "Add Transaction" to get started.';
    tbody.innerHTML = `<tr class="empty-row"><td colspan="6">${msg}</td></tr>`;
    return;
  }

  // Sort descending by date (newest first) — done in JS, no Firestore index needed
  const sortedDesc = [...filtered].sort((a, b) => {
    if (a.date < b.date) return 1;
    if (a.date > b.date) return -1;
    return 0;
  });

  // Running balance computed in ascending order, then mapped back
  const sortedAsc = [...filtered].sort((a, b) => {
    if (a.date < b.date) return -1;
    if (a.date > b.date) return 1;
    return 0;
  });
  let runningBalance = 0;
  const balanceMap = new Map();
  for (const trans of sortedAsc) {
    runningBalance += trans.type === 'credit' ? trans.amount : -trans.amount;
    balanceMap.set(trans.id, runningBalance);
  }

  tbody.innerHTML = sortedDesc.map(trans => {
    const isDebit  = trans.type === 'debit';
    const debitAmt  = isDebit  ? `K${trans.amount.toFixed(2)}` : '-';
    const creditAmt = !isDebit ? `K${trans.amount.toFixed(2)}` : '-';
    const balance   = balanceMap.get(trans.id) || 0;

    return `
      <tr>
        <td>${trans.date || '-'}</td>
        <td><strong>${escapeHtml(trans.description || '-')}</strong></td>
        <td class="debit-amount">${debitAmt}</td>
        <td class="credit-amount">${creditAmt}</td>
        <td class="balance-amount-table">K${balance.toFixed(2)}</td>
        <td>
          <button class="btn btn-outline" style="padding:4px 8px;" onclick="deleteTransaction('${trans.id}')">
            <i class="fas fa-trash-alt"></i>
          </button>
        </td>
      </tr>
    `;
  }).join('');
}

window.deleteTransaction = async function(transactionId) {
  if (!confirm('Delete this transaction? This will affect the account balance.')) return;
  
  const transaction = accountTransactions.find(t => t.id === transactionId);
  if (!transaction) return;
  
  try {
    await runTransaction(db, async (txRef) => {
      const accountRef = doc(db, 'accounts', accountId);
      const accountDoc = await txRef.get(accountRef);
      if (!accountDoc.exists()) throw new Error('Account not found');
      
      let currentBalance = Number(accountDoc.data().balance) || 0;
      let newBalance = transaction.type === 'credit'
        ? currentBalance - transaction.amount
        : currentBalance + transaction.amount;
      
      txRef.update(accountRef, { balance: newBalance });
      txRef.delete(doc(db, 'account_transactions', transactionId));
    });
    toast('Transaction deleted');
  } catch (err) {
    console.error('Delete error:', err);
    toast(err.message, 'error');
  }
};

// Submit transaction via button click (avoids form submit issues)
document.getElementById('submitTransBtn').addEventListener('click', async () => {
  const amount = parseFloat(document.getElementById('transAmount').value);
  const type   = document.getElementById('transType').value;
  const date   = document.getElementById('transDate').value;
  const desc   = document.getElementById('transDesc').value;

  if (!date) { toast('Pick a date', 'error'); return; }
  if (isNaN(amount) || amount <= 0) { toast('Enter a valid amount', 'error'); return; }
  if (!desc.trim()) { toast('Enter a description', 'error'); return; }

  const transactionData = {
    accountId,
    accountName: currentAccount.name,
    date,
    type,
    amount,
    description: desc.trim(),
    createdAt: new Date().toISOString()
  };

  try {
    await runTransaction(db, async (txRef) => {
      const accountRef = doc(db, 'accounts', accountId);
      const accountDoc = await txRef.get(accountRef);
      if (!accountDoc.exists()) throw new Error('Account not found');
      
      let currentBalance = Number(accountDoc.data().balance) || 0;
      let newBalance = type === 'credit'
        ? currentBalance + amount
        : currentBalance - amount;
      
      txRef.update(accountRef, { balance: newBalance });
      txRef.set(doc(collection(db, 'account_transactions')), transactionData);
    });
    toast('Transaction added ✓');
    closeModal('transactionModal');
  } catch (err) {
    console.error('Add transaction error:', err);
    toast(err.message, 'error');
  }
});

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/[&<>"']/g, m => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[m]));
}

// Init
initMonthFilter();
loadAccount();
loadTransactions();
</script>

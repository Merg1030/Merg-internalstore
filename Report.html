<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Daily Cash Report</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --bg:        #f4f6fb;
            --bg2:       #ffffff;
            --bg3:       #f1f3f5;
            --border:    #e2e6ef;
            --border2:   #cdd3e0;
            --text:      #1a1e2e;
            --text-fade: #6b7490;
            --text-dim:  #a0a8c0;
            --blue:      #4361ee;
            --cyan:      #00b4d8;
            --green:     #10b981;
            --orange:    #f59e0b;
            --pink:      #f72585;
            --danger:    #ef4444;
            --radius:    12px;
            --radius-lg: 18px;
            --shadow:    0 2px 12px rgba(67,97,238,0.08);
            --shadow-lg: 0 8px 32px rgba(67,97,238,0.13);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── TOPBAR ── */
        .topbar {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow);
            padding: 0 16px;
            height: 56px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
        }
        .topbar-left { display: flex; align-items: center; gap: 10px; }
        .logo-mark {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, var(--blue), var(--cyan));
            border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 0.85rem;
            box-shadow: 0 0 12px rgba(67,97,238,0.25);
        }
        .logo-text { font-size: 0.95rem; font-weight: 800; color: var(--text); }
        .logo-text span { color: var(--blue); }
        .page-title {
            font-size: 0.78rem; font-weight: 700; color: var(--text-fade);
            background: var(--bg3); border: 1px solid var(--border);
            border-radius: 100px; padding: 4px 12px;
        }

        /* ── MAIN ── */
        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 18px 14px 40px;
        }

        /* ── FILTER ROW ── */
        .filter-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px 14px;
            display: flex; align-items: center; gap: 10px;
            box-shadow: var(--shadow);
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .filter-card label {
            font-size: 0.72rem; font-weight: 700; color: var(--text-fade);
            text-transform: uppercase; letter-spacing: 0.08em;
        }
        .filter-card select {
            background: var(--bg3);
            border: 1px solid var(--border2);
            border-radius: 8px;
            color: var(--text);
            padding: 6px 10px;
            font-size: 0.82rem;
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
            cursor: pointer;
            outline: none;
            transition: border-color 0.18s;
        }
        .filter-card select:focus { border-color: var(--blue); }

        /* ── TOGGLE BUTTON ── */
        .toggle-btn {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            width: 100%;
            background: linear-gradient(135deg, var(--blue), var(--cyan));
            color: white;
            font-weight: 700;
            border: none;
            border-radius: var(--radius);
            font-size: 0.88rem;
            padding: 12px 0;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(67,97,238,0.25);
            transition: all 0.2s;
            margin-bottom: 14px;
            font-family: 'DM Sans', sans-serif;
        }
        .toggle-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(67,97,238,0.3);
        }

        /* ── FORM CARD ── */
        .form-card {
            background: var(--bg2);
            border-radius: var(--radius-lg);
            padding: 18px 16px 14px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
            display: none;
            margin-bottom: 16px;
            animation: fadeUp .35s ease;
        }

        .section-label {
            font-size: 0.65rem; font-weight: 800;
            text-transform: uppercase; letter-spacing: 0.12em;
            color: var(--blue);
            display: flex; align-items: center; gap: 7px;
            margin: 16px 0 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border);
        }
        .section-label:first-child { margin-top: 0; }
        .section-label i { font-size: 0.75rem; }

        .form-group { margin-bottom: 10px; }
        .form-group label {
            display: block;
            font-size: 0.72rem; font-weight: 700; color: var(--text-fade);
            text-transform: uppercase; letter-spacing: 0.07em;
            margin-bottom: 4px;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            background: var(--bg3);
            border: 1.5px solid var(--border);
            border-radius: 9px;
            color: var(--text);
            padding: 9px 12px;
            font-size: 0.88rem;
            font-family: 'DM Sans', sans-serif;
            transition: border-color 0.18s, box-shadow 0.18s;
            outline: none;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(67,97,238,0.1);
            background: white;
        }
        .form-group textarea {
            min-height: 70px; resize: vertical;
            line-height: 1.5;
        }

        .field-row {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
        }

        .btn-row {
            display: flex; gap: 10px; margin-top: 14px;
        }
        .save-btn {
            flex: 1;
            background: linear-gradient(135deg, var(--blue), var(--cyan));
            color: white; font-weight: 700; border: none;
            border-radius: var(--radius); padding: 11px 0;
            font-size: 0.88rem; cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            box-shadow: 0 4px 12px rgba(67,97,238,0.2);
            transition: all 0.18s;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .save-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(67,97,238,0.3); }
        .clear-btn {
            flex: 1;
            background: var(--bg3); color: var(--danger);
            border: 1.5px solid rgba(239,68,68,0.3);
            border-radius: var(--radius); padding: 11px 0;
            font-size: 0.88rem; font-weight: 700; cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.18s;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .clear-btn:hover { background: rgba(239,68,68,0.08); border-color: var(--danger); }

        /* ── REPORTS LIST ── */
        .reports-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow);
        }
        .reports-hdr {
            padding: 14px 16px 12px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }
        .reports-hdr h3 {
            font-size: 0.82rem; font-weight: 700; color: var(--text);
            display: flex; align-items: center; gap: 7px;
        }
        .reports-hdr h3 i { color: var(--blue); }
        .report-count {
            background: var(--bg3); border: 1px solid var(--border2);
            border-radius: 100px; padding: 2px 9px;
            font-size: 0.63rem; font-weight: 700; color: var(--text-fade);
        }

        .report-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }
        .report-item:last-child { border-bottom: none; }
        .report-item:hover { background: var(--bg3); }

        .report-item input[type="checkbox"] {
            width: 18px; height: 18px;
            accent-color: var(--blue);
            cursor: pointer; flex-shrink: 0;
            border-radius: 5px;
        }
        .report-num {
            font-size: 0.65rem; font-weight: 700; color: var(--text-dim);
            font-family: 'DM Mono', monospace; flex-shrink: 0; width: 18px; text-align: right;
        }
        .report-icon {
            width: 34px; height: 34px; border-radius: 9px;
            background: linear-gradient(135deg, rgba(67,97,238,0.12), rgba(0,180,216,0.08));
            border: 1px solid rgba(67,97,238,0.15);
            display: flex; align-items: center; justify-content: center;
            color: var(--blue); font-size: 0.8rem; flex-shrink: 0;
        }
        .report-info { flex: 1; min-width: 0; }
        .report-name {
            font-size: 0.8rem; font-weight: 700; color: var(--text);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .report-sub { font-size: 0.65rem; color: var(--text-fade); margin-top: 1px; }

        .empty-state {
            padding: 32px 16px;
            text-align: center;
            color: var(--text-dim);
            font-size: 0.82rem;
        }
        .empty-state i { font-size: 1.6rem; margin-bottom: 8px; display: block; color: var(--border2); }

        .download-btn {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            width: calc(100% - 32px); margin: 12px 16px;
            background: linear-gradient(135deg, var(--green), #00b4d8);
            color: white; border: none; border-radius: var(--radius);
            padding: 11px 0; font-size: 0.85rem; font-weight: 700;
            cursor: pointer; font-family: 'DM Sans', sans-serif;
            box-shadow: 0 4px 12px rgba(16,185,129,0.2);
            transition: all 0.2s;
        }
        .download-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(16,185,129,0.3); }

        /* ── ANIMATIONS ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 420px) {
            .container { padding: 14px 10px 40px; }
            .field-row { grid-template-columns: 1fr; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.5.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy }
            from "https://www.gstatic.com/firebasejs/11.5.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB-lm7Y3r1F6VvY8PKvY8glLabZDbJsHM1k",
            authDomain: "trismartstores.firebaseapp.com",
            projectId: "trismartstores",
            storageBucket: "trismartstores.appspot.com",
            messagingSenderId: "416692703333",
            appId: "1:416692703333:web:d4b60292621435c748f68c",
            measurementId: "G-NJPQ7L3QWJ"
        };
        const app = initializeApp(firebaseConfig);
        const db  = getFirestore(app);

        let reportsCache = [];
        let selectedMonth = "";
        let selectedYear  = "";

        const filterKey = "cashReportFilters";

        function loadFilters() {
            const f = localStorage.getItem(filterKey);
            if (f) {
                try { ({ month: selectedMonth, year: selectedYear } = JSON.parse(f)); } catch {}
            } else {
                const now = new Date();
                selectedMonth = String(now.getMonth() + 1).padStart(2, '0');
                selectedYear  = String(now.getFullYear());
            }
        }

        function saveFilters() {
            localStorage.setItem(filterKey, JSON.stringify({ month: selectedMonth, year: selectedYear }));
        }

        function setupSelects() {
            const ms = document.getElementById('filterMonth');
            const ys = document.getElementById('filterYear');
            ms.innerHTML = ''; ys.innerHTML = '';
            for (let m = 1; m <= 12; m++) {
                const o = document.createElement('option');
                o.value = String(m).padStart(2,'0');
                o.textContent = new Date(2000, m-1, 1).toLocaleString('en-US', { month: 'short' });
                ms.appendChild(o);
            }
            const yr = new Date().getFullYear();
            for (let y = yr; y >= yr - 5; y--) {
                const o = document.createElement('option');
                o.value = String(y); o.textContent = String(y);
                ys.appendChild(o);
            }
            ms.value = selectedMonth; ys.value = selectedYear;
        }

        function fmtDate(dt) {
            if (!dt) return '';
            const [y,m,d] = dt.split('-');
            const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
            return `${Number(d)} ${months[Number(m)-1]} ${y}`;
        }

        function fmtDay(dt) {
            if (!dt) return '';
            try {
                return new Date(dt + 'T00:00:00').toLocaleDateString('en-GB', { weekday:'long' });
            } catch { return ''; }
        }

        async function listReports() {
            const wrap = document.getElementById('reportListWrap');
            const countEl = document.getElementById('reportCount');
            wrap.innerHTML = `<div class="empty-state"><i class="fas fa-spinner fa-spin"></i>Loading…</div>`;

            const snap = await getDocs(query(collection(db,'dailyCashReports'), orderBy('date','desc')));
            reportsCache = [];

            if (snap.empty) {
                wrap.innerHTML = `<div class="empty-state"><i class="fas fa-folder-open"></i>No reports found.</div>`;
                countEl.textContent = '0';
                return;
            }

            let items = '';
            let i = 0;
            snap.forEach(doc => {
                const r = doc.data();
                if (selectedMonth && selectedYear) {
                    if (!r.date || r.date.length < 7) return;
                    const [y,m] = r.date.split('-');
                    if (y !== selectedYear || m !== selectedMonth) return;
                }
                reportsCache.push(r);
                items += `
                    <div class="report-item">
                        <input type="checkbox" class="pdf-checkbox" data-idx="${i}">
                        <div class="report-num">${i+1}</div>
                        <div class="report-icon"><i class="fas fa-file-alt"></i></div>
                        <div class="report-info">
                            <div class="report-name">Report — ${fmtDate(r.date)}</div>
                            <div class="report-sub">${fmtDay(r.date)}${r.timeIn ? ' · In: '+r.timeIn : ''}${r.timeOut ? ' · Out: '+r.timeOut : ''}</div>
                        </div>
                    </div>`;
                i++;
            });

            wrap.innerHTML = reportsCache.length
                ? items
                : `<div class="empty-state"><i class="fas fa-calendar-times"></i>No reports for this month.</div>`;
            countEl.textContent = reportsCache.length;
        }

        window.onload = () => {
            loadFilters();
            setupSelects();
            listReports();

            document.getElementById('filterMonth').addEventListener('change', () => {
                selectedMonth = document.getElementById('filterMonth').value;
                saveFilters(); listReports();
            });
            document.getElementById('filterYear').addEventListener('change', () => {
                selectedYear = document.getElementById('filterYear').value;
                saveFilters(); listReports();
            });

            // Toggle form
            let formOpen = false;
            const form = document.getElementById('reportForm');
            const toggleBtn = document.getElementById('toggleFormBtn');
            toggleBtn.addEventListener('click', () => {
                formOpen = !formOpen;
                form.style.display = formOpen ? 'block' : 'none';
                toggleBtn.innerHTML = formOpen
                    ? '<i class="fas fa-times"></i> Hide Form'
                    : '<i class="fas fa-plus"></i> Add New Report';
            });

            // Save report
            form.addEventListener('submit', async e => {
                e.preventDefault();
                const report = {
                    date:                 document.getElementById('reportDate').value,
                    timeIn:               document.getElementById('timeIn').value,
                    timeOut:              document.getElementById('timeOut').value,
                    customerComplaints:   document.getElementById('customerComplaints').value,
                    customerSuggestions:  document.getElementById('customerSuggestions').value,
                    deductions:           document.getElementById('deductions').value,
                    totalDeduction:       document.getElementById('totalDeduction').value,
                    totalSales:           document.getElementById('totalSales').value
                };
                if (!report.date) { alert('Please enter a date.'); return; }
                try {
                    await addDoc(collection(db,'dailyCashReports'), report);
                    await listReports();
                    form.reset();
                    formOpen = false;
                    form.style.display = 'none';
                    toggleBtn.innerHTML = '<i class="fas fa-plus"></i> Add New Report';
                } catch (err) { alert('Error saving: ' + err.message); }
            });

            // Clear
            document.getElementById('clearBtn').addEventListener('click', () => form.reset());

            // Download PDF
            document.getElementById('downloadBtn').addEventListener('click', () => {
                const checked = [...document.querySelectorAll('.pdf-checkbox')].filter(c => c.checked);
                if (!checked.length) { alert('Please check at least one report.'); return; }
                checked.forEach(cb => {
                    const data = reportsCache[parseInt(cb.dataset.idx)];
                    if (!data) return;
                    const doc = new window.jspdf.jsPDF();
                    let y = 18;

                    doc.setFontSize(18); doc.setFont(undefined, 'bold');
                    doc.text('TRISMART STORES', 14, y); y += 9;
                    doc.setFontSize(11); doc.setFont(undefined, 'normal');
                    doc.text('Daily Cash Report', 14, y); y += 12;

                    doc.setDrawColor(67, 97, 238);
                    doc.setLineWidth(0.6); doc.line(14, y, 196, y); y += 8;

                    doc.setFontSize(13); doc.setFont(undefined, 'bold');
                    doc.text(`${fmtDate(data.date)}  —  ${fmtDay(data.date)}`, 14, y); y += 9;
                    doc.setFontSize(10); doc.setFont(undefined, 'normal');
                    doc.text(`Time In: ${data.timeIn || '-'}    Time Out: ${data.timeOut || '-'}`, 14, y); y += 12;

                    doc.setFont(undefined, 'bold'); doc.setFontSize(11);
                    doc.text('Customer Complaints', 14, y); y += 7;
                    doc.setFont(undefined, 'normal'); doc.setFontSize(10);
                    const complaints = data.customerComplaints?.trim() || 'None';
                    const cLines = doc.splitTextToSize(complaints, 170);
                    doc.text(cLines, 14, y); y += cLines.length * 6 + 8;

                    doc.setFont(undefined, 'bold'); doc.setFontSize(11);
                    doc.text('Customer Suggestions', 14, y); y += 7;
                    doc.setFont(undefined, 'normal'); doc.setFontSize(10);
                    const suggestions = data.customerSuggestions?.trim() || 'None';
                    const sLines = doc.splitTextToSize(suggestions, 170);
                    doc.text(sLines, 14, y); y += sLines.length * 6 + 8;

                    doc.setFont(undefined, 'bold'); doc.setFontSize(11);
                    doc.text('Deductions', 14, y); y += 7;
                    doc.setFont(undefined, 'normal'); doc.setFontSize(10);
                    if (data.deductions?.trim()) {
                        data.deductions.split('\n').filter(Boolean).forEach(l => {
                            doc.text(l, 14, y); y += 6;
                        });
                    } else { doc.text('None', 14, y); y += 6; }
                    y += 4;

                    doc.setDrawColor(200,200,200); doc.line(14, y, 196, y); y += 6;
                    doc.setFont(undefined, 'bold'); doc.setFontSize(11);
                    doc.text(`Total Deduction: ZMW ${data.totalDeduction || '0'}`, 14, y); y += 8;
                    doc.text(`Total Sales:     ZMW ${data.totalSales || '0'}`, 14, y);

                    doc.save(`Report_${data.date}.pdf`);
                });
            });
        };
    </script>
</head>
<body>

<!-- ── TOPBAR ── -->
<div class="topbar">
    <div class="topbar-left">
        <div class="logo-mark"><i class="fas fa-store-alt"></i></div>
        <div class="logo-text">Tri<span>smart</span></div>
    </div>
    <div class="page-title"><i class="fas fa-file-alt" style="margin-right:5px;color:var(--blue);"></i>Daily Report</div>
</div>

<div class="container">

    <!-- Filter -->
    <div class="filter-card">
        <i class="fas fa-filter" style="color:var(--blue);font-size:0.85rem;"></i>
        <label for="filterMonth">Month</label>
        <select id="filterMonth"></select>
        <label for="filterYear">Year</label>
        <select id="filterYear"></select>
    </div>

    <!-- Toggle -->
    <button type="button" id="toggleFormBtn" class="toggle-btn">
        <i class="fas fa-plus"></i> Add New Report
    </button>

    <!-- Form -->
    <form id="reportForm" class="form-card" autocomplete="off">

        <div class="section-label"><i class="fas fa-calendar-day"></i> Date & Time</div>
        <div class="field-row">
            <div class="form-group">
                <label for="reportDate">Date</label>
                <input type="date" id="reportDate" required>
            </div>
            <div class="form-group">
                <label for="timeIn">Time In</label>
                <input type="time" id="timeIn">
            </div>
        </div>
        <div class="form-group">
            <label for="timeOut">Time Out</label>
            <input type="time" id="timeOut">
        </div>

        <div class="section-label"><i class="fas fa-comment-dots"></i> Customer Complaints</div>
        <div class="form-group">
            <label for="customerComplaints">Describe any complaints received today</label>
            <textarea id="customerComplaints" placeholder="e.g. Customer complained about long waiting time…"></textarea>
        </div>

        <div class="section-label"><i class="fas fa-lightbulb"></i> Customer Suggestions</div>
        <div class="form-group">
            <label for="customerSuggestions">Describe any suggestions received today</label>
            <textarea id="customerSuggestions" placeholder="e.g. Customer suggested we stock more varieties of…"></textarea>
        </div>

        <div class="section-label"><i class="fas fa-minus-circle"></i> Deductions</div>
        <div class="form-group">
            <label for="deductions">Details (one per line, e.g. Mercy k15)</label>
            <textarea id="deductions" placeholder="Mercy k15&#10;Transport k20"></textarea>
        </div>
        <div class="form-group">
            <label for="totalDeduction">Total Deduction (ZMW)</label>
            <input type="number" id="totalDeduction" placeholder="0.00" min="0" step="0.01">
        </div>

        <div class="section-label"><i class="fas fa-chart-bar"></i> Sales Summary</div>
        <div class="form-group">
            <label for="totalSales">Total Sales (ZMW)</label>
            <input type="number" id="totalSales" placeholder="0.00" min="0" step="0.01" required>
        </div>

        <div class="btn-row">
            <button type="submit" class="save-btn"><i class="fas fa-save"></i> Save Report</button>
            <button type="button" class="clear-btn" id="clearBtn"><i class="fas fa-times"></i> Clear</button>
        </div>
    </form>

    <!-- Reports List -->
    <div class="reports-card">
        <div class="reports-hdr">
            <h3><i class="fas fa-folder-open"></i> Saved Reports</h3>
            <div class="report-count" id="reportCount">0</div>
        </div>
        <div id="reportListWrap">
            <div class="empty-state"><i class="fas fa-spinner fa-spin"></i>Loading…</div>
        </div>
        <button type="button" id="downloadBtn" class="download-btn">
            <i class="fas fa-download"></i> Download Checked as PDF
        </button>
    </div>

</div>
</body>
</html>

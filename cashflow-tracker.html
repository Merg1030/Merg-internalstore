<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Trismart · Cash Flow</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<style>
/* ── SAME DESIGN SYSTEM AS WAREHOUSE ── */
:root {
  --primary:   #4361ee;
  --accent:    #4cc9f0;
  --danger:    #f72585;
  --warning:   #f8961e;
  --success:   #2ecc71;
  --bg:        #f4f6fb;
  --surface:   #ffffff;
  --bg-lighter:#f1f3f5;
  --border:    #dee2e6;
  --text:      #212529;
  --text-fade: #6c757d;
  --radius:    10px;
  --radius-lg: 16px;
  --shadow:    0 2px 12px rgba(67,97,238,0.08);
  --shadow-lg: 0 8px 32px rgba(67,97,238,0.13);
}

*{margin:0;padding:0;box-sizing:border-box;
  font-family:'Segoe UI','Poppins',Tahoma,Geneva,Verdana,sans-serif;
  -webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);}
body{min-height:100vh;display:flex;flex-direction:column;}

/* scrollbar */
*{scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
*::-webkit-scrollbar{width:5px;height:5px;}
*::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}

/* ── TOPBAR ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 18px;min-height:60px;
  background:var(--surface);border-bottom:1px solid var(--border);
  box-shadow:var(--shadow);position:sticky;top:0;z-index:100;
  flex-wrap:wrap;gap:10px;
}
.topbar-l{display:flex;align-items:center;gap:12px;}
.topbar-r{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}

.back-btn{
  width:34px;height:34px;border-radius:var(--radius);
  border:1px solid var(--border);background:var(--bg-lighter);
  color:var(--text-fade);display:flex;align-items:center;justify-content:center;
  cursor:pointer;text-decoration:none;font-size:.82rem;transition:all .15s;
}
.back-btn:hover{background:var(--primary);color:white;border-color:var(--primary);}

.page-title{font-size:1rem;font-weight:700;color:var(--primary);}

/* month picker */
.month-pick{
  display:flex;align-items:center;gap:7px;
  background:var(--bg-lighter);border:1px solid var(--border);
  border-radius:var(--radius);padding:7px 12px;font-size:.82rem;color:var(--text-fade);
}
.month-pick input[type=month]{
  background:transparent;border:none;font-family:inherit;
  font-size:.82rem;font-weight:600;color:var(--text);outline:none;cursor:pointer;
}
.month-pick input[type=month]::-webkit-calendar-picker-indicator{cursor:pointer;opacity:.6;}

/* filter bar */
.filter-bar{
  display:flex;align-items:center;gap:12px;
  background:var(--surface);padding:12px 18px;
  border-bottom:1px solid var(--border);flex-wrap:wrap;
}
.filter-group{
  display:flex;align-items:center;gap:8px;
  background:var(--bg-lighter);padding:5px 12px;
  border-radius:var(--radius);border:1px solid var(--border);
}
.filter-group label{
  font-size:.7rem;font-weight:700;color:var(--text-fade);
  text-transform:uppercase;letter-spacing:.05em;
}
.filter-group select{
  background:transparent;border:none;padding:6px 0;
  font-size:.82rem;font-weight:500;color:var(--text);
  outline:none;cursor:pointer;
}
.filter-group input{
  background:transparent;border:none;padding:6px 0;
  font-size:.82rem;font-weight:500;color:var(--text);
  outline:none;width:120px;
}
.filter-group input::placeholder{color:var(--text-fade);}
.clear-filter{
  background:var(--bg-lighter);border:1px solid var(--border);
  border-radius:var(--radius);padding:6px 12px;
  font-size:.75rem;font-weight:600;color:var(--text-fade);
  cursor:pointer;transition:all .15s;
}
.clear-filter:hover{background:var(--danger);color:white;border-color:var(--danger);}

/* buttons */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 14px;border-radius:var(--radius);
  font-family:inherit;font-size:.8rem;font-weight:600;
  cursor:pointer;border:none;transition:all .15s;white-space:nowrap;
  box-shadow:0 1px 4px rgba(0,0,0,.07);
}
.btn svg,.btn i{font-size:.8rem;}
.btn-primary{background:linear-gradient(135deg,var(--primary),#3a56d4);color:white;}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(67,97,238,.3);}
.btn-ghost{background:var(--bg-lighter);color:var(--text-fade);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--primary);color:var(--primary);}
.btn-warn{background:var(--bg-lighter);border:1px solid var(--warning);color:var(--warning);}
.btn-warn:hover{background:rgba(248,150,30,.08);}
.btn-danger{background:linear-gradient(135deg,var(--danger),#c82333);color:white;}

/* ── ACCOUNT TABS ── */
.acc-bar{
  display:flex;align-items:center;
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 18px;overflow-x:auto;flex-shrink:0;
}
.acc-tab{
  display:flex;align-items:center;gap:8px;
  padding:13px 18px;font-size:.8rem;font-weight:600;
  color:var(--text-fade);cursor:pointer;
  border-bottom:2.5px solid transparent;
  transition:all .15s;white-space:nowrap;user-select:none;
}
.acc-tab:hover{color:var(--text);}
.acc-tab.active{color:var(--primary);border-bottom-color:var(--primary);}
.acc-dot{width:7px;height:7px;border-radius:50%;background:var(--border);}
.acc-tab.active .acc-dot{background:var(--primary);box-shadow:0 0 6px rgba(67,97,238,.4);}

/* ── MAIN ── */
.main{flex:1;padding:16px 18px;display:flex;flex-direction:column;gap:12px;}

/* ── TABLE ── */
.table-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);box-shadow:var(--shadow);
  overflow:hidden;flex:1;display:flex;flex-direction:column;
}
.table-scroll{overflow:auto;flex:1;}
table{width:100%;border-collapse:collapse;font-size:.84rem;min-width:580px;}
thead th{
  background:var(--bg-lighter);color:var(--text-fade);
  font-size:.64rem;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;padding:11px 14px;text-align:left;
  border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;
  white-space:nowrap;
}
th.num,td.num{text-align:right;}
th:last-child,td:last-child{text-align:center;width:50px;}
td{padding:11px 14px;border-bottom:1px solid #f0f2f8;color:var(--text);vertical-align:middle;}
tbody tr:last-child td{border-bottom:none;}
tbody tr{transition:background .1s;}
tbody tr:hover td{background:#f8f9ff;}
.empty-row td{text-align:center;padding:52px 20px;color:var(--text-fade);font-size:.88rem;}
.opening-row td{background:#fafbff;color:var(--text-fade);font-style:italic;border-top:1px solid var(--border);}

/* value colours */
.debit-val {color:var(--danger) ;font-weight:700;}
.credit-val{color:var(--success);font-weight:700;}
.bal-val   {color:var(--text)   ;font-weight:700;}
.bal-val.neg{color:var(--danger);}
.blank-cell{color:transparent;user-select:none;}
.transfer-label{
  font-size:.63rem;font-weight:700;color:var(--warning);
  background:rgba(248,150,30,.1);padding:2px 7px;
  border-radius:4px;border:1px solid rgba(248,150,30,.25);
  margin-left:5px;
}
tbody tr.transfer-row td{color:var(--warning);}
tbody tr.transfer-row td:first-child,
tbody tr.transfer-row td:nth-child(2),
tbody tr.transfer-row td:nth-child(3){color:var(--text-fade);}

/* ── THREE DOTS MENU ── */
.menu-container{position:relative;display:inline-block;}
.action-btn{
  background:none;border:none;color:var(--text-fade);
  cursor:pointer;padding:6px;border-radius:6px;
  transition:all .15s;font-size:.9rem;
}
.action-btn:hover{background:var(--bg-lighter);color:var(--text);}
.dropdown-menu{
  position:absolute;right:0;top:100%;z-index:1000;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:5px;min-width:120px;
  box-shadow:var(--shadow-lg);display:none;
}
.dropdown-menu.show{display:block;}
.menu-item{
  display:flex;align-items:center;gap:8px;padding:9px 12px;
  color:var(--text);font-size:.82rem;border-radius:7px;
  transition:all .15s;cursor:pointer;border:none;
  background:transparent;width:100%;text-align:left;
}
.menu-item:hover{background:var(--bg-lighter);}
.menu-item.delete:hover{color:var(--danger);}
.menu-item i{width:14px;font-size:.8rem;}

/* ── MODALS ── */
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.45);backdrop-filter:blur(4px);
  z-index:900;align-items:center;justify-content:center;
}
.overlay.open{display:flex;}
.modal{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:26px;
  width:90%;max-width:460px;box-shadow:var(--shadow-lg);
  animation:mIn .2s ease;max-height:92vh;overflow-y:auto;
}
@keyframes mIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.modal-head h2{font-size:1rem;font-weight:700;color:var(--text);}
.close-btn{
  width:28px;height:28px;border-radius:7px;
  border:1px solid var(--border);background:var(--bg-lighter);
  color:var(--text-fade);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:.8rem;transition:all .15s;
}
.close-btn:hover{background:var(--danger);color:white;border-color:var(--danger);}

/* form fields */
.field{margin-bottom:13px;}
.field label{
  display:block;font-size:.64rem;font-weight:700;
  letter-spacing:.09em;text-transform:uppercase;
  color:var(--text-fade);margin-bottom:5px;
}
.field input,.field select{
  width:100%;padding:9px 12px;
  background:var(--bg-lighter);border:1.5px solid var(--border);
  border-radius:var(--radius);color:var(--text);
  font-family:inherit;font-size:.88rem;outline:none;
  transition:border-color .15s;
}
.field input::placeholder{color:var(--text-fade);}
.field input:focus,.field select:focus{border-color:var(--primary);background:white;}
.field select option{background:var(--surface);}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.field-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}

.form-error{color:var(--danger);font-size:.78rem;margin-bottom:10px;min-height:14px;}

.save-btn{
  width:100%;padding:12px;
  background:linear-gradient(135deg,var(--primary),#3a56d4);
  color:white;border:none;border-radius:var(--radius);
  font-family:inherit;font-size:.9rem;font-weight:700;
  cursor:pointer;transition:all .15s;
  display:flex;align-items:center;justify-content:center;gap:7px;
  margin-top:4px;
}
.save-btn:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(67,97,238,.3);}
.save-btn.amber{background:linear-gradient(135deg,var(--warning),#e07b0a);color:white;}
.save-btn.amber:hover{box-shadow:0 4px 14px rgba(248,150,30,.3);}
.save-btn.red{background:linear-gradient(135deg,var(--danger),#c82333);}
.save-btn:disabled{opacity:.55;cursor:not-allowed;transform:none;}

/* ── TOAST ── */
.toast-wrap{position:fixed;bottom:20px;right:16px;z-index:9999;
  display:flex;flex-direction:column;gap:6px;pointer-events:none;
  max-width:calc(100vw - 32px);}
.toast{
  background:var(--surface);border:1px solid var(--border);
  color:var(--text);border-radius:var(--radius);
  padding:10px 15px;font-size:.82rem;font-weight:600;
  display:flex;align-items:center;gap:8px;
  box-shadow:var(--shadow-lg);animation:tIn .2s ease;
}
.toast.success{border-left:4px solid var(--success);}
.toast.success i{color:var(--success);}
.toast.error  {border-left:4px solid var(--danger);}
.toast.error i{color:var(--danger);}
.toast.info   {border-left:4px solid var(--warning);}
.toast.info i {color:var(--warning);}
.toast.fade-out{animation:tOut .25s ease forwards;}
@keyframes tIn {from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}
@keyframes tOut{from{opacity:1}to{opacity:0;transform:translateX(10px)}}

@media(max-width:640px){
  .topbar{padding:0 12px;}
  .main{padding:12px;}
  .acc-bar{padding:0 12px;}
  .field-row{grid-template-columns:1fr;}
  .field-row-3{grid-template-columns:1fr;}
  .filter-bar{flex-direction:column;align-items:stretch;}
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-l">
    <a href="cashbook.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
    <span class="page-title">Cash Flow</span>
  </div>
  <div class="topbar-r">
    <div class="month-pick">
      <i class="fas fa-calendar-alt" style="font-size:.72rem"></i>
      <input type="month" id="monthPicker">
    </div>
    <button class="btn btn-ghost" id="pdfBtn"><i class="fas fa-file-pdf"></i> PDF</button>
    <button class="btn btn-warn" onclick="openTransferModal()"><i class="fas fa-arrow-right-arrow-left"></i> Transfer</button>
    <button class="btn btn-primary" onclick="openTxnModal('add')"><i class="fas fa-plus"></i> Add</button>
  </div>
</div>

<!-- FILTER BAR -->
<div class="filter-bar">
  <div class="filter-group">
    <label><i class="fas fa-tag"></i> Reference:</label>
    <select id="filterReference">
      <option value="">All References</option>
      <option value="TS-1">TS-1</option>
      <option value="TS-2">TS-2</option>
      <option value="TS-3">TS-3</option>
      <option value="TS-4">TS-4</option>
      <option value="TS-5">TS-5</option>
      <option value="Other">Other</option>
    </select>
  </div>
  <div class="filter-group">
    <label><i class="fas fa-search"></i> Search:</label>
    <input type="text" id="filterSearch" placeholder="Description or Ref...">
  </div>
  <div class="filter-group">
    <label><i class="fas fa-exchange-alt"></i> Type:</label>
    <select id="filterType">
      <option value="">All</option>
      <option value="credit">Credit (In)</option>
      <option value="debit">Debit (Out)</option>
    </select>
  </div>
  <button class="clear-filter" onclick="clearFilters()"><i class="fas fa-times"></i> Clear Filters</button>
</div>

<!-- ACCOUNT TABS -->
<div class="acc-bar" id="accBar">
  <div class="acc-tab active" data-acc="Expenses A/c"        onclick="switchAcc(this)"><span class="acc-dot"></span> Expenses A/c</div>
  <div class="acc-tab"        data-acc="Business savings A/c" onclick="switchAcc(this)"><span class="acc-dot"></span> Business Savings A/c</div>
  <div class="acc-tab"        data-acc="Inventory A/c"        onclick="switchAcc(this)"><span class="acc-dot"></span> Inventory A/c</div>
  <div class="acc-tab"        data-acc="Personal A/c"         onclick="switchAcc(this)"><span class="acc-dot"></span> Personal A/c</div>
  <div class="acc-tab"        data-acc="Loan A/c"             onclick="switchAcc(this)"><span class="acc-dot"></span> Loan A/c</div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="table-card">
    <div class="table-scroll">
      <table>
        <thead>
           <tr>
            <th>Date</th>
            <th>Description</th>
            <th>Reference</th>
            <th class="num">Debit</th>
            <th class="num">Credit</th>
            <th class="num">Balance</th>
            <th></th>
           </tr>
        </thead>
        <tbody id="cfTbody">
          <tr class="empty-row"><td colspan="7"><i class="fas fa-spinner fa-spin"></i> Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<!-- ── ADD/EDIT MODAL ── -->
<div class="overlay" id="txnOverlay" onclick="bgClick(event,'txnOverlay')">
  <div class="modal">
    <div class="modal-head">
      <h2 id="txnModalTitle">Add Transaction</h2>
      <button class="close-btn" onclick="closeTxnModal()"><i class="fas fa-times"></i></button>
    </div>
    <div class="form-error" id="txnErr"></div>
    <form onsubmit="saveTxn(event)" autocomplete="off">
      <input type="hidden" id="txnId">
      <div class="field-row-3">
        <div class="field">
          <label>Date</label>
          <input type="date" id="tDate" required>
        </div>
        <div class="field">
          <label>Type</label>
          <select id="tType" required>
            <option value="">— Select —</option>
            <option value="credit">Credit (In)</option>
            <option value="debit">Debit (Out)</option>
          </select>
        </div>
        <div class="field">
          <label>Reference Prefix</label>
          <select id="tRefPrefix">
            <option value="">— Select Prefix —</option>
            <option value="TS-1">TS-1</option>
            <option value="TS-2">TS-2</option>
            <option value="TS-3">TS-3</option>
            <option value="TS-4">TS-4</option>
            <option value="TS-5">TS-5</option>
            <option value="Other">Other (Custom)</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Account</label>
        <select id="tAccount" required>
          <option value="">— Select Account —</option>
          <option value="Expenses A/c">Expenses A/c</option>
          <option value="Business savings A/c">Business Savings A/c</option>
          <option value="Inventory A/c">Inventory A/c</option>
          <option value="Personal A/c">Personal A/c</option>
          <option value="Loan A/c">Loan A/c</option>
        </select>
      </div>
      <div class="field">
        <label>Description</label>
        <input type="text" id="tDesc" placeholder="e.g. Cash sale" required>
      </div>
      <div class="field">
        <label>Reference Number</label>
        <input type="text" id="tRefNum" placeholder="e.g. 001, 002 or custom reference">
      </div>
      <div class="field">
        <label>Amount (ZMW)</label>
        <input type="number" id="tAmount" min="0.01" step="0.01" placeholder="0.00" required>
      </div>
      <button type="submit" class="save-btn" id="txnBtn">
        <i class="fas fa-check"></i> Save Transaction
      </button>
    </form>
  </div>
</div>

<!-- ── TRANSFER MODAL ── -->
<div class="overlay" id="trOverlay" onclick="bgClick(event,'trOverlay')">
  <div class="modal">
    <div class="modal-head">
      <h2><i class="fas fa-arrow-right-arrow-left" style="color:var(--warning);margin-right:8px"></i>Transfer Funds</h2>
      <button class="close-btn" onclick="closeTransferModal()"><i class="fas fa-times"></i></button>
    </div>
    <div class="form-error" id="trErr"></div>
    <form onsubmit="saveTransfer(event)" autocomplete="off">
      <div class="field">
        <label>Date</label>
        <input type="date" id="trDate" required>
      </div>
      <div class="field-row">
        <div class="field">
          <label>From Account</label>
          <select id="trFrom" required>
            <option value="">— From —</option>
            <option value="Expenses A/c">Expenses A/c</option>
            <option value="Business savings A/c">Business Savings A/c</option>
            <option value="Inventory A/c">Inventory A/c</option>
            <option value="Personal A/c">Personal A/c</option>
            <option value="Loan A/c">Loan A/c</option>
          </select>
        </div>
        <div class="field">
          <label>To Account</label>
          <select id="trTo" required>
            <option value="">— To —</option>
            <option value="Expenses A/c">Expenses A/c</option>
            <option value="Business savings A/c">Business Savings A/c</option>
            <option value="Inventory A/c">Inventory A/c</option>
            <option value="Personal A/c">Personal A/c</option>
            <option value="Loan A/c">Loan A/c</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Description</label>
        <input type="text" id="trDesc" placeholder="e.g. Cash to bank">
      </div>
      <div class="field">
        <label>Reference</label>
        <input type="text" id="trRef" placeholder="e.g. TRF-001">
      </div>
      <div class="field">
        <label>Amount (ZMW)</label>
        <input type="number" id="trAmount" min="0.01" step="0.01" placeholder="0.00" required>
      </div>
      <button type="submit" class="save-btn amber" id="trBtn">
        <i class="fas fa-arrow-right-arrow-left"></i> Confirm Transfer
      </button>
    </form>
  </div>
</div>

<!-- ── DELETE MODAL ── -->
<div class="overlay" id="deleteOverlay" onclick="if(event.target===this)closeDeleteModal()">
  <div class="modal" style="max-width:360px;">
    <div class="modal-head">
      <h2>Delete Transaction</h2>
      <button class="close-btn" onclick="closeDeleteModal()"><i class="fas fa-times"></i></button>
    </div>
    <p style="margin:16px 0;color:var(--text-fade);font-size:.86rem;line-height:1.6;">
      Are you sure you want to delete this transaction? This cannot be undone.
    </p>
    <input type="hidden" id="deleteId">
    <button class="save-btn red" onclick="confirmDelete()">
      <i class="fas fa-trash"></i> Delete Permanently
    </button>
  </div>
</div>

<script>
// ── FIREBASE ──

// ── ACCOUNTS LIST ──
const ACCOUNTS=[
  'Expenses A/c',
  'Business savings A/c',
  'Inventory A/c',
  'Personal A/c',
  'Loan A/c'
];

// ── STATE ──

// ── HELPERS ──
function toast(msg,type='success'){
  const w=document.getElementById('toastWrap'),el=document.createElement('div');
  el.className=`toast ${type}`;
  const icons={success:'check-circle',error:'times-circle',info:'info-circle'};
  el.innerHTML=`<i class="fas fa-${icons[type]||'info-circle'}"></i>${msg}`;
  w.appendChild(el);
  setTimeout(()=>{el.classList.add('fade-out');setTimeout(()=>el.remove(),280);},3500);
}

function fmtN(n){return Math.abs(n).toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtK(n){return'ZMW '+fmtN(n);}

// Generate reference from prefix and number
function generateReference(prefix, num){
  if(!prefix) return num || '—';
  if(prefix === 'Other') return num || 'CUSTOM';
  if(!num) return prefix;
  return `${prefix}-${num.padStart(3,'0')}`;
}

document.addEventListener('click',()=>{
  document.querySelectorAll('.dropdown-menu.show').forEach(m=>m.classList.remove('show'));
});

// ── SWITCH ACCOUNT ──
window.switchAcc=function(el){
  document.querySelectorAll('.acc-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  selAcc=el.dataset.acc;
  applyFilters();
};

// ── FILTER FUNCTIONS ──
function applyFilters(){
  const month=monthPicker.value;
  if(!month) return;
  
  let filtered = allTransactions.filter(t =>
    t.account === selAcc && t.date && t.date.substring(0,7) === month
  );
  
  // Filter by reference prefix
  const refFilter = filterReference.value;
  if(refFilter){
    if(refFilter === 'Other'){
      filtered = filtered.filter(t => {
        const ref = t.reference || '';
        return ref && !ref.startsWith('TS-');
      });
    } else {
      filtered = filtered.filter(t => (t.reference || '').startsWith(refFilter));
    }
  }
  
  // Filter by search term
  const searchTerm = filterSearch.value.toLowerCase().trim();
  if(searchTerm){
    filtered = filtered.filter(t => 
      (t.description || '').toLowerCase().includes(searchTerm) || 
      (t.reference || '').toLowerCase().includes(searchTerm)
    );
  }
  
  // Filter by type
  const typeFilter = filterType.value;
  if(typeFilter){
    filtered = filtered.filter(t => t.type === typeFilter);
  }
  
  // Sort by date
  filtered.sort((a,b)=>{
    if((a.date||'')===(b.date||'')) return (a.createdAt||0)-(b.createdAt||0);
    return (a.date||'')<(b.date||'')?-1:1;
  });
  
  filteredTransactions = filtered;
  renderTableWithFilters();
}

function clearFilters(){
  filterReference.value = '';
  filterSearch.value = '';
  filterType.value = '';
  applyFilters();
  toast('Filters cleared!', 'info');
}

// Add event listeners for filters
filterReference.addEventListener('change', applyFilters);
filterSearch.addEventListener('input', applyFilters);
filterType.addEventListener('change', applyFilters);

// ── MODAL HELPERS ──
window.bgClick=function(e,id){if(e.target.id===id)document.getElementById(id).classList.remove('open');};

window.openTxnModal=function(mode,id=null){
  const ov=document.getElementById('txnOverlay');
  document.getElementById('txnModalTitle').textContent=mode==='add'?'Add Transaction':'Edit Transaction';
  document.getElementById('txnErr').textContent='';

  if(mode==='add'){
    document.getElementById('txnId').value='';
    document.getElementById('tDate').value=new Date().toISOString().substring(0,10);
    document.getElementById('tType').value='';
    document.getElementById('tAccount').value=selAcc;
    document.getElementById('tDesc').value='';
    document.getElementById('tRefPrefix').value='';
    document.getElementById('tRefNum').value='';
    document.getElementById('tAmount').value='';
  }else if(id){
    const t=allTransactions.find(x=>x.id===id);
    if(t){
      document.getElementById('txnId').value=t.id;
      document.getElementById('tDate').value=t.date||'';
      document.getElementById('tType').value=t.type||'';
      document.getElementById('tAccount').value=t.account||selAcc;
      document.getElementById('tDesc').value=t.description||'';
      
      // Parse reference to prefix and number
      const ref = t.reference || '';
      let prefix = '', num = '';
      if(ref.startsWith('TS-')) {
        const parts = ref.split('-');
        prefix = parts[0] + '-' + parts[1];
        num = parts[2] || '';
      } else if(ref !== '—' && ref !== 'CUSTOM') {
        prefix = 'Other';
        num = ref;
      }
      document.getElementById('tRefPrefix').value = prefix;
      document.getElementById('tRefNum').value = num;
      document.getElementById('tAmount').value=t.amount||'';
    }
  }
  ov.classList.add('open');
};

window.closeTxnModal=function(){document.getElementById('txnOverlay').classList.remove('open');};

window.confirmDelete=async function(){
  const id=document.getElementById('deleteId').value;if(!id)return;
  try{
    await db.collection('Cashflow transactions').doc(id).delete();
    toast('Transaction deleted.','success');closeDeleteModal();
  }catch(e){toast('Error: '+e.message,'error');}
};

window.toggleMenu=function(event,id){
  event.stopPropagation();
  const menu=event.currentTarget.nextElementSibling;
  document.querySelectorAll('.dropdown-menu.show').forEach(m=>{if(m!==menu)m.classList.remove('show');});
  menu.classList.toggle('show');
};

// ── SAVE TRANSACTION ──
window.saveTxn=async function(e){
  e.preventDefault();
  const errEl=document.getElementById('txnErr'),btn=document.getElementById('txnBtn');
  const id=document.getElementById('txnId').value;
  errEl.textContent='';

  const date=document.getElementById('tDate').value;
  const type=document.getElementById('tType').value;
  const account=document.getElementById('tAccount').value;
  const desc=document.getElementById('tDesc').value.trim();
  const refPrefix=document.getElementById('tRefPrefix').value;
  const refNum=document.getElementById('tRefNum').value.trim();
  const amount=parseFloat(document.getElementById('tAmount').value);
  
  // Generate reference
  const reference = generateReference(refPrefix, refNum);

  if(!date){errEl.textContent='Select a date.';return;}
  if(!type){errEl.textContent='Select a type.';return;}
  if(!account){errEl.textContent='Select an account.';return;}
  if(!desc){errEl.textContent='Enter a description.';return;}
  if(isNaN(amount)||amount<=0){errEl.textContent='Enter a valid amount.';return;}

  btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Saving…';
  try{
    const data={date,type,account,description:desc,reference,amount,
                updatedAt:firebase.firestore.FieldValue.serverTimestamp()};
    if(id){
      await db.collection('Cashflow transactions').doc(id).update(data);
      toast('Transaction updated!','success');
    }else{
      data.createdAt=firebase.firestore.FieldValue.serverTimestamp();
      await db.collection('Cashflow transactions').add(data);
      toast('Transaction saved!','success');
    }
    closeTxnModal();
  }catch(e){toast('Error: '+e.message,'error');errEl.textContent=e.message;}
  finally{btn.disabled=false;btn.innerHTML='<i class="fas fa-check"></i> Save Transaction';}
};

// ── SAVE TRANSFER ──
window.saveTransfer=async function(e){
  e.preventDefault();
  const errEl=document.getElementById('trErr'),btn=document.getElementById('trBtn');
  errEl.textContent='';

  const date=document.getElementById('trDate').value;
  const from=document.getElementById('trFrom').value;
  const to=document.getElementById('trTo').value;
  const desc=document.getElementById('trDesc').value.trim()||'Transfer';
  const ref=document.getElementById('trRef').value.trim()||'—';
  const amount=parseFloat(document.getElementById('trAmount').value);

  if(!date){errEl.textContent='Select a date.';return;}
  if(!from){errEl.textContent='Select source account.';return;}
  if(!to){errEl.textContent='Select destination account.';return;}
  if(from===to){errEl.textContent='Accounts must be different.';return;}
  if(isNaN(amount)||amount<=0){errEl.textContent='Enter a valid amount.';return;}

  btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Processing…';
  try{
    const ts=firebase.firestore.FieldValue.serverTimestamp();
    const grp=Date.now().toString(36);
    await db.collection('Cashflow transactions').add({
      date,type:'debit',account:from,
      description:desc+' → '+to,reference:ref,amount,
      transferGroup:grp,isTransfer:true,createdAt:ts
    });
    await db.collection('Cashflow transactions').add({
      date,type:'credit',account:to,
      description:desc+' ← '+from,reference:ref,amount,
      transferGroup:grp,isTransfer:true,createdAt:ts
    });
    closeTransferModal();
    toast(`ZMW ${fmtN(amount)} transferred from ${from} to ${to}`,'info');
  }catch(e){toast('Error: '+e.message,'error');errEl.textContent=e.message;}
  finally{btn.disabled=false;btn.innerHTML='<i class="fas fa-arrow-right-arrow-left"></i> Confirm Transfer';}
};

// ── OPENING BALANCE ──
function getOpeningBalance(account,yearMonth){
  const[year,month]=yearMonth.split('-').map(Number);
  const firstDay=new Date(year,month-1,1).toISOString().substring(0,10);
  let bal=0;
  allTransactions
    .filter(t=>t.account===account&&t.date&&t.date<firstDay)
    .forEach(t=>{if(t.type==='credit')bal+=(t.amount||0);else bal-=(t.amount||0);});
  return bal;
}

// ── RENDER TABLE WITH FILTERS ──
function renderTableWithFilters(){
  const tbody=document.getElementById('cfTbody');
  const month=monthPicker.value;
  if(!month)return;

  const openBal=getOpeningBalance(selAcc,month);
  let runBal=openBal;

  if(!filteredTransactions.length && openBal===0){
    tbody.innerHTML='<tr class="empty-row"><td colspan="7">No transactions match your filters.  </tr>';
    return;
  }

  const html=[];

  // Opening row
  html.push(`<tr class="opening-row">
     <td>${month}-01</td>
     <td>Opening Balance (brought forward)</td>
     <td>—</td>
    <td class="num"><span class="blank-cell">·</span></td>
    <td class="num"><span class="blank-cell">·</span></td>
    <td class="num bal-val${openBal<0?' neg':''}">${fmtK(openBal)}</td>
    <td></td>
   </tr>`);

  filteredTransactions.forEach(t=>{
    const isCredit=t.type==='credit';
    if(isCredit){
      runBal+=(t.amount||0);
    } else {
      runBal-=(t.amount||0);
    }

    const dCell=!isCredit
      ?`<td class="num debit-val">${fmtK(t.amount||0)}</td>`
      :`<td class="num"><span class="blank-cell">·</span></td>`;
    const cCell=isCredit
      ?`<td class="num credit-val">${fmtK(t.amount||0)}</td>`
      :`<td class="num"><span class="blank-cell">·</span></td>`;

    const trLabel=t.isTransfer?'<span class="transfer-label">TRANSFER</span>':'';
    const rowCls=t.isTransfer?'transfer-row':'';
    const balCls=runBal<0?'bal-val neg':'bal-val';

    html.push(`<tr class="${rowCls}">
      <td>${t.date||'—'}</td>
      <td>${t.description||'—'}${trLabel}</td>
      <td style="color:var(--text-fade)">${t.reference||'—'}</td>
      ${dCell}${cCell}
      <td class="num ${balCls}">${fmtK(runBal)}</td>
      <td style="text-align:center">
        <div class="menu-container" onclick="event.stopPropagation()">
          <button class="action-btn" onclick="toggleMenu(event,'${t.id}')">
            <i class="fas fa-ellipsis-v"></i>
          </button>
          <div class="dropdown-menu">
            <button class="menu-item" onclick="openTxnModal('edit','${t.id}');event.stopPropagation()">
              <i class="fas fa-edit"></i> Edit
            </button>
            <button class="menu-item delete" onclick="openDeleteModal('${t.id}');event.stopPropagation()">
              <i class="fas fa-trash"></i> Delete
            </button>
          </div>
        </div>
      </td>
    </tr>`);
  });

  tbody.innerHTML=html.join('');
}

// ── FIREBASE LISTENER ──
function setupListener(){
  document.getElementById('cfTbody').innerHTML=
    '<tr class="empty-row"><td colspan="7"><i class="fas fa-spinner fa-spin"></i> Loading…</td></tr>';
  if(unsubscribeListener)unsubscribeListener();

  unsubscribeListener=db.collection('Cashflow transactions').onSnapshot(snap=>{
    allTransactions=[];
    snap.forEach(doc=>{
      const d=doc.data();
      allTransactions.push({
        id:doc.id,...d,
        createdAt:d.createdAt?.seconds?d.createdAt.seconds*1000:Date.now()
      });
    });
    applyFilters();
  },err=>{
    document.getElementById('cfTbody').innerHTML=
      `<tr class="empty-row"><td colspan="7"><i class="fas fa-exclamation-triangle" style="color:var(--danger)"></i> ${err.message}</td></tr>`;
    toast('Sync error: '+err.message,'error');
  });
}

monthPicker.addEventListener('change',()=>{
  localStorage.setItem('cf_month',monthPicker.value);
  applyFilters();
});

// ── PDF EXPORT ──
document.getElementById('pdfBtn').addEventListener('click',()=>{
  try{
    const{jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'landscape',unit:'pt',format:'a4'});
    const PW=doc.internal.pageSize.getWidth();
    const PH=doc.internal.pageSize.getHeight();
    const ML=30,MR=30,MT=30,MB=30;
    const CW=PW-ML-MR;

    doc.setFillColor(67,97,238);
    doc.rect(0,0,PW,54,'F');
    doc.setTextColor(255,255,255);
    doc.setFontSize(18);doc.setFont('helvetica','bold');
    doc.text('TRISMART STORES',ML,34);
    doc.setFontSize(10);doc.setFont('helvetica','normal');
    doc.text('Cash Flow Statement · '+selAcc,ML,48);

    const mo=monthPicker.value||'All';
    doc.setFontSize(9);
    doc.text('Month: '+mo,PW-MR,34,{align:'right'});
    doc.text('Generated: '+new Date().toLocaleDateString('en-GB'),PW-MR,46,{align:'right'});

    let y=MT+54+14;

    const cols=[
      {lbl:'Date',       w:0.10},
      {lbl:'Description',w:0.33},
      {lbl:'Reference',  w:0.14},
      {lbl:'Debit',      w:0.13,r:true},
      {lbl:'Credit',     w:0.13,r:true},
      {lbl:'Balance',    w:0.17,r:true},
    ];
    cols.forEach(c=>c.pw=c.w*CW);

    const ROW_H=18;
    const HDR_H=22;

    function drawHeader(yy){
      doc.setFillColor(67,97,238);
      doc.rect(ML,yy,CW,HDR_H,'F');
      let xx=ML;
      doc.setFontSize(7.5);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
      cols.forEach(c=>{
        const tx=c.r?xx+c.pw-5:xx+5;
        doc.text(c.lbl.toUpperCase(),tx,yy+14,{align:c.r?'right':'left'});
        xx+=c.pw;
      });
      return yy+HDR_H;
    }

    y=drawHeader(y);

    const tableRows=[];
    document.querySelectorAll('#cfTbody tr').forEach(tr=>{
      if(tr.classList.contains('empty-row'))return;
      const cells=[...tr.querySelectorAll('td')].map(td=>td.textContent.replace(/·/g,'').trim());
      tableRows.push({cells,isOpening:tr.classList.contains('opening-row'),
                      isTransfer:tr.classList.contains('transfer-row')});
    });

    let rowIdx=0;
    tableRows.forEach(row=>{
      if(y+ROW_H>PH-MB){
        doc.addPage();
        y=MT;
        y=drawHeader(y);
      }

      if(row.isOpening){
        doc.setFillColor(240,242,255);
        doc.rect(ML,y,CW,ROW_H,'F');
      }else if(rowIdx%2===0){
        doc.setFillColor(250,251,254);
        doc.rect(ML,y,CW,ROW_H,'F');
      }

      doc.setDrawColor(230,232,240);
      doc.line(ML,y+ROW_H,ML+CW,y+ROW_H);

      let xx=ML;
      doc.setFontSize(8);doc.setFont('helvetica','normal');

      row.cells.slice(0,6).forEach((cell,i)=>{
        const c=cols[i];
        let r=0,g=0,b=0;

        if(i===3&&cell&&!cell.includes('·'))    {r=247;g=37;b=133;}
        if(i===4&&cell&&!cell.includes('·'))    {r=46;g=204;b=113;}
        if(i===5)                                {r=67;g=97;b=238;}
        if(i===5&&cell.includes('-'))           {r=247;g=37;b=133;}
        if(row.isOpening)                       {r=107;g=117;b=128;}
        if(row.isTransfer&&i>2)                 {r=248;g=150;b=30;}

        doc.setTextColor(r,g,b);

        let txt=cell;
        if(i===1&&txt.length>42)txt=txt.substring(0,42)+'…';
        if(i===2&&txt.length>20)txt=txt.substring(0,20)+'…';

        const tx=c.r?xx+c.pw-5:xx+5;
        doc.text(txt,tx,y+12,{align:c.r?'right':'left'});
        xx+=c.pw;
      });

      y+=ROW_H;
      rowIdx++;
    });

    doc.setDrawColor(67,97,238);
    doc.setLineWidth(1);
    doc.line(ML,PH-MB-12,PW-MR,PH-MB-12);
    doc.setFontSize(7.5);doc.setFont('helvetica','normal');doc.setTextColor(150,150,160);
    doc.text('Trismart Stores · Cash Flow · '+selAcc,ML,PH-MB-4);
    doc.text('Page 1 of '+doc.internal.getNumberOfPages(),PW-MR,PH-MB-4,{align:'right'});

    doc.save(`Trismart_CashFlow_${selAcc.replace(/[\s/]+/g,'_')}_${monthPicker.value||'all'}.pdf`);
    toast('PDF generated!','success');
  }catch(err){
    console.error(err);
    toast('PDF error: '+err.message,'error');
  }
});

document.addEventListener('DOMContentLoaded',setupListener);
window.addEventListener('beforeunload',()=>{if(unsubscribeListener)unsubscribeListener();});
</script>

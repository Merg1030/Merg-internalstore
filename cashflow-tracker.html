<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Trismart · Categorized Ledger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #f1f5f9;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #0f172a;
      --text-muted: #475569;
      --primary: #3b82f6;
      --primary-dark: #2563eb;
      --purple: #8b5cf6;
      --danger: #ef4444;
      --emerald: #10b981;
      --amber: #f59e0b;
      --radius: 1rem;
      --shadow: 0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.03);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    .app-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* header */
    .navbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 1.75rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      box-shadow: var(--shadow);
    }
    .logo-area {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .logo-icon {
      background: linear-gradient(135deg, var(--primary), var(--purple));
      width: 36px;
      height: 36px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .logo-text {
      font-weight: 800;
      font-size: 1.2rem;
    }
    .badge-pro {
      background: #eef2ff;
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--primary);
    }

    /* filter bar */
    .filter-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.65rem 1.75rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-shrink: 0;
    }
    .filter-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-chip {
      background: #f1f5f9;
      padding: 6px 14px;
      border-radius: 32px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid transparent;
      color: var(--text-muted);
    }
    .filter-chip.active {
      background: var(--primary);
      color: white;
    }
    .action-icon {
      background: transparent;
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 32px;
      font-size: 0.7rem;
      font-weight: 500;
      cursor: pointer;
    }
    .action-icon:hover {
      background: var(--bg);
    }
    .divider-vert {
      width: 1px;
      height: 28px;
      background: var(--border);
      margin: 0 6px;
    }

    /* main scroll */
    .main-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 1.75rem;
    }
    .accounts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1.25rem;
    }
    .account-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.2rem;
      transition: all 0.2s;
      position: relative;
      box-shadow: var(--shadow);
    }
    .account-card.hidden-account {
      opacity: 0.55;
      background: #f8fafc;
      border-left: 3px solid #94a3b8;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    .account-title {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .cat-badge {
      font-size: 0.6rem;
      font-weight: 800;
      padding: 4px 10px;
      border-radius: 20px;
      text-transform: uppercase;
    }
    .cat-badge.journal { background: #e0f2fe; color: #0284c7; }
    .cat-badge.ledger { background: #dcfce7; color: #15803d; }
    .cat-badge.report { background: #fef3c7; color: #b45309; }
    .cat-badge.uncategorized { background: #f1f5f9; color: #475569; }
    .account-name {
      font-weight: 700;
      font-size: 0.95rem;
    }
    .account-detail {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin: 8px 0;
    }
    .balance {
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      margin-top: 8px;
      border-top: 1px solid var(--border);
      padding-top: 8px;
      display: flex;
      justify-content: space-between;
    }
    .menu-btn-card {
      background: none;
      border: none;
      font-size: 1rem;
      cursor: pointer;
      padding: 6px;
      border-radius: 8px;
      color: var(--text-muted);
    }
    .menu-btn-card:hover {
      background: var(--bg);
    }
    .card-dropdown {
      position: absolute;
      top: 48px;
      right: 12px;
      background: white;
      border-radius: 14px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.12);
      border: 1px solid var(--border);
      z-index: 200;
      min-width: 170px;
      overflow: hidden;
      display: none;
    }
    .card-dropdown.show {
      display: block;
    }
    .dropdown-opt {
      padding: 10px 16px;
      font-size: 0.75rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: 0.1s;
    }
    .dropdown-opt:hover {
      background: #f8fafc;
    }
    .dropdown-divider {
      height: 1px;
      background: var(--border);
      margin: 4px 0;
    }
    .toast-stack {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 1200;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast-item {
      background: #1e293b;
      color: white;
      padding: 8px 20px;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 500;
      backdrop-filter: blur(4px);
      animation: fadeUp 0.2s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px);}
      to { opacity: 1; transform: translateY(0);}
    }
    .empty-placeholder {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
    }
    @media (max-width: 640px) {
      .filter-bar { flex-direction: column; align-items: stretch; }
      .main-scroll { padding: 1rem; }
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="navbar">
    <div class="logo-area">
      <div class="logo-icon"><i class="fas fa-layer-group"></i></div>
      <div class="logo-text">Trismart · Categories</div>
      <div class="badge-pro">JOURNAL / LEDGER / REPORT</div>
    </div>
    <div><i class="fas fa-database"></i> live DB · filters persist</div>
  </div>

  <div class="filter-bar">
    <div class="filter-group">
      <span class="filter-chip active" data-filter="all"><i class="fas fa-list-ul"></i> All</span>
      <span class="filter-chip" data-filter="journal"><i class="fas fa-book"></i> Journal</span>
      <span class="filter-chip" data-filter="ledger"><i class="fas fa-receipt"></i> Ledger</span>
      <span class="filter-chip" data-filter="report"><i class="fas fa-chart-simple"></i> Report</span>
      <span class="filter-chip" data-filter="uncategorized"><i class="fas fa-tag"></i> Uncategorized</span>
      <div class="divider-vert"></div>
      <span class="filter-chip" id="toggleHiddenBtn"><i class="fas fa-eye-slash"></i> Show hidden</span>
    </div>
    <div class="filter-group">
      <span class="action-icon" id="resetCatsBtn"><i class="fas fa-undo-alt"></i> Reset categories</span>
      <span class="action-icon" id="unhideAllBtn"><i class="fas fa-eye"></i> Unhide all</span>
    </div>
  </div>

  <div class="main-scroll">
    <div class="accounts-grid" id="accountsGrid">
      <div style="text-align:center; padding:40px;"><i class="fas fa-spinner fa-pulse"></i> Loading accounts from Firebase...</div>
    </div>
  </div>
</div>

<div class="toast-stack" id="toastStack"></div>

<!-- Firebase SDK -->
<script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/11.5.0/firebase-app.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/11.5.0/firebase-firestore.js"
    }
  }
</script>

<script type="module">
  import { initializeApp } from "firebase/app";
  import { getFirestore, collection, query, orderBy, onSnapshot, doc, updateDoc, getDocs, writeBatch } from "firebase/firestore";

  // Firebase config (your existing project)
  const firebaseConfig = {
    apiKey: "AIzaSyB-lm7Y3r1F6VvY8PKvY8glLabZDbJsHM1k",
    authDomain: "trismartstores.firebaseapp.com",
    projectId: "trismartstores",
    storageBucket: "trismartstores.appspot.com",
    messagingSenderId: "416692703333",
    appId: "1:416692703333:web:d4b60292621435c748f68c"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // auth check (Chris only)
  const loggedInUser = localStorage.getItem('loggedInUser') || '';
  const userName = (loggedInUser || localStorage.getItem('userName') || '').toLowerCase().trim();
  if (userName !== 'chris') {
    document.body.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100vh;"><div style="background:white;padding:30px;border-radius:24px;">🔐 Access Denied. Accounts restricted.</div></div>`;
    throw new Error('unauthorized');
  }

  // ---------- GLOBAL STATE ----------
  let accounts = [];           // raw from firestore { id, name, type, balance, description, category?, hidden? }
  let currentFilter = "all";   // "all", "journal", "ledger", "report", "uncategorized"
  let showHiddenItems = true;   // if false, hidden accounts completely removed from UI
  
  // Helper: toast messages
  function showToast(msg, isError = false) {
    const stack = document.getElementById('toastStack');
    const toast = document.createElement('div');
    toast.className = 'toast-item';
    toast.style.background = isError ? '#b91c1c' : '#0f172a';
    toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
    stack.appendChild(toast);
    setTimeout(() => toast.remove(), 2800);
  }

  // Helper: ensure every account from DB has category & hidden fields (migration)
  function ensureMetaFields(account) {
    if (!account.hasOwnProperty('category')) account.category = 'uncategorized';
    if (!account.hasOwnProperty('hidden')) account.hidden = false;
    return account;
  }

  // Watch realtime accounts from Firestore (collection 'accounts')
  let unsubscribeAccounts = null;
  function listenAccounts() {
    if (unsubscribeAccounts) unsubscribeAccounts();
    const q = query(collection(db, 'accounts'), orderBy('name'));
    unsubscribeAccounts = onSnapshot(q, (snapshot) => {
      accounts = snapshot.docs.map(docSnap => {
        const data = docSnap.data();
        return {
          id: docSnap.id,
          name: data.name || 'Unnamed',
          type: data.type || 'asset',
          balance: typeof data.balance === 'number' ? data.balance : 0,
          description: data.description || '',
          category: data.category || 'uncategorized',
          hidden: data.hidden === true ? true : false,
          createdAt: data.createdAt || null
        };
      });
      renderAccountsGrid();
    }, (error) => {
      console.error("Firestore error:", error);
      document.getElementById('accountsGrid').innerHTML = `<div class="empty-placeholder"><i class="fas fa-database"></i> Error loading accounts. Check network.</div>`;
      showToast("Failed to load accounts", true);
    });
  }

  // Update single account field (category or hidden)
  async function updateAccountField(accountId, field, value) {
    try {
      const accountRef = doc(db, 'accounts', accountId);
      await updateDoc(accountRef, { [field]: value });
      showToast(`Account ${field} updated`);
    } catch (err) {
      console.error(err);
      showToast(`Update failed: ${err.message}`, true);
    }
  }

  // Change category via dropdown
  async function changeAccountCategory(accountId, newCategory) {
    const acc = accounts.find(a => a.id === accountId);
    if (!acc) return;
    await updateAccountField(accountId, 'category', newCategory);
    showToast(`"${acc.name}" → ${newCategory.toUpperCase()}`);
  }

  // Toggle hide/unhide
  async function toggleHideAccount(accountId) {
    const acc = accounts.find(a => a.id === accountId);
    if (!acc) return;
    const newHidden = !acc.hidden;
    await updateAccountField(accountId, 'hidden', newHidden);
    showToast(newHidden ? `"${acc.name}" hidden` : `"${acc.name}" visible`);
  }

  // Reset all accounts categories to 'uncategorized' (bulk write)
  async function resetAllCategories() {
    try {
      const accountsRef = collection(db, 'accounts');
      const snapshot = await getDocs(accountsRef);
      const batch = writeBatch(db);
      snapshot.docs.forEach(docSnap => {
        batch.update(docSnap.ref, { category: 'uncategorized' });
      });
      await batch.commit();
      showToast("All accounts reset to Uncategorized category");
    } catch (err) {
      showToast("Reset error: " + err.message, true);
    }
  }

  // Unhide all accounts (set hidden: false for all)
  async function unhideAllAccounts() {
    try {
      const accountsRef = collection(db, 'accounts');
      const snapshot = await getDocs(accountsRef);
      const batch = writeBatch(db);
      snapshot.docs.forEach(docSnap => {
        batch.update(docSnap.ref, { hidden: false });
      });
      await batch.commit();
      showToast("All accounts are now visible");
      if (!showHiddenItems) {
        showHiddenItems = true;
        const toggleBtn = document.getElementById('toggleHiddenBtn');
        if (toggleBtn) toggleBtn.innerHTML = '<i class="fas fa-eye-slash"></i> Show hidden';
      }
    } catch (err) {
      showToast("Unhide error: " + err.message, true);
    }
  }

  // get filtered & visible accounts based on current UI flags
  function getFilteredAccounts() {
    let filtered = [...accounts];
    // 1) hidden filter: if showHiddenItems === false, exclude hidden accounts
    if (!showHiddenItems) {
      filtered = filtered.filter(acc => !acc.hidden);
    }
    // 2) category filter
    if (currentFilter !== 'all') {
      filtered = filtered.filter(acc => acc.category === currentFilter);
    }
    return filtered;
  }

  // UI rendering with category badges and hide styles
  function renderAccountsGrid() {
    const container = document.getElementById('accountsGrid');
    const visibleList = getFilteredAccounts();
    
    if (!visibleList.length) {
      container.innerHTML = `<div class="empty-placeholder"><i class="fas fa-filter-circle-xmark"></i> <br/> No accounts match filter. Try changing category or show hidden.</div>`;
      return;
    }
    
    container.innerHTML = visibleList.map(acc => {
      const isHidden = acc.hidden;
      const hiddenClass = isHidden ? 'hidden-account' : '';
      let catBadgeClass = '';
      if (acc.category === 'journal') catBadgeClass = 'journal';
      else if (acc.category === 'ledger') catBadgeClass = 'ledger';
      else if (acc.category === 'report') catBadgeClass = 'report';
      else catBadgeClass = 'uncategorized';
      
      const categoryLabel = acc.category.charAt(0).toUpperCase() + acc.category.slice(1);
      // icon based on account type (asset/expense/etc)
      let typeIcon = 'fa-receipt';
      if (acc.type === 'asset') typeIcon = 'fa-coins';
      else if (acc.type === 'expense') typeIcon = 'fa-shopping-cart';
      else if (acc.type === 'revenue') typeIcon = 'fa-chart-line';
      else if (acc.type === 'liability') typeIcon = 'fa-hand-holding-dollar';
      else if (acc.type === 'equity') typeIcon = 'fa-chart-pie';
      
      const dropdownId = `dd_${acc.id}`;
      return `
        <div class="account-card ${hiddenClass}" data-id="${acc.id}">
          <div class="card-header">
            <div class="account-title">
              <i class="fas ${typeIcon}" style="color:#3b82f6;"></i>
              <span class="account-name">${escapeHtml(acc.name)}</span>
              <span class="cat-badge ${catBadgeClass}"><i class="fas ${getCatIcon(acc.category)}"></i> ${categoryLabel}</span>
            </div>
            <div style="position:relative;">
              <button class="menu-btn-card" data-menu-for="${acc.id}"><i class="fas fa-ellipsis-v"></i></button>
              <div class="card-dropdown" id="${dropdownId}">
                <div class="dropdown-opt" data-action="categorize" data-cat="journal"><i class="fas fa-book-open"></i> 📓 Journal</div>
                <div class="dropdown-opt" data-action="categorize" data-cat="ledger"><i class="fas fa-list-ul"></i> 📒 Ledger</div>
                <div class="dropdown-opt" data-action="categorize" data-cat="report"><i class="fas fa-chart-line"></i> 📊 Report</div>
                <div class="dropdown-opt" data-action="categorize" data-cat="uncategorized"><i class="fas fa-question"></i> 🧾 Uncategorized</div>
                <div class="dropdown-divider"></div>
                <div class="dropdown-opt" data-action="toggle-hide"><i class="fas ${isHidden ? 'fa-eye' : 'fa-eye-slash'}"></i> ${isHidden ? 'Unhide' : 'Hide'}</div>
              </div>
            </div>
          </div>
          <div class="account-detail">
            <i class="fas fa-align-left"></i> ${escapeHtml(acc.description || 'No description')}
            <span style="margin-left: 10px;"><i class="fas fa-chart-simple"></i> ${acc.type}</span>
          </div>
          <div class="balance">
            <span><i class="fas fa-coins"></i> Balance</span>
            <span style="font-weight:800;">K ${acc.balance.toLocaleString(undefined, {minimumFractionDigits:2})}</span>
          </div>
          ${isHidden ? '<div style="font-size:0.6rem; margin-top:6px; color:#94a3b8;"><i class="fas fa-low-vision"></i> hidden from main view</div>' : ''}
        </div>
      `;
    }).join('');
    
    // attach event listeners to dropdown triggers & options
    document.querySelectorAll('.menu-btn-card').forEach(btn => {
      btn.removeEventListener('click', handleMenuClick);
      btn.addEventListener('click', handleMenuClick);
    });
    document.querySelectorAll('.dropdown-opt').forEach(opt => {
      opt.removeEventListener('click', handleDropdownOption);
      opt.addEventListener('click', handleDropdownOption);
    });
  }
  
  function getCatIcon(cat) {
    if (cat === 'journal') return 'fa-book';
    if (cat === 'ledger') return 'fa-receipt';
    if (cat === 'report') return 'fa-chart-simple';
    return 'fa-tag';
  }
  
  function handleMenuClick(e) {
    e.stopPropagation();
    const btn = e.currentTarget;
    const cardDiv = btn.closest('.account-card');
    if (!cardDiv) return;
    const dropdownDiv = btn.nextElementSibling;
    if (!dropdownDiv || !dropdownDiv.classList) return;
    // close any other open dropdowns
    document.querySelectorAll('.card-dropdown.show').forEach(dd => {
      if (dd !== dropdownDiv) dd.classList.remove('show');
    });
    dropdownDiv.classList.toggle('show');
  }
  
  function handleDropdownOption(e) {
    e.stopPropagation();
    const opt = e.currentTarget;
    const dropdownDiv = opt.closest('.card-dropdown');
    if (!dropdownDiv) return;
    const card = dropdownDiv.closest('.account-card');
    if (!card) return;
    const accountId = card.getAttribute('data-id');
    const action = opt.getAttribute('data-action');
    
    if (action === 'categorize') {
      const targetCat = opt.getAttribute('data-cat');
      if (targetCat && accountId) {
        changeAccountCategory(accountId, targetCat);
      }
    } else if (action === 'toggle-hide') {
      if (accountId) toggleHideAccount(accountId);
    }
    dropdownDiv.classList.remove('show');
  }
  
  // Click outside closes dropdowns
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.card-dropdown') && !e.target.closest('.menu-btn-card')) {
      document.querySelectorAll('.card-dropdown.show').forEach(dd => dd.classList.remove('show'));
    }
  });
  
  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }
  
  // Filter UI and persistence (filters survive because we keep global state, but no localStorage for filter)
  function initFilters() {
    const filterChips = document.querySelectorAll('.filter-chip[data-filter]');
    filterChips.forEach(chip => {
      chip.addEventListener('click', () => {
        const filterVal = chip.getAttribute('data-filter');
        if (filterVal) {
          currentFilter = filterVal;
          filterChips.forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
          renderAccountsGrid();
          showToast(`Filter: ${filterVal === 'all' ? 'All accounts' : filterVal}`);
        }
      });
    });
    
    // toggle hidden visibility (show/hide hidden accounts completely)
    const toggleHiddenBtn = document.getElementById('toggleHiddenBtn');
    toggleHiddenBtn.addEventListener('click', () => {
      showHiddenItems = !showHiddenItems;
      if (showHiddenItems) {
        toggleHiddenBtn.innerHTML = '<i class="fas fa-eye-slash"></i> Show hidden';
        toggleHiddenBtn.style.background = '#f1f5f9';
        showToast('Hidden accounts are VISIBLE (dimmed)');
      } else {
        toggleHiddenBtn.innerHTML = '<i class="fas fa-eye"></i> Hide hidden';
        toggleHiddenBtn.style.background = '#e2e8f0';
        showToast('Hidden accounts are HIDDEN from list');
      }
      renderAccountsGrid();
    });
    
    // reset categories bulk
    document.getElementById('resetCatsBtn').addEventListener('click', async () => {
      await resetAllCategories();
    });
    // unhide all accounts bulk
    document.getElementById('unhideAllBtn').addEventListener('click', async () => {
      await unhideAllAccounts();
      if (!showHiddenItems) {
        showHiddenItems = true;
        const btn = document.getElementById('toggleHiddenBtn');
        if (btn) btn.innerHTML = '<i class="fas fa-eye-slash"></i> Show hidden';
      }
      renderAccountsGrid();
    });
  }
  
  // small migration: ensure existing accounts have 'category' & 'hidden' fields if missing
  // we will call once to patch missing fields (optional but good practice)
  async function ensureAllAccountsHaveMetaFields() {
    try {
      const accountsRef = collection(db, 'accounts');
      const snapshot = await getDocs(accountsRef);
      const batch = writeBatch(db);
      let needsUpdate = false;
      snapshot.docs.forEach(docSnap => {
        const data = docSnap.data();
        let updateData = {};
        if (data.category === undefined) updateData.category = 'uncategorized';
        if (data.hidden === undefined) updateData.hidden = false;
        if (Object.keys(updateData).length > 0) {
          needsUpdate = true;
          batch.update(docSnap.ref, updateData);
        }
      });
      if (needsUpdate) {
        await batch.commit();
        console.log("Migrated existing accounts with category/hidden fields");
      }
    } catch (err) {
      console.warn("Migration skip:", err);
    }
  }
  
  // start app: listen + init filters
  async function init() {
    await ensureAllAccountsHaveMetaFields();
    listenAccounts();
    initFilters();
  }
  
  init();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Trismart · Accounts Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --p: #4361ee;
  --p2: #3a56d4;
  --ok: #2ecc71;
  --ok2: #27ae60;
  --warn: #f8961e;
  --danger: #ef4444;
  --purple: #7c3aed;
  --pink: #f72585;
  --bg: #f4f6fb;
  --sur: #ffffff;
  --lite: #f1f3f5;
  --bdr: #dee2e6;
  --txt: #212529;
  --fade: #6c757d;
  --radius: 12px;
  --radius-lg: 16px;
  --sh: 0 1px 6px rgba(0,0,0,0.05);
  --shl: 0 4px 20px rgba(0,0,0,0.08);
}

html, body {
  height: 100%;
  width: 100%;
  overflow: hidden;
  font-family: 'DM Sans', system-ui, sans-serif;
  background: var(--bg);
}

.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  width: 100%;
  overflow: hidden;
}

.topbar {
  background: var(--sur);
  border-bottom: 1px solid var(--bdr);
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  box-shadow: var(--sh);
  z-index: 100;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-mark {
  width: 32px;
  height: 32px;
  background: linear-gradient(135deg, var(--p), var(--p2));
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
}

.logo-text {
  font-weight: 800;
  font-size: 0.9rem;
}

.accounts-badge {
  background: linear-gradient(135deg, var(--purple), #6d28d9);
  font-size: 0.6rem;
  font-weight: 800;
  padding: 3px 10px;
  border-radius: 40px;
  color: white;
}

.admin-badge {
  background: #eef2ff;
  color: var(--p);
  font-size: 0.6rem;
  font-weight: 700;
  padding: 3px 12px;
  border-radius: 40px;
}

.main-content {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
  min-height: 0;
}

.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  margin-top: 8px;
}

.section-title {
  font-size: 0.75rem;
  font-weight: 800;
  text-transform: uppercase;
  color: var(--fade);
  letter-spacing: 0.08em;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: 40px;
  font-size: 0.7rem;
  font-weight: 700;
  cursor: pointer;
  border: none;
  transition: 0.15s;
}

.btn-primary {
  background: linear-gradient(135deg, var(--p), var(--p2));
  color: white;
}

.btn-outline {
  background: transparent;
  border: 1.5px solid var(--bdr);
  color: var(--txt);
}

.btn-outline:hover {
  border-color: var(--p);
  color: var(--p);
}

.accounts-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
}

.account-card {
  background: var(--sur);
  border: 1px solid var(--bdr);
  border-radius: var(--radius-lg);
  padding: 16px;
  transition: all 0.2s;
  position: relative;
}

.account-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shl);
  border-color: var(--p);
}

.account-card.clickable {
  cursor: pointer;
}

.account-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 12px;
}

.account-name {
  font-size: 0.85rem;
  font-weight: 800;
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1;
}

.account-icon {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
}

.icon-revenue { background: rgba(46,204,113,0.1); color: var(--ok); }
.icon-expense { background: rgba(239,68,68,0.1); color: var(--danger); }
.icon-asset { background: rgba(67,97,238,0.1); color: var(--p); }
.icon-liability { background: rgba(245,158,11,0.1); color: var(--warn); }
.icon-equity { background: rgba(124,58,237,0.1); color: var(--purple); }

.account-desc {
  font-size: 0.65rem;
  color: var(--fade);
  margin-bottom: 12px;
  line-height: 1.3;
}

.account-stats {
  display: flex;
  gap: 12px;
  font-size: 0.6rem;
  color: var(--fade);
  border-top: 1px solid var(--bdr);
  padding-top: 10px;
}

/* Dropdown Menu */
.card-menu {
  position: relative;
  flex-shrink: 0;
}

.menu-btn {
  background: transparent;
  border: none;
  width: 32px;
  height: 32px;
  border-radius: 8px;
  cursor: pointer;
  color: var(--fade);
  font-size: 1rem;
  transition: 0.15s;
}

.menu-btn:hover {
  background: var(--lite);
  color: var(--txt);
}

.dropdown-menu {
  position: absolute;
  top: 100%;
  right: 0;
  background: var(--sur);
  border: 1px solid var(--bdr);
  border-radius: 12px;
  box-shadow: var(--shl);
  min-width: 140px;
  z-index: 100;
  display: none;
  overflow: hidden;
}

.dropdown-menu.show {
  display: block;
}

.dropdown-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  font-size: 0.7rem;
  font-weight: 600;
  cursor: pointer;
  transition: 0.1s;
  color: var(--txt);
}

.dropdown-item:hover {
  background: var(--lite);
}

.dropdown-item.edit-item {
  color: var(--p);
}

.dropdown-item.delete-item {
  color: var(--danger);
}

/* Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(4px);
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
}

.modal-overlay.show {
  display: flex;
}

.modal-content {
  background: white;
  border-radius: 24px;
  max-width: 500px;
  width: 90%;
  max-height: 80vh;
  overflow: auto;
  padding: 20px;
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--bdr);
}

.modal-header h3 {
  font-size: 1rem;
  font-weight: 800;
}

.close-modal {
  cursor: pointer;
  font-size: 1.2rem;
  color: var(--fade);
}

.form-group {
  margin-bottom: 16px;
}

.form-group label {
  display: block;
  font-size: 0.6rem;
  font-weight: 800;
  text-transform: uppercase;
  color: var(--fade);
  margin-bottom: 5px;
}

.form-group input, .form-group select, .form-group textarea {
  width: 100%;
  padding: 10px 12px;
  border: 1.5px solid var(--bdr);
  border-radius: 12px;
  font-size: 0.8rem;
  font-family: inherit;
}

.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  outline: none;
  border-color: var(--p);
}

.form-actions {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.toast-wrap {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 1100;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.toast {
  background: #1e293b;
  color: white;
  padding: 10px 18px;
  border-radius: 40px;
  font-size: 0.7rem;
  animation: fadeIn 0.2s;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

::-webkit-scrollbar {
  width: 4px;
  height: 4px;
}

::-webkit-scrollbar-track {
  background: var(--lite);
}

::-webkit-scrollbar-thumb {
  background: var(--bdr);
  border-radius: 4px;
}

@media (max-width: 700px) {
  .accounts-grid {
    grid-template-columns: 1fr;
  }
  .main-content {
    padding: 12px;
  }
  .topbar {
    padding: 0 12px;
  }
}
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="logo">
      <div class="logo-mark"><i class="fas fa-book"></i></div>
      <div class="logo-text">Trismart · Accounts</div>
      <div class="accounts-badge">FINANCIAL</div>
      <div class="admin-badge" id="adminBadge">ADMIN</div>
    </div>
    <div><i class="fas fa-chart-pie"></i> Chart of Accounts</div>
  </div>

  <div class="main-content">

    <div class="section-header">
      <div class="section-title"><i class="fas fa-chart-line"></i> All Accounts</div>
      <button class="btn btn-primary" onclick="openAccountModal()">
        <i class="fas fa-plus"></i> New Account
      </button>
    </div>

    <div class="accounts-grid" id="accountsGrid">
      <div style="text-align:center; padding:40px;">Loading accounts...</div>
    </div>

  </div>
</div>

<div id="accountModal" class="modal-overlay">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="accountModalTitle">New Account</h3>
      <span class="close-modal" onclick="closeModal('accountModal')">&times;</span>
    </div>
    <form id="accountForm">
      <input type="hidden" id="accountId">
      <div class="form-group">
        <label>Account Name</label>
        <input type="text" id="accountName" required placeholder="e.g., Cash in Hand, Bank Account">
      </div>
      <div class="form-group">
        <label>Account Type</label>
        <select id="accountType" required>
          <option value="asset">Asset</option>
          <option value="liability">Liability</option>
          <option value="equity">Equity</option>
          <option value="revenue">Revenue / Income</option>
          <option value="expense">Expense</option>
        </select>
      </div>
      <div class="form-group">
        <label>Opening Balance (K)</label>
        <input type="number" id="accountBalance" step="0.01" value="0">
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="accountDesc" rows="2" placeholder="Optional description"></textarea>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Save Account</button>
        <button type="button" class="btn btn-outline" onclick="closeModal('accountModal')">Cancel</button>
      </div>
    </form>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.5.0/firebase-app.js";
import { getFirestore, collection, query, orderBy, addDoc, updateDoc, deleteDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.5.0/firebase-firestore.js";

const firebaseConfig = { 
  apiKey: "AIzaSyB-lm7Y3r1F6VvY8PKvY8glLabZDbJsHM1k", 
  authDomain: "trismartstores.firebaseapp.com", 
  projectId: "trismartstores", 
  storageBucket: "trismartstores.appspot.com", 
  messagingSenderId: "416692703333", 
  appId: "1:416692703333:web:d4b60292621435c748f68c" 
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const loggedInUser = localStorage.getItem('loggedInUser') || '';
const userName = (loggedInUser || localStorage.getItem('userName') || '').toLowerCase().trim();

if (userName !== 'chris') { 
  document.body.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100vh;"><div style="background:white;padding:30px;border-radius:24px;">Access Denied. Accounts access restricted.</div></div>`; 
  throw new Error('unauth'); 
}

document.getElementById('adminBadge').innerHTML = userName.toUpperCase();

let accounts = [];
let unsubscribeAccounts = null;
let activeDropdown = null;

function toast(msg, type = 'success') {
  const wrap = document.getElementById('toastWrap');
  const t = document.createElement('div');
  t.className = 'toast';
  t.style.background = type === 'error' ? '#b91c1c' : '#1e293b';
  t.innerHTML = `<i class="fas ${type === 'error' ? 'fa-times-circle' : 'fa-check-circle'}"></i> ${msg}`;
  wrap.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function closeModal(modalId) {
  document.getElementById(modalId).classList.remove('show');
}
window.closeModal = closeModal;

function closeAllDropdowns() {
  if (activeDropdown) {
    activeDropdown.classList.remove('show');
    activeDropdown = null;
  }
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('.card-menu')) {
    closeAllDropdowns();
  }
});

function openAccountModal(account = null) {
  const modal = document.getElementById('accountModal');
  const title = document.getElementById('accountModalTitle');
  const form = document.getElementById('accountForm');
  
  if (account) {
    title.innerText = 'Edit Account';
    document.getElementById('accountId').value = account.id;
    document.getElementById('accountName').value = account.name;
    document.getElementById('accountType').value = account.type;
    document.getElementById('accountBalance').value = account.balance;
    document.getElementById('accountDesc').value = account.description || '';
  } else {
    title.innerText = 'New Account';
    form.reset();
    document.getElementById('accountId').value = '';
    document.getElementById('accountType').value = 'asset';
    document.getElementById('accountBalance').value = '0';
  }
  modal.classList.add('show');
}
window.openAccountModal = openAccountModal;

function loadAccounts() {
  if (unsubscribeAccounts) unsubscribeAccounts();
  const q = query(collection(db, 'accounts'), orderBy('name'));
  unsubscribeAccounts = onSnapshot(q, (snap) => {
    accounts = snap.docs.map(doc => ({ id: doc.id, ...doc.data(), balance: Number(doc.data().balance) || 0 }));
    renderAccounts();
  }, (error) => {
    console.error('Accounts load error:', error);
    toast('Error loading accounts', 'error');
  });
}

function renderAccounts() {
  const grid = document.getElementById('accountsGrid');
  if (accounts.length === 0) {
    grid.innerHTML = '<div style="text-align:center; padding:40px;">No accounts created yet. Click "New Account" to start.</div>';
    return;
  }
  
  const typeIcons = {
    revenue: { icon: 'fa-chart-line', class: 'icon-revenue', label: 'Revenue' },
    expense: { icon: 'fa-shopping-cart', class: 'icon-expense', label: 'Expense' },
    asset: { icon: 'fa-coins', class: 'icon-asset', label: 'Asset' },
    liability: { icon: 'fa-hand-holding-usd', class: 'icon-liability', label: 'Liability' },
    equity: { icon: 'fa-chart-pie', class: 'icon-equity', label: 'Equity' }
  };
  
  grid.innerHTML = accounts.map(account => {
    const typeInfo = typeIcons[account.type] || typeIcons.asset;
    const menuId = `menu_${account.id}`;
    
    return `
      <div class="account-card clickable" onclick="goToAccountDetail('${account.id}')">
        <div class="account-header">
          <div class="account-name">
            <div class="account-icon ${typeInfo.class}">
              <i class="fas ${typeInfo.icon}"></i>
            </div>
            <span>${escapeHtml(account.name)}</span>
          </div>
          <div class="card-menu">
            <button class="menu-btn" onclick="event.stopPropagation(); toggleDropdown('${menuId}')">
              <i class="fas fa-ellipsis-v"></i>
            </button>
            <div class="dropdown-menu" id="${menuId}">
              <div class="dropdown-item edit-item" onclick="event.stopPropagation(); editAccount('${account.id}')">
                <i class="fas fa-edit"></i> Edit Account
              </div>
              <div class="dropdown-item delete-item" onclick="event.stopPropagation(); deleteAccount('${account.id}')">
                <i class="fas fa-trash-alt"></i> Delete Account
              </div>
            </div>
          </div>
        </div>
        <div class="account-desc">${escapeHtml(account.description || typeInfo.label)}</div>
        <div class="account-stats">
          <span><i class="fas fa-chart-line"></i> ${typeInfo.label}</span>
          <span><i class="fas fa-calendar"></i> Balance: K${(account.balance || 0).toFixed(2)}</span>
        </div>
      </div>
    `;
  }).join('');
}

window.toggleDropdown = function(menuId) {
  event.stopPropagation();
  closeAllDropdowns();
  const dropdown = document.getElementById(menuId);
  if (dropdown) {
    dropdown.classList.add('show');
    activeDropdown = dropdown;
  }
};

window.editAccount = function(accountId) {
  closeAllDropdowns();
  const account = accounts.find(a => a.id === accountId);
  if (account) {
    openAccountModal(account);
  }
};

window.deleteAccount = async function(accountId) {
  closeAllDropdowns();
  const account = accounts.find(a => a.id === accountId);
  if (!account) return;
  
  if (confirm(`Delete account "${account.name}"? This will also delete all transactions for this account.`)) {
    try {
      await deleteDoc(doc(db, 'accounts', accountId));
      toast('Account deleted');
    } catch (err) {
      toast(err.message, 'error');
    }
  }
};

window.goToAccountDetail = function(accountId) {
  localStorage.setItem('selectedAccountId', accountId);
  window.location.href = 'account-detail.html';
};

document.getElementById('accountForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const id = document.getElementById('accountId').value;
  const data = {
    name: document.getElementById('accountName').value.trim(),
    type: document.getElementById('accountType').value,
    balance: parseFloat(document.getElementById('accountBalance').value) || 0,
    description: document.getElementById('accountDesc').value,
    updatedAt: new Date().toISOString()
  };
  
  try {
    if (id) {
      await updateDoc(doc(db, 'accounts', id), data);
      toast('Account updated');
    } else {
      await addDoc(collection(db, 'accounts'), { ...data, createdAt: new Date().toISOString() });
      toast('Account created');
    }
    closeModal('accountModal');
  } catch (err) {
    toast(err.message, 'error');
  }
});

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

loadAccounts();
</script>
</body>
</html>

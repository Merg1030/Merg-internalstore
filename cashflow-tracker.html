<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Trismart · Cash Flow (with opening balance)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg:       #0a0a0f;
      --surface:  #111118;
      --surface2: #16161f;
      --surface3: #1c1c28;
      --border:   #1e1e2a;
      --border2:  #2a2a3a;
      --accent:   #6366f1;
      --accent2:  #818cf8;
      --text:     #f0f0f8;
      --muted:    #6b7280;
      --muted2:   #4b5563;
      --green:    #34d399;
      --red:      #f87171;
      --amber:    #fbbf24;
      --radius:   12px;
      --shadow:   0 4px 24px rgba(0,0,0,0.45);
    }
    * { scrollbar-width: thin; scrollbar-color: var(--border2) transparent; }
    *::-webkit-scrollbar { width: 5px; height: 5px; }
    *::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }
    html, body { height: 100%; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

    /* ── TOP BAR ── */
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 18px 32px; border-bottom: 1px solid var(--border); background: var(--surface); flex-wrap: wrap; gap: 16px; position: sticky; top: 0; z-index: 100; }
    .topbar-left { display: flex; align-items: center; gap: 20px; }
    .back-btn { width: 36px; height: 36px; border-radius: 10px; border: 1px solid var(--border2); background: transparent; color: var(--muted); display: flex; align-items: center; justify-content: center; cursor: pointer; text-decoration: none; font-size: 0.85rem; transition: all 0.18s; }
    .back-btn:hover { border-color: var(--accent); color: var(--accent); }
    .page-title { font-family: 'Syne', sans-serif; font-size: 1.35rem; font-weight: 800; color: var(--text); letter-spacing: -0.01em; }
    .topbar-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    
    .month-pick { display: flex; align-items: center; gap: 8px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: 8px 14px; font-size: 0.84rem; color: var(--muted); }
    .month-pick input[type="month"] { background: transparent; border: none; font-family: 'DM Sans', sans-serif; font-size: 0.84rem; font-weight: 600; color: var(--text); outline: none; cursor: pointer; }
    .month-pick input[type="month"]::-webkit-calendar-picker-indicator { filter: invert(0.5); cursor: pointer; }

    .btn {
      display: inline-flex; align-items: center; gap: 8px; padding: 9px 18px;
      border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.84rem;
      font-weight: 600; cursor: pointer; border: none; transition: all 0.18s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent2); }
    .btn-ghost { background: var(--surface2); border: 1px solid var(--border2); color: var(--muted); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
    .btn-transfer { background: var(--surface2); border: 1px solid var(--amber); color: var(--amber); }
    .btn-transfer:hover { background: rgba(251,191,36,0.1); }

    /* ── ACCOUNT TABS ── */
    .acc-bar { display: flex; align-items: center; gap: 0; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 32px; overflow-x: auto; }
    .acc-tab { display: flex; align-items: center; gap: 10px; padding: 16px 24px; font-size: 0.88rem; font-weight: 600; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.18s; white-space: nowrap; user-select: none; }
    .acc-tab:hover { color: var(--text); }
    .acc-tab.active { color: var(--accent2); border-bottom-color: var(--accent2); }
    .acc-tab .acc-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted2); }
    .acc-tab.active .acc-dot { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); }

    /* ── MAIN ── */
    .main { flex: 1; padding: 28px 32px; display: flex; flex-direction: column; }

    /* ── TABLE ── */
    .table-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; flex: 1; display: flex; flex-direction: column; }
    .table-scroll { overflow-x: auto; flex: 1; }
    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    thead { position: sticky; top: 0; z-index: 10; }
    th { background: var(--surface2); font-size: 0.68rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); padding: 13px 18px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
    th.num, td.num { text-align: right; }
    th:last-child, td:last-child { text-align: center; width: 60px; }
    td { padding: 14px 18px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr { transition: background 0.12s; }
    tbody tr:hover { background: var(--surface2); }
    tbody tr.transfer-row td { color: var(--amber); }
    tbody tr.transfer-row td:first-child, tbody tr.transfer-row td:nth-child(2), tbody tr.transfer-row td:nth-child(3) { color: var(--muted); }
    .empty-row td { text-align: center; padding: 64px; color: var(--muted); font-size: 0.9rem; }
    .opening-row td { background: var(--surface3); color: var(--muted); font-style: italic; border-top: 1px solid var(--border2); }
    .opening-row td:first-child { color: var(--muted2); }
    .debit-val  { color: var(--red);   font-weight: 700; font-family: 'Syne', sans-serif; font-size: 0.9rem; }
    .credit-val { color: var(--green); font-weight: 700; font-family: 'Syne', sans-serif; font-size: 0.9rem; }
    .bal-val    { color: var(--text);  font-weight: 700; font-family: 'Syne', sans-serif; font-size: 0.9rem; }
    .bal-val.neg { color: var(--red); }
    .transfer-label { font-size: 0.72rem; font-weight: 700; color: var(--amber); background: rgba(251,191,36,0.1); padding: 2px 8px; border-radius: 4px; border: 1px solid rgba(251,191,36,0.25); }
    .blank-cell { color: transparent; user-select: none; }

    /* Action Menu */
    .action-btn {
      background: transparent; border: none; color: var(--muted);
      cursor: pointer; padding: 8px; border-radius: 6px;
      transition: all 0.18s; font-size: 1rem;
    }
    .action-btn:hover { background: var(--border2); color: var(--text); }
    .menu-container {
      position: relative; display: inline-block;
    }
    .dropdown-menu {
      position: absolute; right: 0; top: 100%; z-index: 1000;
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 8px; padding: 6px; min-width: 120px;
      box-shadow: var(--shadow); display: none;
    }
    .dropdown-menu.show { display: block; }
    .menu-item {
      display: flex; align-items: center; gap: 10px; padding: 10px 14px;
      color: var(--text); text-decoration: none; font-size: 0.85rem;
      border-radius: 6px; transition: all 0.18s; cursor: pointer;
      border: none; background: transparent; width: 100%; text-align: left;
    }
    .menu-item:hover { background: var(--border2); }
    .menu-item.delete:hover { color: var(--red); }
    .menu-item i { width: 16px; font-size: 0.85rem; }

    /* ── MODALS ── */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.72); backdrop-filter: blur(6px); z-index: 900; align-items: center; justify-content: center; }
    .overlay.open { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border2); border-radius: 16px; padding: 32px; width: 90%; max-width: 460px; box-shadow: var(--shadow); animation: slideUp 0.22s ease; max-height: 92vh; overflow-y: auto; }
    @keyframes slideUp { from { transform: translateY(24px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .modal-head h2 { font-family: 'Syne', sans-serif; font-size: 1.2rem; font-weight: 800; }
    .close-btn { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border2); background: transparent; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; transition: all 0.18s; }
    .close-btn:hover { background: var(--border2); color: var(--text); }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 0.68rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; }
    .field input, .field select { width: 100%; padding: 11px 14px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; outline: none; transition: border-color 0.18s; }
    .field input::placeholder { color: var(--muted2); }
    .field input:focus, .field select:focus { border-color: var(--accent); }
    .field select option { background: var(--surface); }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-error { color: var(--red); font-size: 0.8rem; margin-bottom: 12px; min-height: 16px; }
    .save-btn { width: 100%; padding: 13px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: background 0.18s; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 4px; }
    .save-btn:hover { background: var(--accent2); }
    .save-btn.amber { background: var(--amber); color: #000; }
    .save-btn.amber:hover { background: #f5a623; }
    .save-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .delete-btn { background: var(--red); width: 100%; padding: 13px; border: none; border-radius: 8px; color: white; font-weight: 700; cursor: pointer; transition: opacity 0.18s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .delete-btn:hover { opacity: 0.8; }
    .divider { border: none; border-top: 1px solid var(--border); margin: 4px 0 16px; }

    /* TOAST */
    .toast-wrap { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
    .toast { background: var(--surface2); border: 1px solid var(--border2); color: var(--text); border-radius: 10px; padding: 12px 18px; font-size: 0.87rem; font-weight: 600; display: flex; align-items: center; gap: 10px; box-shadow: var(--shadow); animation: toastIn 0.22s ease; }
    .toast i { font-size: 1rem; }
    .toast.success { border-left: 4px solid var(--green); }
    .toast.success i { color: var(--green); }
    .toast.error { border-left: 4px solid var(--red); }
    .toast.error i { color: var(--red); }
    .toast.info { border-left: 4px solid var(--amber); }
    .toast.info i { color: var(--amber); }
    @keyframes toastIn { from { transform: translateX(16px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  </style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <div class="topbar-left">
    <a href="cashbook.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
    <span class="page-title">Cash Flow</span>
  </div>
  <div class="topbar-right">
    <div class="month-pick">
      <i class="fas fa-calendar-alt" style="font-size:0.75rem"></i>
      <input type="month" id="monthPicker">
    </div>
    <button class="btn btn-ghost" id="pdfBtn"><i class="fas fa-file-pdf"></i> PDF</button>
    <button class="btn btn-transfer" onclick="openTransferModal()"><i class="fas fa-arrow-right-arrow-left"></i> Transfer</button>
    <button class="btn btn-primary" onclick="openTxnModal('add')"><i class="fas fa-plus"></i> Add Transaction</button>
  </div>
</div>

<!-- Account Tabs -->
<div class="acc-bar">
  <div class="acc-tab active" data-acc="Cash account" onclick="switchAcc(this)">
    <span class="acc-dot"></span> Cash Account
  </div>
  <div class="acc-tab" data-acc="Bank account" onclick="switchAcc(this)">
    <span class="acc-dot"></span> Bank Account
  </div>
  <div class="acc-tab" data-acc="Airtel money" onclick="switchAcc(this)">
    <span class="acc-dot"></span> Airtel Money
  </div>
</div>

<!-- Main -->
<div class="main">
  <div class="table-card">
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Description</th>
            <th>Reference</th>
            <th class="num">Debit</th>
            <th class="num">Credit</th>
            <th class="num">Balance</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="cfTbody">
          <tr class="empty-row"><td colspan="7"><i class="fas fa-spinner fa-spin"></i> Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast-wrap" id="toastWrap"></div>

<!-- ── ADD/EDIT TRANSACTION MODAL ── -->
<div class="overlay" id="txnOverlay" onclick="bgClick(event,'txnOverlay')">
  <div class="modal">
    <div class="modal-head">
      <h2 id="txnModalTitle">Add Transaction</h2>
      <button class="close-btn" onclick="closeTxnModal()"><i class="fas fa-times"></i></button>
    </div>
    <div class="form-error" id="txnErr"></div>
    <form onsubmit="saveTxn(event)" autocomplete="off">
      <input type="hidden" id="txnId">
      <div class="field-row">
        <div class="field">
          <label>Date</label>
          <input type="date" id="tDate" required>
        </div>
        <div class="field">
          <label>Type</label>
          <select id="tType" required>
            <option value="">— Select —</option>
            <option value="credit">Credit (In)</option>
            <option value="debit">Debit (Out)</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Account</label>
        <select id="tAccount" required>
          <option value="">— Select Account —</option>
          <option value="Cash account">Cash Account</option>
          <option value="Bank account">Bank Account</option>
          <option value="Airtel money">Airtel Money</option>
        </select>
      </div>
      <div class="field">
        <label>Description</label>
        <input type="text" id="tDesc" placeholder="e.g. Cash sale" required>
      </div>
      <div class="field">
        <label>Reference</label>
        <input type="text" id="tRef" placeholder="e.g. INV-001">
      </div>
      <div class="field">
        <label>Amount</label>
        <input type="number" id="tAmount" min="0.01" step="0.01" placeholder="0.00" required>
      </div>
      <button type="submit" class="save-btn" id="txnBtn">
        <i class="fas fa-check"></i> Save Transaction
      </button>
    </form>
  </div>
</div>

<!-- ── TRANSFER MODAL ── -->
<div class="overlay" id="trOverlay" onclick="bgClick(event,'trOverlay')">
  <div class="modal">
    <div class="modal-head">
      <h2><i class="fas fa-arrow-right-arrow-left" style="color:var(--amber);margin-right:10px"></i>Transfer Funds</h2>
      <button class="close-btn" onclick="closeTransferModal()"><i class="fas fa-times"></i></button>
    </div>
    <div class="form-error" id="trErr"></div>
    <form onsubmit="saveTransfer(event)" autocomplete="off">
      <div class="field">
        <label>Date</label>
        <input type="date" id="trDate" required>
      </div>
      <div class="field-row">
        <div class="field">
          <label>From Account</label>
          <select id="trFrom" required>
            <option value="">— From —</option>
            <option value="Cash account">Cash Account</option>
            <option value="Bank account">Bank Account</option>
            <option value="Airtel money">Airtel Money</option>
          </select>
        </div>
        <div class="field">
          <label>To Account</label>
          <select id="trTo" required>
            <option value="">— To —</option>
            <option value="Cash account">Cash Account</option>
            <option value="Bank account">Bank Account</option>
            <option value="Airtel money">Airtel Money</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Description</label>
        <input type="text" id="trDesc" placeholder="e.g. Cash to bank">
      </div>
      <div class="field">
        <label>Reference</label>
        <input type="text" id="trRef" placeholder="e.g. TRF-001">
      </div>
      <div class="field">
        <label>Amount</label>
        <input type="number" id="trAmount" min="0.01" step="0.01" placeholder="0.00" required>
      </div>
      <button type="submit" class="save-btn amber" id="trBtn">
        <i class="fas fa-arrow-right-arrow-left"></i> Confirm Transfer
      </button>
    </form>
  </div>
</div>

<!-- ── DELETE CONFIRMATION MODAL ── -->
<div class="overlay" id="deleteOverlay" onclick="if(event.target===this) closeDeleteModal()">
  <div class="modal" style="max-width: 380px;">
    <div class="modal-head">
      <h2>Delete Transaction</h2>
      <button class="close-btn" onclick="closeDeleteModal()"><i class="fas fa-times"></i></button>
    </div>
    <p style="margin: 20px 0; color: var(--muted);">Are you sure you want to delete this transaction? This action cannot be undone.</p>
    <input type="hidden" id="deleteId">
    <button class="delete-btn" onclick="confirmDelete()">
      <i class="fas fa-trash"></i> Delete Permanently
    </button>
  </div>
</div>

<script>
  // ==================== FIREBASE INIT ====================
  firebase.initializeApp({
    apiKey: "AIzaSyB-lm7Y3r1F6Vv8PKvY8glLabZDbJsHM1k",
    authDomain: "trismartstores.firebaseapp.com",
    projectId: "trismartstores",
    storageBucket: "trismartstores.firebasestorage.app",
    messagingSenderId: "416692703333",
    appId: "1:416692703333:web:d4b60292621435c748f68c"
  });

  const db = firebase.firestore();
  
  // Enable persistence
  db.enablePersistence().catch(err => {
    if (err.code == 'failed-precondition') {
      console.log('Multiple tabs open - persistence disabled');
    }
  });

  // ==================== GLOBAL VARIABLES ====================
  let selAcc = 'Cash account';
  let allTransactions = [];
  let unsubscribeListener = null;

  // Month picker
  const monthPicker = document.getElementById('monthPicker');
  const today = new Date();
  const currentMonth = today.toISOString().substring(0,7);
  monthPicker.value = localStorage.getItem('cashflow_month_filter') || currentMonth;

  // ==================== HELPER FUNCTIONS ====================
  function toast(message, type = 'success') {
    const wrap = document.getElementById('toastWrap');
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    
    let icon = 'check-circle';
    if (type === 'error') icon = 'times-circle';
    if (type === 'info') icon = 'info-circle';
    
    el.innerHTML = `<i class="fas fa-${icon}"></i> ${message}`;
    wrap.appendChild(el);
    
    setTimeout(() => {
      el.style.opacity = '0';
      el.style.transform = 'translateX(16px)';
      setTimeout(() => el.remove(), 300);
    }, 3500);
  }

  function formatNumber(n) {
    return Math.abs(n).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function formatWithK(n) {
    return 'K ' + formatNumber(n);
  }

  // Close all dropdowns when clicking outside
  document.addEventListener('click', function() {
    document.querySelectorAll('.dropdown-menu.show').forEach(menu => {
      menu.classList.remove('show');
    });
  });

  // ==================== ACCOUNT SWITCHING ====================
  window.switchAcc = function(el) {
    document.querySelectorAll('.acc-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    selAcc = el.dataset.acc;
    renderTable();
  };

  // ==================== MODAL CONTROLS ====================
  window.bgClick = function(e, id) { 
    if (e.target.id === id) { 
      document.getElementById(id).classList.remove('open'); 
    } 
  };

  window.openTxnModal = function(mode, id = null) {
    const modal = document.getElementById('txnOverlay');
    const title = document.getElementById('txnModalTitle');
    
    if (mode === 'add') {
      title.textContent = 'Add Transaction';
      document.getElementById('txnId').value = '';
      document.getElementById('tDate').value = new Date().toISOString().substring(0,10);
      document.getElementById('tType').value = '';
      document.getElementById('tAccount').value = selAcc;
      document.getElementById('tDesc').value = '';
      document.getElementById('tRef').value = '';
      document.getElementById('tAmount').value = '';
    } else if (mode === 'edit' && id) {
      title.textContent = 'Edit Transaction';
      const transaction = allTransactions.find(t => t.id === id);
      if (transaction) {
        document.getElementById('txnId').value = transaction.id;
        document.getElementById('tDate').value = transaction.date || '';
        document.getElementById('tType').value = transaction.type || '';
        document.getElementById('tAccount').value = transaction.account || selAcc;
        document.getElementById('tDesc').value = transaction.description || '';
        document.getElementById('tRef').value = transaction.reference || '';
        document.getElementById('tAmount').value = transaction.amount || '';
      }
    }
    
    document.getElementById('txnErr').textContent = '';
    modal.classList.add('open');
  };

  window.closeTxnModal = function() { 
    document.getElementById('txnOverlay').classList.remove('open'); 
  };

  window.openTransferModal = function() {
    document.getElementById('trOverlay').classList.add('open');
    document.getElementById('trErr').textContent = '';
    document.getElementById('trDate').value = new Date().toISOString().substring(0,10);
    document.getElementById('trFrom').value = selAcc;
    document.getElementById('trTo').value = '';
    document.getElementById('trDesc').value = '';
    document.getElementById('trRef').value = '';
    document.getElementById('trAmount').value = '';
  };

  window.closeTransferModal = function() { 
    document.getElementById('trOverlay').classList.remove('open'); 
  };

  // ==================== DELETE CONTROLS ====================
  window.openDeleteModal = function(id) {
    document.getElementById('deleteId').value = id;
    document.getElementById('deleteOverlay').classList.add('open');
  };
  
  window.closeDeleteModal = function() {
    document.getElementById('deleteOverlay').classList.remove('open');
    document.getElementById('deleteId').value = '';
  };
  
  window.confirmDelete = async function() {
    const id = document.getElementById('deleteId').value;
    if (!id) return;
    
    try {
      await db.collection('Cashflow transactions').doc(id).delete();
      toast('Transaction deleted successfully', 'success');
      closeDeleteModal();
    } catch (error) {
      console.error('Delete error:', error);
      toast('Error: ' + error.message, 'error');
    }
  };

  // ==================== TOGGLE DROPDOWN ====================
  window.toggleMenu = function(event, id) {
    event.stopPropagation();
    
    // Close all other menus
    document.querySelectorAll('.dropdown-menu.show').forEach(menu => {
      if (menu !== event.currentTarget.nextElementSibling) {
        menu.classList.remove('show');
      }
    });
    
    // Toggle this menu
    const menu = event.currentTarget.nextElementSibling;
    menu.classList.toggle('show');
  }

  // ==================== SAVE TRANSACTION ====================
  window.saveTxn = async function(e) {
    e.preventDefault();
    
    const errEl = document.getElementById('txnErr');
    const btn = document.getElementById('txnBtn');
    const id = document.getElementById('txnId').value;
    
    errEl.textContent = '';

    const date = document.getElementById('tDate').value;
    const type = document.getElementById('tType').value;
    const account = document.getElementById('tAccount').value;
    const desc = document.getElementById('tDesc').value.trim();
    const ref = document.getElementById('tRef').value.trim() || '—';
    const amount = parseFloat(document.getElementById('tAmount').value);

    // Validation
    if (!date) { errEl.textContent = 'Please select a date.'; return; }
    if (!type) { errEl.textContent = 'Please select a type.'; return; }
    if (!account) { errEl.textContent = 'Please select an account.'; return; }
    if (!desc) { errEl.textContent = 'Please enter a description.'; return; }
    if (isNaN(amount) || amount <= 0) { errEl.textContent = 'Please enter a valid amount.'; return; }

    // Disable button
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving…';

    try {
      const transactionData = {
        date: date,
        type: type,
        account: account,
        description: desc,
        reference: ref,
        amount: amount,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      };

      if (id) {
        // Update existing
        await db.collection('Cashflow transactions').doc(id).update(transactionData);
        toast('Transaction updated successfully!', 'success');
        closeTxnModal();
      } else {
        // Add new
        transactionData.createdAt = firebase.firestore.FieldValue.serverTimestamp();
        await db.collection('Cashflow transactions').add(transactionData);
        toast('Transaction saved successfully!', 'success');
        closeTxnModal();
      }
      
    } catch (error) {
      console.error('Save error:', error);
      toast('Error: ' + error.message, 'error');
      errEl.textContent = error.message;
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-check"></i> Save Transaction';
    }
  };

  // ==================== SAVE TRANSFER ====================
  window.saveTransfer = async function(e) {
    e.preventDefault();
    
    const errEl = document.getElementById('trErr');
    const btn = document.getElementById('trBtn');
    errEl.textContent = '';

    const date = document.getElementById('trDate').value;
    const from = document.getElementById('trFrom').value;
    const to = document.getElementById('trTo').value;
    const desc = document.getElementById('trDesc').value.trim() || 'Transfer';
    const ref = document.getElementById('trRef').value.trim() || '—';
    const amount = parseFloat(document.getElementById('trAmount').value);

    // Validation
    if (!date) { errEl.textContent = 'Please select a date.'; return; }
    if (!from) { errEl.textContent = 'Select source account.'; return; }
    if (!to) { errEl.textContent = 'Select destination account.'; return; }
    if (from === to) { errEl.textContent = 'Accounts must be different.'; return; }
    if (isNaN(amount) || amount <= 0) { errEl.textContent = 'Enter a valid amount.'; return; }

    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing…';

    try {
      const timestamp = firebase.firestore.FieldValue.serverTimestamp();
      const transferGroup = Date.now().toString(36);
      
      // Debit from source
      await db.collection('Cashflow transactions').add({
        date: date,
        type: 'debit',
        account: from,
        description: desc + ' → ' + to,
        reference: ref,
        amount: amount,
        transferGroup: transferGroup,
        isTransfer: true,
        createdAt: timestamp
      });
      
      // Credit to destination
      await db.collection('Cashflow transactions').add({
        date: date,
        type: 'credit',
        account: to,
        description: desc + ' ← ' + from,
        reference: ref,
        amount: amount,
        transferGroup: transferGroup,
        isTransfer: true,
        createdAt: timestamp
      });
      
      closeTransferModal();
      toast(`K${formatNumber(amount)} transferred from ${from} to ${to}`, 'info');
      
    } catch (error) {
      console.error('Transfer error:', error);
      toast('Error: ' + error.message, 'error');
      errEl.textContent = error.message;
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-arrow-right-arrow-left"></i> Confirm Transfer';
    }
  };

  // ==================== GET OPENING BALANCE ====================
  function getOpeningBalance(account, yearMonth) {
    const [year, month] = yearMonth.split('-').map(Number);
    const firstDayOfMonth = new Date(year, month-1, 1).toISOString().substring(0,10);
    
    let balance = 0;
    const priorTxns = allTransactions.filter(t => 
      t.account === account && 
      t.date && 
      t.date < firstDayOfMonth
    );
    
    priorTxns.forEach(t => {
      if (t.type === 'credit') balance += (t.amount || 0);
      else balance -= (t.amount || 0);
    });
    
    return balance;
  }

  // ==================== RENDER TABLE ====================
  function renderTable() {
    const tbody = document.getElementById('cfTbody');
    const month = monthPicker.value;
    
    if (!month) return;
    
    // Filter transactions for selected account AND selected month
    let monthlyTxns = allTransactions.filter(t => 
      t.account === selAcc && 
      t.date && 
      t.date.substring(0,7) === month
    );
    
    // Sort by date ascending
    monthlyTxns.sort((a, b) => {
      if ((a.date || '') === (b.date || '')) return (a.createdAt || 0) - (b.createdAt || 0);
      return (a.date || '') < (b.date || '') ? -1 : 1;
    });

    // Get opening balance
    const openingBal = getOpeningBalance(selAcc, month);
    let runningBal = openingBal;
    
    if (monthlyTxns.length === 0 && openingBal === 0) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="7">No transactions for this period.</td></tr>';
      return;
    }

    const rows = [];
    
    // Opening balance row
    if (openingBal !== 0 || monthlyTxns.length > 0) {
      rows.push(`<tr class="opening-row">
        <td>${month}-01</td>
        <td>Opening Balance (brought forward)</td>
        <td>—</td>
        <td class="num"><span class="blank-cell">—</span></td>
        <td class="num"><span class="blank-cell">—</span></td>
        <td class="num bal-val">${formatWithK(openingBal)}</td>
        <td></td>
      </tr>`);
    }

    // Add monthly transactions
    for (let t of monthlyTxns) {
      const isCredit = t.type === 'credit';
      if (isCredit) runningBal += (t.amount || 0);
      else runningBal -= (t.amount || 0);
      
      const rowClass = t.isTransfer ? 'transfer-row' : '';
      
      const debitCell = !isCredit 
        ? `<td class="num debit-val">${formatWithK(t.amount || 0)}</td>` 
        : `<td class="num"><span class="blank-cell">—</span></td>`;
      
      const creditCell = isCredit 
        ? `<td class="num credit-val">${formatWithK(t.amount || 0)}</td>` 
        : `<td class="num"><span class="blank-cell">—</span></td>`;
      
      const balClass = runningBal < 0 ? 'bal-val neg' : 'bal-val';
      const trLabel = t.isTransfer ? '<span class="transfer-label">TRANSFER</span>' : '';
      
      rows.push(`<tr class="${rowClass}" data-id="${t.id}">
        <td>${t.date || '—'}</td>
        <td>${t.description || '—'} ${trLabel}</td>
        <td style="color:var(--muted)">${t.reference || '—'}</td>
        ${debitCell}
        ${creditCell}
        <td class="num ${balClass}">${formatWithK(runningBal)}</td>
        <td style="text-align: center;">
          <div class="menu-container" onclick="event.stopPropagation()">
            <button class="action-btn" onclick="toggleMenu(event, '${t.id}')">
              <i class="fas fa-ellipsis-v"></i>
            </button>
            <div class="dropdown-menu">
              <button class="menu-item" onclick="openTxnModal('edit', '${t.id}'); event.stopPropagation();">
                <i class="fas fa-edit"></i> Edit
              </button>
              <button class="menu-item delete" onclick="openDeleteModal('${t.id}'); event.stopPropagation();">
                <i class="fas fa-trash"></i> Delete
              </button>
            </div>
          </div>
        </td>
      </tr>`);
    }

    tbody.innerHTML = rows.join('');
  }

  // ==================== SETUP FIREBASE LISTENER ====================
  function setupListener() {
    // Show loading
    document.getElementById('cfTbody').innerHTML = 
      '<tr class="empty-row"><td colspan="7"><i class="fas fa-spinner fa-spin"></i> Loading...</td></tr>';
    
    // Clear existing listener
    if (unsubscribeListener) {
      unsubscribeListener();
    }
    
    // Set up real-time listener
    unsubscribeListener = db.collection('Cashflow transactions')
      .onSnapshot(snapshot => {
        
        // Clear and rebuild transactions array
        allTransactions = [];
        
        snapshot.forEach(doc => {
          const data = doc.data();
          
          // Handle timestamps
          let createdAt = Date.now();
          if (data.createdAt && data.createdAt.seconds) {
            createdAt = data.createdAt.seconds * 1000;
          }
          
          allTransactions.push({
            id: doc.id,
            ...data,
            createdAt: createdAt
          });
        });
        
        // Update UI
        renderTable();
        
      }, error => {
        console.error('Listener error:', error);
        document.getElementById('cfTbody').innerHTML = 
          `<tr class="empty-row"><td colspan="7">
            <i class="fas fa-exclamation-triangle" style="color:#ef4444"></i> 
            Error: ${error.message}
          </td></tr>`;
        toast('Sync error: ' + error.message, 'error');
      });
  }

  // ==================== MONTH PICKER CHANGE ====================
  monthPicker.addEventListener('change', () => {
    localStorage.setItem('cashflow_month_filter', monthPicker.value);
    renderTable();
  });

  // ==================== PDF EXPORT ====================
  document.getElementById('pdfBtn').addEventListener('click', () => {
    try {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({
        orientation: 'landscape',
        unit: 'pt',
        format: 'a4'
      });
      
      const pageWidth = doc.internal.pageSize.getWidth();
      
      // Title
      doc.setFontSize(16);
      doc.setFont('helvetica', 'bold');
      doc.text('Trismart — Cash Flow: ' + selAcc, pageWidth/2, 40, { align: 'center' });
      
      // Month info
      doc.setFontSize(11);
      doc.setFont('helvetica', 'normal');
      doc.text(`Month: ${monthPicker.value || 'All Time'}`, pageWidth/2, 60, { align: 'center' });
      
      // Table headers
      const headers = ['Date', 'Description', 'Reference', 'Debit', 'Credit', 'Balance'];
      const colWidths = [75, 165, 100, 80, 80, 80];
      let y = 100;
      let x = 20;
      
      // Draw headers
      doc.setFillColor(22, 22, 31);
      doc.rect(x, y-10, colWidths.reduce((a,b) => a+b, 0), 20, 'F');
      doc.setTextColor(255, 255, 255);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(9);
      
      headers.forEach((header, i) => {
        doc.text(header, x + 5, y);
        x += colWidths[i];
      });
      
      // Reset for data
      y += 20;
      doc.setTextColor(0, 0, 0);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(9);
      
      // Get table rows
      const rows = [];
      document.querySelectorAll('#cfTbody tr').forEach(tr => {
        if (!tr.classList.contains('empty-row')) {
          const rowData = [...tr.querySelectorAll('td')].map(td => td.textContent.trim());
          rows.push(rowData.slice(0, 6)); // Exclude action column
        }
      });
      
      // Draw data rows
      rows.forEach(row => {
        x = 20;
        row.forEach((cell, i) => {
          doc.text(cell.toString().substring(0, 26), x + 5, y);
          x += colWidths[i];
        });
        
        y += 20;
        
        // Add new page if needed
        if (y > 500) {
          doc.addPage();
          y = 40;
          
          // Redraw headers on new page
          x = 20;
          doc.setFillColor(22, 22, 31);
          doc.rect(x, y-10, colWidths.reduce((a,b) => a+b, 0), 20, 'F');
          doc.setTextColor(255, 255, 255);
          doc.setFont('helvetica', 'bold');
          
          headers.forEach((header, i) => {
            doc.text(header, x + 5, y);
            x += colWidths[i];
          });
          
          y += 20;
          doc.setTextColor(0, 0, 0);
          doc.setFont('helvetica', 'normal');
        }
      });
      
      // Save PDF
      const fileName = `Trismart_CashFlow_${selAcc.replace(/\s/g,'_')}_${monthPicker.value || 'all'}.pdf`;
      doc.save(fileName);
      toast('PDF generated successfully!', 'success');
      
    } catch (error) {
      console.error('PDF error:', error);
      toast('Error generating PDF: ' + error.message, 'error');
    }
  });

  // ==================== INITIAL SETUP ====================
  document.addEventListener('DOMContentLoaded', () => {
    setupListener();
  });

  // ==================== CLEANUP ====================
  window.addEventListener('beforeunload', () => {
    if (unsubscribeListener) {
      unsubscribeListener();
    }
  });
</script>

<script>
  if ('WebSocket' in window) {
    (function () {
      function refreshCSS() {
        var sheets = [].slice.call(document.getElementsByTagName("link"));
        var head = document.getElementsByTagName("head")[0];
        for (var i = 0; i < sheets.length; ++i) {
          var elem = sheets[i];
          var parent = elem.parentElement || head;
          parent.removeChild(elem);
          var rel = elem.rel;
          if (elem.href && typeof rel != "string" || rel.length == 0 || rel.toLowerCase() == "stylesheet") {
            var url = elem.href.replace(/(&|\?)_cacheOverride=\d+/, '');
            elem.href = url + (url.indexOf('?') >= 0 ? '&' : '?') + '_cacheOverride=' + (new Date().valueOf());
          }
          parent.appendChild(elem);
        }
      }
      var protocol = window.location.protocol === 'http:' ? 'ws://' : 'wss://';
      var address = protocol + window.location.host + window.location.pathname + '/ws';
      var socket = new WebSocket(address);
      socket.onmessage = function (msg) {
        if (msg.data == 'reload') window.location.reload();
        else if (msg.data == 'refreshcss') refreshCSS();
      };
      if (sessionStorage && !sessionStorage.getItem('IsThisFirstTime_Log_From_LiveServer')) {
        console.log('Live reload enabled.');
        sessionStorage.setItem('IsThisFirstTime_Log_FromLiveServer', true);
      }
    })();
  }
  else {
    console.error('Upgrade your browser. This Browser is NOT supported WebSocket for Live-Reloading.');
  }
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
<title>Trismart · Cash Flow Manager</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
}

:root {
  --primary: #1e3a8a;
  --primary-light: #3b82f6;
  --accent: #f97316;
  --danger: #dc2626;
  --success: #10b981;
  --warning: #f59e0b;
  --bg: #f8fafc;
  --surface: #ffffff;
  --border: #e2e8f0;
  --text: #0f172a;
  --text-muted: #475569;
  --radius: 12px;
  --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
  --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
}

body {
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Top Bar */
.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
  box-shadow: var(--shadow-sm);
  position: sticky;
  top: 0;
  z-index: 20;
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

.logo-area {
  display: flex;
  align-items: center;
  gap: 8px;
}

.logo-area i {
  font-size: 24px;
  color: var(--primary);
}

.logo-area h1 {
  font-size: 1.2rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.month-picker {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 40px;
  padding: 6px 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.month-picker input {
  border: none;
  background: transparent;
  font-weight: 500;
  font-size: 0.85rem;
  outline: none;
}

/* Action Panel - Collapsible */
.action-panel {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  overflow: hidden;
  transition: max-height 0.35s ease;
  max-height: 0;
}

.action-panel.open {
  max-height: 400px;
}

.action-panel-content {
  padding: 16px 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.action-buttons {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  align-items: center;
  border-bottom: 1px solid var(--border);
  padding-bottom: 16px;
}

.accounts-management {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.accounts-management h3 {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 8px;
}

.account-list-manage {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
}

.account-badge {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 40px;
  padding: 6px 12px;
  font-size: 0.75rem;
  font-weight: 500;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: all 0.2s;
}

.account-badge i {
  font-size: 0.7rem;
  color: var(--text-muted);
}

.account-badge.hidden-badge {
  opacity: 0.5;
  text-decoration: line-through;
  background: #f1f5f9;
}

.toggle-vis-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 20px;
  font-size: 0.7rem;
  transition: all 0.2s;
  color: var(--text-muted);
}

.toggle-vis-btn:hover {
  background: var(--border);
}

.delete-acc-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--danger);
  font-size: 0.7rem;
  padding: 2px 6px;
  border-radius: 20px;
}

.delete-acc-btn:hover {
  background: #fee2e2;
}

.add-account-form {
  display: flex;
  gap: 8px;
  margin-top: 8px;
  flex-wrap: wrap;
}

.add-account-form input {
  flex: 1;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 40px;
  font-size: 0.8rem;
  outline: none;
  background: var(--bg);
}

.add-account-form button {
  padding: 8px 16px;
  background: var(--success);
  color: white;
  border: none;
  border-radius: 40px;
  font-size: 0.75rem;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
}

.panel-toggle-btn {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 40px;
  padding: 8px 16px;
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all 0.2s;
}

.panel-toggle-btn:hover {
  background: var(--primary);
  color: white;
  border-color: var(--primary);
}

.btn {
  padding: 8px 16px;
  border-radius: 40px;
  font-weight: 600;
  font-size: 0.8rem;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  transition: all 0.2s;
  border: none;
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
}

.btn-primary {
  background: var(--primary);
  color: white;
  border: none;
}

.btn-primary:hover {
  background: var(--primary-light);
  transform: translateY(-1px);
}

.btn-outline {
  border: 1px solid var(--border);
  background: white;
}

.btn-outline:hover {
  background: var(--bg);
  border-color: var(--primary);
  color: var(--primary);
}

/* Account Bar - Only shows visible accounts */
.account-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  align-items: center;
  gap: 4px;
  overflow-x: auto;
  white-space: nowrap;
  scrollbar-width: thin;
}

.account-tab {
  padding: 12px 20px;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.account-tab i {
  font-size: 0.75rem;
}

.account-tab.active {
  color: var(--primary);
  border-bottom-color: var(--primary);
}

.account-tab:hover:not(.active) {
  color: var(--text);
  background: var(--bg);
}

/* Filter Bar */
.filter-bar {
  background: var(--surface);
  padding: 12px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.filter-group {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.filter-chip {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 32px;
  padding: 6px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.8rem;
}

.filter-chip i {
  color: var(--text-muted);
}

.filter-chip select, .filter-chip input {
  border: none;
  background: transparent;
  font-weight: 500;
  outline: none;
  font-size: 0.8rem;
}

.filter-chip input {
  width: 130px;
}

.clear-filter {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 32px;
  padding: 6px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  font-size: 0.75rem;
  color: var(--text-muted);
  transition: all 0.2s;
}

.clear-filter:hover {
  background: var(--danger);
  color: white;
  border-color: var(--danger);
}

.stats-badge {
  background: var(--bg);
  padding: 6px 12px;
  border-radius: 32px;
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--text-muted);
}

/* Main Table */
.main-content {
  flex: 1;
  padding: 20px 24px;
}

.table-wrapper {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  overflow: auto;
  box-shadow: var(--shadow-sm);
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.8rem;
  min-width: 700px;
}

th {
  background: #f1f5f9;
  padding: 14px 16px;
  text-align: left;
  font-weight: 600;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
}

td {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}

tr:last-child td {
  border-bottom: none;
}

.opening-row td {
  background: #fefce8;
  font-style: italic;
  color: var(--text-muted);
}

.debit {
  color: var(--danger);
  font-weight: 600;
}

.credit {
  color: var(--success);
  font-weight: 600;
}

.balance {
  font-weight: 700;
}

.balance.negative {
  color: var(--danger);
}

.transfer-badge {
  background: #ffedd5;
  color: #c2410c;
  font-size: 0.65rem;
  padding: 2px 6px;
  border-radius: 20px;
  margin-left: 6px;
}

/* Menu & Actions */
.menu-cell {
  text-align: center;
  position: relative;
}

.action-dots {
  background: none;
  border: none;
  cursor: pointer;
  padding: 6px;
  border-radius: 8px;
  color: var(--text-muted);
}

.action-dots:hover {
  background: var(--bg);
}

.dropdown {
  position: absolute;
  right: 0;
  top: 28px;
  background: white;
  border: 1px solid var(--border);
  border-radius: 12px;
  box-shadow: var(--shadow-md);
  z-index: 50;
  min-width: 120px;
  display: none;
}

.dropdown.show {
  display: block;
}

.dropdown-item {
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 0.75rem;
  cursor: pointer;
  width: 100%;
  text-align: left;
  background: none;
  border: none;
  color: var(--text);
}

.dropdown-item:hover {
  background: var(--bg);
}

.delete-item:hover {
  color: var(--danger);
}

/* Modals */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.5);
  backdrop-filter: blur(3px);
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

.modal-overlay.open {
  display: flex;
}

.modal-card {
  background: white;
  width: 90%;
  max-width: 500px;
  border-radius: 24px;
  padding: 24px;
  box-shadow: var(--shadow-md);
  animation: fadeIn 0.2s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.96); }
  to { opacity: 1; transform: scale(1); }
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.modal-header h2 {
  font-size: 1.2rem;
}

.close-modal {
  background: var(--bg);
  border: none;
  width: 32px;
  height: 32px;
  border-radius: 40px;
  cursor: pointer;
}

.form-group {
  margin-bottom: 16px;
}

.form-group label {
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  color: var(--text-muted);
  display: block;
  margin-bottom: 6px;
}

.form-group input, .form-group select {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: var(--bg);
  font-size: 0.85rem;
  outline: none;
}

.form-row {
  display: flex;
  gap: 12px;
}

.form-row .form-group {
  flex: 1;
}

.save-btn {
  width: 100%;
  background: var(--primary);
  color: white;
  border: none;
  padding: 12px;
  border-radius: 40px;
  font-weight: 700;
  margin-top: 8px;
  cursor: pointer;
}

.save-btn.amber {
  background: var(--warning);
}

.save-btn.red {
  background: var(--danger);
}

/* Toast */
.toast-area {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 1100;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.toast {
  background: white;
  border-left: 4px solid var(--success);
  padding: 12px 20px;
  border-radius: 12px;
  box-shadow: var(--shadow-md);
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 0.85rem;
  animation: slideIn 0.2s ease;
}

@keyframes slideIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

@media (max-width: 640px) {
  .topbar, .account-bar, .filter-bar { padding: 0 12px; }
  .main-content { padding: 12px; }
  .filter-group { flex-direction: column; }
  .action-panel-content { padding: 12px; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo-area">
      <i class="fas fa-coins"></i>
      <h1>Trismart Flow</h1>
    </div>
    <div class="month-picker">
      <i class="fas fa-calendar-alt"></i>
      <input type="month" id="monthSelect">
    </div>
  </div>
  <div class="topbar-right">
    <button class="panel-toggle-btn" id="togglePanelBtn">
      <i class="fas fa-chevron-down" id="panelToggleIcon"></i> Actions & Accounts
    </button>
  </div>
</div>

<!-- Collapsible Action Panel - Contains ALL account management -->
<div class="action-panel" id="actionPanel">
  <div class="action-panel-content">
    <div class="action-buttons">
      <button class="btn btn-outline" id="pdfExportBtn"><i class="fas fa-file-pdf"></i> PDF Export</button>
      <button class="btn btn-outline" id="transferBtn"><i class="fas fa-exchange-alt"></i> Transfer</button>
      <button class="btn btn-primary" id="addTxnBtn"><i class="fas fa-plus"></i> Add Transaction</button>
    </div>
    
    <div class="accounts-management">
      <h3><i class="fas fa-wallet"></i> Manage Accounts (Hide/Unhide)</h3>
      <div class="account-list-manage" id="accountManageList"></div>
      <div class="add-account-form">
        <input type="text" id="newAccountName" placeholder="New account name...">
        <button id="addAccountBtn"><i class="fas fa-plus"></i> Add Account</button>
      </div>
    </div>
  </div>
</div>

<!-- Account Bar - Only visible accounts -->
<div class="account-bar" id="accountTabsContainer"></div>

<!-- Filter Bar -->
<div class="filter-bar">
  <div class="filter-group">
    <div class="filter-chip">
      <i class="fas fa-hashtag"></i>
      <select id="refFilter">
        <option value="">All References</option>
      </select>
    </div>
    <div class="filter-chip">
      <i class="fas fa-search"></i>
      <input type="text" id="searchFilter" placeholder="Search description or ref...">
    </div>
    <button class="clear-filter" id="clearFiltersBtn"><i class="fas fa-undo-alt"></i> Clear All</button>
  </div>
  <div class="stats-badge" id="filterStats">0 transactions</div>
</div>

<div class="main-content">
  <div class="table-wrapper">
    <table id="cashTable">
      <thead>
        <tr><th>Date</th><th>Description</th><th>Reference</th><th>Debit</th><th>Credit</th><th>Balance</th><th></th> </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="7" style="text-align:center">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="toast-area" id="toastRoot"></div>

<!-- Transaction Modal -->
<div id="txnModal" class="modal-overlay">
  <div class="modal-card">
    <div class="modal-header"><h2 id="txnTitle">Add Transaction</h2><button class="close-modal" onclick="closeTxnModal()"><i class="fas fa-times"></i></button></div>
    <form id="txnForm">
      <input type="hidden" id="txnDocId">
      <div class="form-row">
        <div class="form-group"><label>Date</label><input type="date" id="txnDate" required></div>
        <div class="form-group"><label>Type</label><select id="txnType" required><option value="">Select</option><option value="credit">Credit (+)</option><option value="debit">Debit (-)</option></select></div>
      </div>
      <div class="form-group"><label>Account</label><select id="txnAccount" required></select></div>
      <div class="form-group"><label>Description</label><input type="text" id="txnDesc" placeholder="e.g., Sales, Purchase" required></div>
      <div class="form-row">
        <div class="form-group"><label>Reference</label><select id="txnRefSelect"><option value="">-- Preset --</option><option value="INV-001">INV-001</option><option value="SAL-002">SAL-002</option></select></div>
        <div class="form-group"><label>Or Custom</label><input type="text" id="txnRefCustom" placeholder="Custom ref"></div>
      </div>
      <div class="form-group"><label>Amount (ZMW)</label><input type="number" id="txnAmount" step="0.01" min="0.01" required></div>
      <button type="submit" class="save-btn"><i class="fas fa-save"></i> Save</button>
    </form>
  </div>
</div>

<!-- Transfer Modal -->
<div id="transferModal" class="modal-overlay">
  <div class="modal-card">
    <div class="modal-header"><h2><i class="fas fa-exchange-alt"></i> Transfer Funds</h2><button class="close-modal" onclick="closeTransferModal()"><i class="fas fa-times"></i></button></div>
    <form id="transferForm">
      <div class="form-group"><label>Date</label><input type="date" id="transferDate" required></div>
      <div class="form-row">
        <div class="form-group"><label>From Account</label><select id="fromAccount" required></select></div>
        <div class="form-group"><label>To Account</label><select id="toAccount" required></select></div>
      </div>
      <div class="form-group"><label>Description (optional)</label><input type="text" id="transferDesc" placeholder="Transfer reason"></div>
      <div class="form-group"><label>Reference</label><input type="text" id="transferRef" placeholder="TRF-001"></div>
      <div class="form-group"><label>Amount (ZMW)</label><input type="number" id="transferAmount" step="0.01" required></div>
      <button type="submit" class="save-btn amber"><i class="fas fa-arrow-right-arrow-left"></i> Execute Transfer</button>
    </form>
  </div>
</div>

<!-- Delete confirm modal -->
<div id="deleteConfirmModal" class="modal-overlay">
  <div class="modal-card" style="max-width: 360px;">
    <div class="modal-header"><h2>Delete Transaction</h2><button class="close-modal" onclick="closeDeleteConfirm()"><i class="fas fa-times"></i></button></div>
    <p>Permanently remove this transaction? This action cannot be undone.</p>
    <input type="hidden" id="deleteTargetId">
    <button id="confirmDeleteBtn" class="save-btn red" style="margin-top: 20px;"><i class="fas fa-trash"></i> Delete Forever</button>
  </div>
</div>

<script>
  // Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyB-lm7Y3r1F6VvY8PKvY8glLabZDbJsHM1k",
    authDomain: "trismartstores.firebaseapp.com",
    projectId: "trismartstores",
    storageBucket: "trismartstores.appspot.com",
    messagingSenderId: "416692703333",
    appId: "1:416692703333:web:d4b60292621435c748f68c"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  db.enablePersistence().catch(e => console.warn(e));

  // Default accounts
  const DEFAULT_ACCOUNTS = ['Expenses A/c', 'Business savings A/c', 'Inventory A/c', 'Personal A/c', 'FnB Account'];
  
  let accounts = [];
  let hiddenAccounts = new Set();
  
  function loadAccounts() {
    const stored = localStorage.getItem('trismart_accounts');
    const storedHidden = localStorage.getItem('trismart_hidden_accounts');
    if (stored) {
      accounts = JSON.parse(stored);
    } else {
      accounts = [...DEFAULT_ACCOUNTS];
    }
    if (storedHidden) {
      hiddenAccounts = new Set(JSON.parse(storedHidden));
    } else {
      hiddenAccounts = new Set();
    }
  }
  
  function saveAccounts() {
    localStorage.setItem('trismart_accounts', JSON.stringify(accounts));
    localStorage.setItem('trismart_hidden_accounts', JSON.stringify([...hiddenAccounts]));
  }
  
  loadAccounts();
  
  let currentAccount = localStorage.getItem('selectedAccount') || accounts[0];
  if (!accounts.includes(currentAccount)) currentAccount = accounts[0];
  let currentMonth = localStorage.getItem('cf_month') || new Date().toISOString().slice(0,7);
  let allTransactions = [];
  let unsubscribeTxns = null;
  let filteredList = [];

  // DOM refs
  const monthPicker = document.getElementById('monthSelect');
  const refFilter = document.getElementById('refFilter');
  const searchFilter = document.getElementById('searchFilter');
  const filterStats = document.getElementById('filterStats');
  const accountContainer = document.getElementById('accountTabsContainer');
  const accountManageList = document.getElementById('accountManageList');
  const tableBody = document.getElementById('tableBody');
  const actionPanel = document.getElementById('actionPanel');
  const panelToggleIcon = document.getElementById('panelToggleIcon');

  monthPicker.value = currentMonth;

  // Panel persistence
  const isPanelOpen = localStorage.getItem('actionPanelOpen') === 'true';
  if (isPanelOpen) {
    actionPanel.classList.add('open');
    panelToggleIcon.classList.replace('fa-chevron-down', 'fa-chevron-up');
  }

  document.getElementById('togglePanelBtn').onclick = () => {
    actionPanel.classList.toggle('open');
    const open = actionPanel.classList.contains('open');
    localStorage.setItem('actionPanelOpen', open);
    if (open) {
      panelToggleIcon.classList.replace('fa-chevron-down', 'fa-chevron-up');
    } else {
      panelToggleIcon.classList.replace('fa-chevron-up', 'fa-chevron-down');
    }
  };

  function showToast(msg, type = 'success') {
    const toastDiv = document.getElementById('toastRoot');
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.style.borderLeftColor = type === 'error' ? '#dc2626' : type === 'info' ? '#f59e0b' : '#10b981';
    toast.innerHTML = `<i class="fas ${type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${msg}`;
    toastDiv.appendChild(toast);
    setTimeout(() => { toast.remove(); }, 3000);
  }

  // Toggle account visibility (hide/unhide)
  window.toggleAccountVisibility = function(accountName) {
    if (hiddenAccounts.has(accountName)) {
      hiddenAccounts.delete(accountName);
      showToast(`Account "${accountName}" is now visible`, 'info');
    } else {
      hiddenAccounts.add(accountName);
      if (currentAccount === accountName) {
        const visibleAccounts = accounts.filter(acc => !hiddenAccounts.has(acc));
        if (visibleAccounts.length > 0) {
          currentAccount = visibleAccounts[0];
          localStorage.setItem('selectedAccount', currentAccount);
        }
      }
      showToast(`Account "${accountName}" hidden from view`, 'info');
    }
    saveAccounts();
    renderAllAccountUI();
    applyFiltersAndRender();
  };

  // Delete account
  window.deleteAccount = async function(accountName) {
    if (accountName === 'Expenses A/c') { 
      showToast('Cannot delete default account', 'error'); 
      return; 
    }
    const hasTransactions = allTransactions.some(t => t.account === accountName);
    if (hasTransactions) { 
      showToast(`Cannot delete "${accountName}" - it has transactions`, 'error'); 
      return; 
    }
    accounts = accounts.filter(a => a !== accountName);
    hiddenAccounts.delete(accountName);
    if (currentAccount === accountName) {
      currentAccount = accounts[0];
      localStorage.setItem('selectedAccount', currentAccount);
    }
    saveAccounts();
    renderAllAccountUI();
    applyFiltersAndRender();
    showToast(`Account "${accountName}" removed`, 'info');
  };

  // Add new account
  function addNewAccount() {
    const input = document.getElementById('newAccountName');
    const newName = input.value.trim();
    if (!newName) { showToast('Enter account name', 'error'); return; }
    if (accounts.includes(newName)) { showToast('Account already exists', 'error'); return; }
    accounts.push(newName);
    saveAccounts();
    renderAllAccountUI();
    input.value = '';
    showToast(`Account "${newName}" added`, 'success');
  }

  document.getElementById('addAccountBtn').onclick = addNewAccount;
  document.getElementById('newAccountName').addEventListener('keypress', (e) => { if (e.key === 'Enter') addNewAccount(); });

  // Render both account bar (visible only) and management list (all with hide/unhide)
  function renderAllAccountUI() {
    // Render account tabs (only visible accounts)
    const visibleAccounts = accounts.filter(acc => !hiddenAccounts.has(acc));
    accountContainer.innerHTML = visibleAccounts.map(acc => `
      <div class="account-tab ${currentAccount === acc ? 'active' : ''}" data-acc="${acc}">
        <i class="fas fa-wallet"></i> ${acc}
      </div>
    `).join('');
    
    document.querySelectorAll('.account-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        currentAccount = tab.dataset.acc;
        localStorage.setItem('selectedAccount', currentAccount);
        renderAllAccountUI();
        applyFiltersAndRender();
      });
    });
    
    // Render management list (all accounts with hide/unhide controls)
    accountManageList.innerHTML = accounts.map(acc => {
      const isHidden = hiddenAccounts.has(acc);
      return `
        <div class="account-badge ${isHidden ? 'hidden-badge' : ''}">
          <i class="fas ${isHidden ? 'fa-eye-slash' : 'fa-eye'}"></i>
          <span>${acc}</span>
          <button class="toggle-vis-btn" onclick="toggleAccountVisibility('${acc}')" title="${isHidden ? 'Unhide' : 'Hide'}">
            <i class="fas ${isHidden ? 'fa-eye' : 'fa-eye-slash'}"></i>
          </button>
          ${acc !== 'Expenses A/c' ? `<button class="delete-acc-btn" onclick="deleteAccount('${acc}')" title="Delete"><i class="fas fa-trash"></i></button>` : ''}
        </div>
      `;
    }).join('');
    
    // Update select dropdowns in modals
    const visibleForSelect = accounts.filter(acc => !hiddenAccounts.has(acc));
    const accountSelects = ['txnAccount', 'fromAccount', 'toAccount'];
    accountSelects.forEach(selId => {
      const sel = document.getElementById(selId);
      if (sel) sel.innerHTML = visibleForSelect.map(acc => `<option value="${acc}" ${currentAccount === acc ? 'selected' : ''}>${acc}</option>`).join('');
    });
  }

  function updateRefDropdowns() {
    const refsSet = new Set();
    allTransactions.forEach(t => { if (t.reference && t.reference !== '—') refsSet.add(t.reference); });
    const refOptions = ['<option value="">All References</option>', ...Array.from(refsSet).map(r => `<option value="${r}">${r}</option>`)].join('');
    refFilter.innerHTML = refOptions;
    const txnSelect = document.getElementById('txnRefSelect');
    if (txnSelect) {
      const currentVal = txnSelect.value;
      txnSelect.innerHTML = '<option value="">-- Preset --</option><option value="INV-001">INV-001</option><option value="SAL-002">SAL-002</option>' + 
        Array.from(refsSet).filter(r => r !== 'INV-001' && r !== 'SAL-002').map(r => `<option value="${r}">${r}</option>`).join('');
      txnSelect.value = currentVal;
    }
  }

  function getOpeningBalance(account, yearMonth) {
    const [year, month] = yearMonth.split('-').map(Number);
    const firstDay = new Date(year, month-1, 1).toISOString().slice(0,10);
    let bal = 0;
    allTransactions.filter(t => t.account === account && t.date < firstDay).forEach(t => {
      if (t.type === 'credit') bal += t.amount;
      else bal -= t.amount;
    });
    return bal;
  }

  // Filter persistence
  function getFilters() {
    return {
      ref: localStorage.getItem('cf_refFilter') || '',
      search: localStorage.getItem('cf_searchFilter') || ''
    };
  }
  function setFilters(ref, search) {
    localStorage.setItem('cf_refFilter', ref);
    localStorage.setItem('cf_searchFilter', search);
    refFilter.value = ref;
    searchFilter.value = search;
  }
  
  function applyFiltersAndRender() {
    const filters = getFilters();
    refFilter.value = filters.ref;
    searchFilter.value = filters.search;
    
    let filtered = allTransactions.filter(t => 
      t.account === currentAccount && 
      t.date && 
      t.date.startsWith(currentMonth)
    );
    
    if (filters.ref) filtered = filtered.filter(t => t.reference === filters.ref);
    if (filters.search) {
      const kw = filters.search.toLowerCase();
      filtered = filtered.filter(t => (t.description || '').toLowerCase().includes(kw) || (t.reference || '').toLowerCase().includes(kw));
    }
    filtered.sort((a,b) => (a.date < b.date ? -1 : (a.date > b.date ? 1 : (a.createdAt || 0) - (b.createdAt || 0))));
    filteredList = filtered;
    filterStats.innerText = `${filteredList.length} transaction(s)`;
    renderTable(filteredList);
  }

  function renderTable(filtered) {
    if (!tableBody) return;
    const openingBal = getOpeningBalance(currentAccount, currentMonth);
    let running = openingBal;
    if (filtered.length === 0 && openingBal === 0) {
      tableBody.innerHTML = '<tr><td colspan="7" style="text-align:center">✨ No transactions. Click Add ✨</td></tr>';
      return;
    }
    let html = `<tr class="opening-row"><td>${currentMonth}-01</td><td>Opening Balance</td><td>—</td>
      <td class="debit">—</td><td class="credit">—</td><td class="balance ${openingBal < 0 ? 'negative' : ''}">ZMW ${openingBal.toFixed(2)}</td><td></td></tr>`;
    filtered.forEach(t => {
      const isCredit = t.type === 'credit';
      if (isCredit) running += t.amount;
      else running -= t.amount;
      const debitCell = !isCredit ? `<td class="debit">ZMW ${t.amount.toFixed(2)}</td>` : `<td>—</td>`;
      const creditCell = isCredit ? `<td class="credit">ZMW ${t.amount.toFixed(2)}</td>` : `<td>—</td>`;
      const transferBadge = t.isTransfer ? '<span class="transfer-badge"><i class="fas fa-repeat"></i> TRANSFER</span>' : '';
      html += `<tr>
        <td>${t.date || ''}</td>
        <td>${t.description || ''} ${transferBadge}</td>
        <td>${t.reference || '—'}</td>
        ${debitCell}${creditCell}
        <td class="balance ${running < 0 ? 'negative' : ''}">ZMW ${running.toFixed(2)}</td>
        <td class="menu-cell">
          <button class="action-dots" onclick="toggleMenu(event, '${t.id}')"><i class="fas fa-ellipsis-v"></i></button>
          <div class="dropdown" id="menu-${t.id}">
            <button class="dropdown-item" onclick="editTransaction('${t.id}')"><i class="fas fa-edit"></i> Edit</button>
            <button class="dropdown-item delete-item" onclick="requestDelete('${t.id}')"><i class="fas fa-trash"></i> Delete</button>
          </div>
        </td>
      </tr>`;
    });
    tableBody.innerHTML = html;
  }

  window.toggleMenu = function(event, id) {
    event.stopPropagation();
    document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('show'));
    const menu = document.getElementById(`menu-${id}`);
    if (menu) menu.classList.toggle('show');
  };
  document.addEventListener('click', () => document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('show')));

  window.editTransaction = (id) => {
    const tx = allTransactions.find(t => t.id === id);
    if (!tx) return;
    document.getElementById('txnDocId').value = tx.id;
    document.getElementById('txnDate').value = tx.date;
    document.getElementById('txnType').value = tx.type;
    document.getElementById('txnAccount').value = tx.account;
    document.getElementById('txnDesc').value = tx.description || '';
    const refVal = tx.reference || '';
    if (refVal === 'INV-001' || refVal === 'SAL-002') {
      document.getElementById('txnRefSelect').value = refVal;
      document.getElementById('txnRefCustom').value = '';
    } else {
      document.getElementById('txnRefSelect').value = '';
      document.getElementById('txnRefCustom').value = refVal === '—' ? '' : refVal;
    }
    document.getElementById('txnAmount').value = tx.amount;
    document.getElementById('txnTitle').innerText = 'Edit Transaction';
    document.getElementById('txnModal').classList.add('open');
  };

  window.requestDelete = (id) => {
    document.getElementById('deleteTargetId').value = id;
    document.getElementById('deleteConfirmModal').classList.add('open');
  };
  window.closeDeleteConfirm = () => document.getElementById('deleteConfirmModal').classList.remove('open');
  document.getElementById('confirmDeleteBtn').onclick = async () => {
    const id = document.getElementById('deleteTargetId').value;
    if (!id) return;
    try {
      await db.collection('Cashflow transactions').doc(id).delete();
      showToast('Transaction deleted', 'success');
      closeDeleteConfirm();
    } catch(e) { showToast(e.message, 'error'); }
  };

  document.getElementById('txnForm').onsubmit = async (e) => {
    e.preventDefault();
    const id = document.getElementById('txnDocId').value;
    const date = document.getElementById('txnDate').value;
    const type = document.getElementById('txnType').value;
    const account = document.getElementById('txnAccount').value;
    const desc = document.getElementById('txnDesc').value.trim();
    let reference = document.getElementById('txnRefSelect').value;
    const customRef = document.getElementById('txnRefCustom').value.trim();
    if (customRef) reference = customRef;
    if (!reference) reference = '—';
    const amount = parseFloat(document.getElementById('txnAmount').value);
    if (!date || !type || !account || !desc || isNaN(amount) || amount <= 0) {
      showToast('Please fill all fields correctly', 'error');
      return;
    }
    const data = { date, type, account, description: desc, reference, amount, updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
    try {
      if (id) await db.collection('Cashflow transactions').doc(id).update(data);
      else { data.createdAt = firebase.firestore.FieldValue.serverTimestamp(); await db.collection('Cashflow transactions').add(data); }
      showToast(id ? 'Updated' : 'Added', 'success');
      closeTxnModal();
    } catch(e) { showToast(e.message, 'error'); }
  };
  function closeTxnModal() { document.getElementById('txnModal').classList.remove('open'); document.getElementById('txnForm').reset(); document.getElementById('txnDocId').value = ''; document.getElementById('txnTitle').innerText = 'Add Transaction'; }
  window.closeTxnModal = closeTxnModal;
  document.getElementById('addTxnBtn').onclick = () => { closeTxnModal(); const visibleAccs = accounts.filter(acc => !hiddenAccounts.has(acc)); if(visibleAccs.includes(currentAccount)) document.getElementById('txnAccount').value = currentAccount; document.getElementById('txnModal').classList.add('open'); };

  document.getElementById('transferForm').onsubmit = async (e) => {
    e.preventDefault();
    const date = document.getElementById('transferDate').value;
    const from = document.getElementById('fromAccount').value;
    const to = document.getElementById('toAccount').value;
    const desc = document.getElementById('transferDesc').value.trim() || 'Transfer';
    const ref = document.getElementById('transferRef').value.trim() || 'TRF';
    const amount = parseFloat(document.getElementById('transferAmount').value);
    if (!date || !from || !to || from === to || isNaN(amount) || amount <= 0) {
      showToast('Invalid transfer details', 'error');
      return;
    }
    const ts = firebase.firestore.FieldValue.serverTimestamp();
    const groupId = Date.now().toString(36);
    try {
      await db.collection('Cashflow transactions').add({ date, type: 'debit', account: from, description: `${desc} → ${to}`, reference: ref, amount, transferGroup: groupId, isTransfer: true, createdAt: ts });
      await db.collection('Cashflow transactions').add({ date, type: 'credit', account: to, description: `${desc} ← ${from}`, reference: ref, amount, transferGroup: groupId, isTransfer: true, createdAt: ts });
      showToast(`Transfer ZMW ${amount.toFixed(2)} done`, 'info');
      closeTransferModal();
    } catch(e) { showToast(e.message, 'error'); }
  };
  window.closeTransferModal = () => document.getElementById('transferModal').classList.remove('open');
  document.getElementById('transferBtn').onclick = () => { document.getElementById('transferModal').classList.add('open'); };

  function bindFilterListeners() {
    refFilter.addEventListener('change', () => { setFilters(refFilter.value, searchFilter.value); applyFiltersAndRender(); });
    searchFilter.addEventListener('input', () => { setFilters(refFilter.value, searchFilter.value); applyFiltersAndRender(); });
    document.getElementById('clearFiltersBtn').onclick = () => { setFilters('', ''); applyFiltersAndRender(); showToast('Filters cleared', 'info'); };
    monthPicker.addEventListener('change', () => { currentMonth = monthPicker.value; localStorage.setItem('cf_month', currentMonth); applyFiltersAndRender(); });
  }

  function startFirestoreListener() {
    if (unsubscribeTxns) unsubscribeTxns();
    unsubscribeTxns = db.collection('Cashflow transactions').onSnapshot(snap => {
      allTransactions = [];
      snap.forEach(doc => {
        const d = doc.data();
        allTransactions.push({ id: doc.id, ...d, createdAt: d.createdAt?.seconds ? d.createdAt.seconds * 1000 : Date.now() });
      });
      updateRefDropdowns();
      applyFiltersAndRender();
    }, err => { console.error(err); showToast('Sync error', 'error'); });
  }

  renderAllAccountUI();
  bindFilterListeners();
  startFirestoreListener();

  document.getElementById('pdfExportBtn').onclick = async () => {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'landscape', unit: 'pt', format: 'a4' });
    doc.setFillColor(30,58,138); doc.rect(0,0,doc.internal.pageSize.getWidth(),50,'F');
    doc.setTextColor(255,255,255); doc.setFontSize(18); doc.text('Trismart Cash Flow', 40, 32);
    doc.setFontSize(10); doc.text(`Account: ${currentAccount} | Month: ${currentMonth}`, 40, 48);
    let y = 70;
    const headers = ['Date', 'Description', 'Ref', 'Debit', 'Credit', 'Balance'];
    doc.setFontSize(8); doc.setTextColor(0,0,0);
    doc.text(headers, 40, y, { baseline: 'top' });
    y += 20;
    let runningBal = getOpeningBalance(currentAccount, currentMonth);
    const rowsToPrint = filteredList;
    rowsToPrint.forEach(t => {
      if (y > doc.internal.pageSize.getHeight() - 40) { doc.addPage(); y = 40; doc.text(headers, 40, y, { baseline: 'top' }); y += 20; }
      const isCredit = t.type === 'credit';
      if (isCredit) runningBal += t.amount; else runningBal -= t.amount;
      doc.text(t.date || '', 40, y);
      doc.text((t.description || '').substring(0, 35), 140, y);
      doc.text((t.reference || '—').substring(0, 12), 300, y);
      doc.text(!isCredit ? t.amount.toFixed(2) : '', 380, y);
      doc.text(isCredit ? t.amount.toFixed(2) : '', 460, y);
      doc.text(runningBal.toFixed(2), 540, y);
      y += 16;
    });
    doc.save(`CashFlow_${currentAccount}_${currentMonth}.pdf`);
    showToast('PDF exported', 'success');
  };
</script>
</body>
</html>
